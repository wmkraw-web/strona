<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreator Awansu AI - EduBox</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap');
        
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; }
        .document-font { font-family: 'Merriweather', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }

        @media print {
            body { background: white; }
            .print-hidden { display: none !important; }
            #print-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        
        @keyframes slide-up { 0% { opacity: 0; transform: translate(-50%, 20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        .animate-toast { animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Briefcase: <><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
                FileSignature: <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 18h8"/><path d="M8 14h8"/><path d="M8 10h2"/></>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                Key: <path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5L15.5 7.5z"/>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                UserCheck: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            
            const [mode, setMode] = useState('opiekun'); // 'opiekun' lub 'nauczyciel'
            
            const [params, setParams] = useState({
                teacherName: '',
                role: 'Nauczyciel edukacji wczesnoszkolnej',
                customRole: '',
                level: 'Nauczyciel początkujący (na mianowanego)',
                achievements: ''
            });

            const [generatedData, setGeneratedData] = useState(null);

            const ROLES = [
                "Nauczyciel wychowania przedszkolnego",
                "Nauczyciel edukacji wczesnoszkolnej",
                "Nauczyciel przedmiotu (szkoła podstawowa/średnia)",
                "Pedagog szkolny / specjalny",
                "Psycholog szkolny",
                "Logopeda",
                "Fizjoterapeuta / Rehabilitant",
                "Inne (wpisz własne)"
            ];

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 4000);
            };

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { 
                    setIsPremium(true); 
                    setAccessCode(''); 
                    showToast('Kod aktywny! Witamy w Premium 🌟');
                } 
                else {
                    showToast('Nieprawidłowy kod dostępu!');
                }
            };

            const generateDocument = async () => {
                const finalRole = params.role === "Inne (wpisz własne)" ? params.customRole : params.role;
                
                if (!finalRole.trim() || !params.achievements.trim()) {
                    showToast('Wypełnij stanowisko i działania/sukcesy!');
                    return;
                }
                
                setIsGenerating(true);
                setGeneratedData(null);
                
                let systemPrompt = "";
                let userPrompt = "";

                if (mode === 'opiekun') {
                    systemPrompt = `Jesteś doświadczonym dyrektorem szkoły oraz ekspertem prawa oświatowego w Polsce. 
Twoim zadaniem jest napisanie "Projektu Oceny Dorobku Zawodowego" (oficjalnej opinii dyrektora/opiekuna) dla nauczyciela starającego się o awans zawodowy.
ZASADY KRYTYCZNE:
1. Pisz w 3 osobie liczby pojedynczej o nauczycielu. Ton wybitnie profesjonalny, urzędowy i obiektywny.
2. Dokument musi uwzględniać specyfikę zawodu: ${finalRole}. Inaczej oceniasz matematyka, a inaczej fizjoterapeutę (zwróć uwagę na pracę z ciałem, rehabilitację, wsparcie psychofizyczne).
3. Podziel dokument na czytelne akapity: Wstęp, Realizacja obowiązków, Współpraca, Podsumowanie/Rekomendacja.
4. Zwróć odpowiedź WYŁĄCZNIE w formacie JSON z kluczami "title", "legal_basis" oraz "document_body". Używaj znaczników HTML (<b>, <br>) w polu document_body do formatowania tekstu. Nie używaj markdown.

{
  "title": "PROJEKT OCENY DOROBKU ZAWODOWEGO",
  "legal_basis": "Na podstawie art. 9c ust. 5a ustawy z dnia 26 stycznia 1982 r. – Karta Nauczyciela...",
  "document_body": "Pan/Pani <b>[Imię i Nazwisko]</b> w okresie pracy...<br><br><b>Realizacja obowiązków:</b><br>..."
}`;
                    userPrompt = `Imię i nazwisko nauczyciela: ${params.teacherName || '[Imię i Nazwisko]'}\nStanowisko: ${finalRole}\nStopień awansu: ${params.level}\nZrealizowane działania, sukcesy i formy doskonalenia (wypisane przez użytkownika): ${params.achievements}\n\nNapisz pełną, wielostronicową i wyczerpującą opinię.`;
                } 
                else if (mode === 'nauczyciel') {
                    systemPrompt = `Jesteś ekspertem prawa oświatowego wspierającym nauczycieli w pisaniu "Sprawozdania z realizacji planu rozwoju zawodowego".
ZASADY KRYTYCZNE:
1. Pisz w 1 osobie liczby pojedynczej (np. "Zrealizowałem/am", "Wdrożyłem/am"). Ton profesjonalny i refleksyjny.
2. Dopasuj działania do stanowiska: ${finalRole}.
3. Podziel sprawozdanie na sekcje odpowiadające wymaganiom ustawowym (np. Umiejętność korzystania z przepisów prawa, Współpraca ze środowiskiem, Doskonalenie warsztatu pracy).
4. Zwróć odpowiedź WYŁĄCZNIE w formacie JSON z kluczami "title", "legal_basis" oraz "document_body". Używaj znaczników HTML (<b>, <br>, <ul>, <li>) w polu document_body do formatowania.

{
  "title": "SPRAWOZDANIE Z REALIZACJI PLANu ROZWOJU ZAWODOWEGO",
  "legal_basis": "Dokument przygotowany w związku z ubieganiem się o stopień awansu...",
  "document_body": "W okresie od... do... realizowałem/am plan rozwoju zawodowego...<br><br><b>1. Doskonalenie warsztatu pracy:</b><ul><li>...</li></ul>"
}`;
                    userPrompt = `Imię i nazwisko: ${params.teacherName || '[Imię i Nazwisko]'}\nStanowisko: ${finalRole}\nOczekiwany stopień: ${params.level}\nMoje zrealizowane działania, szkolenia, innowacje i sukcesy: ${params.achievements}\n\nPrzekształć te surowe notatki w piękne, wielostronicowe, urzędowe sprawozdanie.`;
                }

                try {
                    const payload = { 
                        system: systemPrompt,
                        prompt: userPrompt,
                        temperature: 0.3, // Niska temperatura = język urzędowy i konkretny
                        format: "json",
                        model: "gpt-4o-mini" // Wystarczy do logicznych, urzędowych tekstów
                    };

                    const res = await fetch('/api/chat', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();

                    if (!res.ok) throw new Error(data.details || data.message || "Nieznany błąd z serwera");
                    
                    let text = data.text;
                    let cleanText = text;
                    
                    // Tarcza przeciwko reasoning_content
                    if (cleanText.includes('"reasoning_content"')) {
                        const contentMarker = '"content":"';
                        const startIdx = cleanText.indexOf(contentMarker);
                        if (startIdx !== -1) {
                            let extracted = cleanText.substring(startIdx + contentMarker.length);
                            extracted = extracted.replace(/"\s*}\s*$/, '').replace(/"$/, ''); 
                            cleanText = extracted.replace(/\\n/g, '\n').replace(/\\"/g, '"'); 
                        }
                    } else {
                        try {
                            const outerObj = JSON.parse(text);
                            if (outerObj.content) cleanText = outerObj.content;
                            else if (outerObj.choices && outerObj.choices[0].message.content) cleanText = outerObj.choices[0].message.content;
                        } catch(e) {}
                    }
                    
                    cleanText = cleanText.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();

                    let jsonStr = cleanText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const start = jsonStr.indexOf('{');
                    const end = jsonStr.lastIndexOf('}');
                    if(start !== -1 && end !== -1) {
                        jsonStr = jsonStr.substring(start, end + 1);
                    }
                    
                    const parsedData = JSON.parse(jsonStr);
                    
                    // Jeśli AI zapomniało o polach, dodajmy awaryjne
                    parsedData.title = parsedData.title || "Dokument Awansu Zawodowego";
                    parsedData.legal_basis = parsedData.legal_basis || "";
                    parsedData.document_body = parsedData.document_body || "Błąd generowania treści.";

                    setGeneratedData(parsedData);
                    
                } catch (error) {
                    console.error("Błąd AI:", error); 
                    showToast(`Błąd: ${error.message}. Sprawdź klucz API.`);
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const exportToWord = () => {
                if(!generatedData) return;
                const content = document.getElementById('document-render-area').innerHTML;
                
                const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>${generatedData.title}</title>
                <style>
                    body { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; color: #000; text-align: justify; }
                    h1 { font-size: 16pt; text-align: center; text-transform: uppercase; margin-bottom: 20px; }
                    .legal { font-size: 10pt; font-style: italic; text-align: center; margin-bottom: 30px; }
                    ul { padding-left: 20px; }
                    li { margin-bottom: 5px; }
                </style></head><body>`;
                const footer = `</body></html>`;
                
                const blob = new Blob(['\ufeff', header + content + footer], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Awans_${mode}_${Date.now()}.doc`;
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col relative bg-slate-100 overflow-x-hidden">
                    
                    {toastMessage && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm animate-toast flex items-center gap-3 border border-slate-700">
                            <Icon name="AlertCircle" size={18} className="text-blue-400" />
                            {toastMessage}
                        </div>
                    )}

                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center text-white">
                            <div className="bg-white p-8 rounded-3xl flex flex-col items-center space-y-5 max-w-sm text-slate-800 shadow-2xl">
                                <div className="w-16 h-16 border-8 border-t-transparent border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                                <div className="text-center">
                                    <h3 className="text-xl font-black mb-1">Analizuję przepisy...</h3>
                                    <p className="text-xs text-slate-500 font-medium">Pisanie urzędowego dokumentu (ok. 15 sek).</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-xl tracking-tight text-slate-800">
                            <div className="bg-gradient-to-br from-blue-700 to-indigo-800 p-2.5 rounded-xl text-white shadow-lg">
                                <Icon name="Briefcase" size={24}/>
                            </div>
                            <span className="hidden sm:inline">Kreator<span className="text-blue-600">Awansu</span> AI</span>
                        </div>
                        <div className="flex items-center space-x-3">
                            {!isPremium && (
                                <div className="hidden md:flex items-center space-x-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium"/>
                                    <button onClick={handleVerifyCode} className="p-2 text-white rounded-lg bg-blue-600 hover:bg-blue-700 transition-colors"><Icon name="Lock" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-gradient-to-r from-amber-400 to-amber-500 text-amber-950 px-4 py-2.5 rounded-xl font-bold shadow-sm transition-transform active:scale-95 text-sm">
                                <Icon name="Coffee" size={18} /><span>Postaw Kawę</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0">
                        
                        {/* PANEL LEWY - KONFIGURACJA */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            
                            {/* Wybór Trybu */}
                            <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex gap-2">
                                <button onClick={() => {setMode('opiekun'); setGeneratedData(null);}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all ${mode === 'opiekun' ? 'bg-gradient-to-br from-blue-600 to-indigo-700 text-white shadow-lg shadow-blue-500/30' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="FileSignature" size={24} className="mb-2" /> Piszę Opinię<br/><span className="text-[8px] font-normal opacity-80">(Opiekun / Dyrektor)</span>
                                </button>
                                <button onClick={() => {setMode('nauczyciel'); setGeneratedData(null);}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all ${mode === 'nauczyciel' ? 'bg-gradient-to-br from-emerald-500 to-teal-600 text-white shadow-lg shadow-emerald-500/30' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="UserCheck" size={24} className="mb-2" /> Piszę Sprawozdanie<br/><span className="text-[8px] font-normal opacity-80">(Nauczyciel)</span>
                                </button>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-5">
                                <h2 className="font-bold text-sm uppercase tracking-widest border-b pb-3 text-slate-800 flex items-center gap-2">
                                    Dane do dokumentu
                                </h2>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 block mb-1">Kogo dotyczy dokument? (Opcjonalnie)</label>
                                    <input 
                                        type="text" 
                                        value={params.teacherName} 
                                        onChange={e => setParams({...params, teacherName: e.target.value})} 
                                        placeholder="Imię i nazwisko nauczyciela" 
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm focus:border-blue-500"
                                    />
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 block mb-1">Stanowisko / Specjalizacja</label>
                                    <select value={params.role} onChange={e => setParams({...params, role: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium focus:border-blue-500 mb-2">
                                        {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                    {params.role === "Inne (wpisz własne)" && (
                                        <input type="text" value={params.customRole} onChange={e => setParams({...params, customRole: e.target.value})} placeholder="np. Nauczyciel bibliotekarz..." className="w-full p-3 bg-blue-50 border border-blue-200 rounded-xl outline-none text-sm focus:border-blue-500 animate-toast" />
                                    )}
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 block mb-1">Cel Awansu</label>
                                    <select value={params.level} onChange={e => setParams({...params, level: e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium focus:border-blue-500">
                                        <option value="Nauczyciel początkujący (na mianowanego)">Na nauczyciela mianowanego</option>
                                        <option value="Nauczyciel mianowany (na dyplomowanego)">Na nauczyciela dyplomowanego</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase ml-1 block mb-1">
                                        Działania i Sukcesy (Wypisz hasłowo)
                                    </label>
                                    <textarea 
                                        value={params.achievements} 
                                        onChange={e => setParams({...params, achievements: e.target.value})} 
                                        placeholder="Wpisz chaotycznie, co robił nauczyciel. Np. kurs TUS, prowadzil kolko szachowe, wdrozyl innowacje matematyczna, swietnie wspolpracuje z poradnia psychologiczna, robi gazetki szkolne..." 
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium text-sm resize-none focus:ring-2 focus:ring-blue-100 focus:border-blue-500 custom-scrollbar"
                                        rows="6"
                                    />
                                </div>

                                {!isPremium ? (
                                    <div className="p-4 rounded-xl border border-dashed flex flex-col items-center justify-center text-center gap-2 bg-slate-50 border-slate-300">
                                        <Icon name="Lock" size={24} className="text-slate-400"/>
                                        <span className="text-xs font-bold text-slate-500">Wymagany Kod Premium</span>
                                    </div>
                                ) : (
                                    <button onClick={generateDocument} className="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-black text-sm tracking-widest shadow-lg flex justify-center items-center gap-2 transition-transform active:scale-95">
                                        <Icon name="Sparkles" size={20}/> ZREDAGUJ DOKUMENT
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* PANEL PRAWY - WYNIK */}
                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10">
                            
                            {!generatedData ? (
                                <div className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-xl p-8 rounded-xl flex flex-col items-center justify-center opacity-40 text-center space-y-6 print-hidden">
                                    <Icon name="FileSignature" size={80} className="text-slate-300" />
                                    <div>
                                        <h2 className="text-2xl font-bold mb-2">Dokument Awansu Zawodowego</h2>
                                        <p className="max-w-md mx-auto font-medium text-slate-500">Wpisz luźne notatki w panelu po lewej stronie, a sztuczna inteligencja zredaguje z nich poprawny, oficjalny dokument językiem urzędowym.</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full max-w-[210mm] animate-[reveal_0.5s_ease-out]">
                                    
                                    {/* Toolbar */}
                                    <div className="flex justify-end gap-3 mb-6 print-hidden">
                                        <button onClick={exportToWord} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 transition-colors text-sm shadow-md">
                                            <Icon name="Download" size={16}/> POBIERZ JAKO WORD (.DOCX)
                                        </button>
                                        <button onClick={() => window.print()} className="bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 transition-colors text-sm">
                                            <Icon name="Printer" size={16}/> DRUKUJ PDF
                                        </button>
                                    </div>

                                    {/* Karta A4 */}
                                    <div className="bg-white shadow-2xl p-12 md:p-20 text-slate-900 document-font text-justify" id="print-container">
                                        
                                        {/* Ukryty kontener do eksportu Worda, żeby zachować czysty HTML */}
                                        <div id="document-render-area">
                                            <h1 className="text-xl font-bold text-center uppercase mb-6 tracking-wide leading-tight">
                                                {generatedData.title}
                                            </h1>
                                            
                                            {generatedData.legal_basis && (
                                                <p className="text-sm italic text-center mb-10 text-slate-600 px-8">
                                                    {generatedData.legal_basis}
                                                </p>
                                            )}

                                            <div 
                                                className="text-base leading-relaxed space-y-4"
                                                dangerouslySetInnerHTML={{ __html: generatedData.document_body }} 
                                            />
                                            
                                            <div className="mt-24 flex justify-between px-8 print:px-0">
                                                <div className="border-t border-slate-400 w-48 text-center pt-2 text-sm">Miejscowość, data</div>
                                                <div className="border-t border-slate-400 w-48 text-center pt-2 text-sm">Podpis i pieczęć</div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
