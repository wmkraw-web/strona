<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduChunk AI - Asystent Skupienia (ADHD/Dysleksja)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&family=Comic+Neue:wght@400;700&display=swap');
        
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; }
        
        /* Domyślny, bardzo czytelny font dla materiałów (Lexend jest polecany w edukacji włączającej) */
        .chunk-content { font-family: 'Lexend', sans-serif; }
        
        /* Tryb Dysleksji */
        .dyslexia-mode {
            font-family: 'Comic Neue', 'Comic Sans MS', cursive !important;
            letter-spacing: 0.1em !important;
            word-spacing: 0.2em !important;
            line-height: 2 !important;
            background-color: #fffbeb !important; /* Ciepłe, żółtawe tło redukujące stres wzrokowy */
        }
        
        .dyslexia-text { color: #1e293b !important; }
        
        @media print {
            body { background: white; }
            .print-hidden { display: none !important; }
            #print-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; }
            .chunk-card { break-inside: avoid; page-break-inside: avoid; border: 2px solid #e2e8f0 !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Brain: <><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></>,
                SplitSquare: <><rect width="8" height="18" x="3" y="3" rx="2" ry="2"/><rect width="8" height="18" x="13" y="3" rx="2" ry="2"/></>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                Eye: <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
                BookOpen: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            
            const [sourceText, setSourceText] = useState('');
            const [dyslexiaMode, setDyslexiaMode] = useState(false);
            
            const [params, setParams] = useState({
                age: 'Klasy 4-8 Szkoły Podstawowej',
                chunkSize: 'Bardzo krótkie (max 3 zdania)',
                highlightKeywords: true,
                includeQuiz: true
            });

            const [chunkedData, setChunkedData] = useState(null);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { setIsPremium(true); setAccessCode(''); } 
                else alert('Błędny kod!');
            };

            const fillSampleText = () => {
                setSourceText("Fotosynteza to złożony proces biochemiczny, w którym rośliny, glony i niektóre bakterie przekształcają energię świetlną w energię chemiczną. Proces ten zachodzi głównie w liściach, w specjalnych strukturach zwanych chloroplastami, które zawierają zielony barwnik - chlorofil. Zasadniczo, rośliny pobierają dwutlenek węgla z powietrza oraz wodę z gleby, a następnie przy udziale światła słonecznego przekształcają te substancje w glukozę, która jest ich pożywieniem. Produktem ubocznym tego procesu jest tlen, który jest uwalniany do atmosfery i jest niezbędny do życia niemal wszystkich organizmów na Ziemi. Fotosynteza dzieli się na fazę jasną, wymagającą obecności światła, oraz fazę ciemną (cykl Calvina), która może zachodzić w ciemności, o ile dostarczone zostaną produkty fazy jasnej.");
            };

            const generateChunks = async () => {
                if (!sourceText.trim()) return alert('Wklej tekst, który chcesz uprościć!');
                if (sourceText.length < 50) return alert('Tekst jest za krótki. Wklej co najmniej jeden pełny akapit.');
                setIsGenerating(true);
                
                const systemPrompt = `Jesteś ekspertem ds. neuroinkluzywności i pedagogiki specjalnej. Twoim zadaniem jest zastosowanie metody "chunkingu" (podziału na mikro-lekcje) na podanym tekście z podręcznika. Optymalizujesz tekst dla ucznia z ADHD lub dysleksją.
                Odpowiadaj WYŁĄCZNIE w formacie JSON.
                Struktura JSON:
                {
                  "title": "Chwytliwy, bardzo prosty tytuł materiału",
                  "chunks": [
                    { 
                      "icon": "Tylko JEDNO emoji (np. ☀️)", 
                      "heading": "Krótki nagłówek/pytanie (np. Skąd roślina bierze jedzenie?)", 
                      "content": "Uproszczony tekst oryginału. Używaj krótkich, prostych zdań (podmiot, orzeczenie, dopełnienie).", 
                      "keywords_to_bold": ["słowo1", "słowo2"] 
                    }
                  ],
                  "summary": "Podsumowanie całej lekcji w DOKŁADNIE jednym, prostym zdaniu.",
                  "quiz": ["Proste pytanie sprawdzające 1", "Proste pytanie sprawdzające 2"]
                }
                ZASADY: 
                - NIE zmieniaj faktów. 
                - Dziel długie zdania wielokrotnie złożone na krótkie.
                - Wybierz 2-3 najważniejsze pojęcia z każdego chunka do tablicy 'keywords_to_bold'.`;

                const userPrompt = `Tekst źródłowy: "${sourceText}". \nWiek ucznia: ${params.age}. \nRozmiar porcji: ${params.chunkSize}. \nProszę o przetworzenie tekstu zgodnie z zasadami chunkingu.`;

                try {
                    // ZMIANA: Bezpośrednie połączenie przeglądarki z AI omija 10-sekundowy limit Vercela!
                    const res = await fetch('https://text.pollinations.ai/', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: userPrompt }
                            ],
                            model: "openai",
                            temperature: 0.3,
                            seed: Math.floor(Math.random() * 10000)
                        })
                    });
                    
                    if (!res.ok) throw new Error("Błąd serwera AI");
                    
                    let text = await res.text();
                    const start = text.indexOf('{');
                    const end = text.lastIndexOf('}');
                    setChunkedData(JSON.parse(text.substring(start, end + 1)));
                } catch (error) {
                    console.error(error); 
                    alert("Przepraszamy, serwery AI są w tej chwili bardzo obciążone. Spróbuj ponownie za kilka sekund.");
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const exportToWord = () => {
                if(!chunkedData) return;
                const content = document.getElementById('print-container').innerHTML;
                const cleanContent = content.replace(/class="[^"]*"/g, '');
                
                const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Mikro-Lekcja: ${chunkedData.title}</title><style>body {font-family: Arial, sans-serif; font-size: 14pt; line-height: 1.5; color: #1e293b;} h1 {font-size: 22pt; color: #4f46e5; text-align: center;} h2 {font-size: 16pt; color: #6366f1; border-bottom: 2px solid #e0e7ff; padding-bottom: 5px; margin-top: 20px;} .chunk { border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 20px; border-radius: 8px; background-color: #f8fafc;} b {color: #1e293b;} .summary { background-color: #ecfdf5; padding: 15px; border-left: 5px solid #10b981; } .quiz { background-color: #fef2f2; padding: 15px; border-left: 5px solid #ef4444; }</style></head><body>`;
                const footer = `</body></html>`;
                
                let wordHtml = `<h1>${chunkedData.title}</h1>`;
                chunkedData.chunks.forEach(chunk => {
                    let contentText = chunk.content;
                    if(params.highlightKeywords) {
                        chunk.keywords_to_bold.forEach(kw => {
                            const regex = new RegExp(`\\b${kw}\\b`, 'gi');
                            contentText = contentText.replace(regex, `<b>$&</b>`);
                        });
                    }
                    wordHtml += `<div class="chunk"><h2>${chunk.icon} ${chunk.heading}</h2><p>${contentText}</p></div>`;
                });
                
                wordHtml += `<div class="summary"><h2>Podsumowanie</h2><p>${chunkedData.summary}</p></div>`;
                if(params.includeQuiz && chunkedData.quiz) {
                    wordHtml += `<div class="quiz"><h2>Sprawdź się!</h2><ul>`;
                    chunkedData.quiz.forEach(q => wordHtml += `<li>${q}</li>`);
                    wordHtml += `</ul></div>`;
                }

                const blob = new Blob(['\ufeff', header + wordHtml + footer], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `MikroLekcja_${chunkedData.title.replace(/\s+/g, '_')}.doc`;
                link.click();
            };

            const renderContentWithHighlights = (text, keywords) => {
                if (!params.highlightKeywords || !keywords || keywords.length === 0) return text;
                let resultText = text;
                [...keywords].sort((a,b) => b.length - a.length).forEach(kw => {
                    const regex = new RegExp(`\\b(${kw})\\b`, 'gi');
                    resultText = resultText.replace(regex, '<strong>$1</strong>');
                });
                return <span dangerouslySetInnerHTML={{ __html: resultText }} />;
            };

            return (
                <div className="min-h-screen flex flex-col relative bg-slate-50">
                    {/* EKRAN ŁADOWANIA */}
                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex flex-col items-center justify-center text-white">
                            <div className="bg-white p-8 rounded-3xl flex flex-col items-center space-y-5 max-w-sm text-slate-800 shadow-2xl">
                                <div className="w-16 h-16 border-8 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                                <div className="text-center">
                                    <h3 className="text-xl font-black mb-1">Analizuję tekst...</h3>
                                    <p className="text-xs text-slate-500 font-medium">To może potrwać do 25 sekund. Proszę czekać...</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAWIGACJA */}
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-xl tracking-tight text-slate-800">
                            <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-2.5 rounded-xl text-white shadow-lg shadow-indigo-200">
                                <Icon name="Brain" size={24}/>
                            </div>
                            <span className="hidden sm:inline">Edu<span className="text-indigo-600">Chunk</span> AI</span>
                        </div>
                        <div className="flex items-center space-x-3">
                            {!isPremium && (
                                <div className="hidden md:flex items-center space-x-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium"/>
                                    <button onClick={handleVerifyCode} className="p-2 text-white rounded-lg bg-indigo-600 hover:bg-indigo-700 transition-colors"><Icon name="Lock" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-gradient-to-r from-amber-400 to-amber-500 text-amber-950 px-4 py-2.5 rounded-xl font-bold shadow-sm transition-transform active:scale-95 text-sm">
                                <Icon name="Coffee" size={18} /><span>Postaw Kawę</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0">
                        
                        {/* PANEL LEWY - KONFIGURACJA */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-4">
                                <div className="flex justify-between items-center border-b pb-3">
                                    <h2 className="font-bold text-sm uppercase tracking-widest text-indigo-900 flex items-center gap-2">
                                        <Icon name="BookOpen" size={18} className="text-indigo-500"/> Tekst Źródłowy
                                    </h2>
                                    <button onClick={fillSampleText} className="text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1 rounded-lg font-bold transition-colors">
                                        Wklej Przykładowy
                                    </button>
                                </div>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">Ściana tekstu (Podręcznik / Wikipedia)</label>
                                    <textarea 
                                        value={sourceText} 
                                        onChange={e => setSourceText(e.target.value)} 
                                        placeholder="Wklej tutaj długi, trudny tekst do przetworzenia..." 
                                        className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-medium text-sm resize-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all h-64 custom-scrollbar"
                                    />
                                    <div className="text-right mt-1 text-[10px] font-bold text-slate-400">{sourceText.length} znaków</div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-5">
                                <h2 className="font-bold text-sm uppercase tracking-widest border-b pb-3 text-indigo-900 flex items-center gap-2">
                                    <Icon name="SplitSquare" size={18} className="text-indigo-500"/> Ustawienia Redukcji
                                </h2>

                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Poziom edukacyjny</label>
                                        <select value={params.age} onChange={e => setParams({...params, age: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium focus:border-indigo-500">
                                            <option>Edukacja Wczesnoszkolna (1-3)</option>
                                            <option>Klasy 4-8 Szkoły Podstawowej</option>
                                            <option>Szkoła Ponadpodstawowa</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Wielkość porcji (Chunk Size)</label>
                                        <select value={params.chunkSize} onChange={e => setParams({...params, chunkSize: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium focus:border-indigo-500">
                                            <option>Bardzo krótkie (max 3 zdania / Fiszki)</option>
                                            <option>Średnie (Podział na małe akapity)</option>
                                        </select>
                                    </div>
                                    
                                    <div className="pt-2 space-y-3">
                                        <label className="flex items-center gap-3 p-3 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                                            <input type="checkbox" checked={params.highlightKeywords} onChange={e => setParams({...params, highlightKeywords: e.target.checked})} className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500" />
                                            <div className="flex flex-col">
                                                <span className="text-sm font-bold text-slate-700">Pogrubiaj słowa kluczowe</span>
                                                <span className="text-[10px] text-slate-500">Wizualne kotwice ułatwiające skanowanie tekstu.</span>
                                            </div>
                                        </label>
                                        <label className="flex items-center gap-3 p-3 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors">
                                            <input type="checkbox" checked={params.includeQuiz} onChange={e => setParams({...params, includeQuiz: e.target.checked})} className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500" />
                                            <div className="flex flex-col">
                                                <span className="text-sm font-bold text-slate-700">Dodaj quiz sprawdzający</span>
                                                <span className="text-[10px] text-slate-500">Pytania wspomagające zapamiętywanie (Retrieval practice).</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>

                                {!isPremium ? (
                                    <div className="p-4 rounded-2xl border border-dashed flex flex-col items-center justify-center text-center gap-2 bg-indigo-50 border-indigo-200">
                                        <Icon name="Lock" size={24} className="text-indigo-400"/>
                                        <span className="text-xs font-bold text-indigo-800">Narzędzie Premium (Wymaga Kodu)</span>
                                    </div>
                                ) : (
                                    <button onClick={generateChunks} className="w-full text-white py-4 rounded-2xl font-black text-sm tracking-widest shadow-xl flex justify-center items-center gap-2 transition-transform active:scale-95 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 shadow-indigo-500/30">
                                        <Icon name="Sparkles" size={20}/> ZMIEŃ W MIKRO-LEKCJĘ
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* PANEL PRAWY - WYNIK */}
                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10">
                            <div className={`bg-white w-full max-w-[210mm] min-h-[297mm] shadow-2xl p-8 md:p-14 text-slate-900 transition-colors duration-500 ${dyslexiaMode ? 'dyslexia-mode' : 'chunk-content'}`} id="print-container">
                                
                                <div className="flex flex-col sm:flex-row justify-between items-center mb-8 pb-6 border-b-2 border-slate-100 print-hidden gap-4">
                                    <div className="flex items-center gap-4 bg-slate-50 p-2 rounded-2xl border border-slate-200">
                                        <div className="pl-3 pr-1 text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center gap-2">
                                            <Icon name="Eye" size={16} /> Tryb Dysleksji
                                        </div>
                                        <label className="relative inline-flex items-center cursor-pointer mr-2">
                                            <input type="checkbox" className="sr-only peer" checked={dyslexiaMode} onChange={() => setDyslexiaMode(!dyslexiaMode)} />
                                            <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-400"></div>
                                        </label>
                                    </div>
                                    
                                    <div className="flex gap-2 w-full sm:w-auto">
                                        <button onClick={() => window.print()} disabled={!chunkedData} className="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex justify-center items-center gap-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                                            <Icon name="Printer" size={18}/> Drukuj
                                        </button>
                                        <button onClick={exportToWord} disabled={!chunkedData} className="flex-1 sm:flex-none bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 px-5 py-3 rounded-xl font-bold flex justify-center items-center gap-2 transition-colors disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                                            <Icon name="Download" size={18}/> Word
                                        </button>
                                    </div>
                                </div>

                                {!chunkedData ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-30 text-center space-y-6 pt-24 print-hidden">
                                        <Icon name="SplitSquare" size={80} className="text-indigo-400" />
                                        <div>
                                            <h2 className="text-2xl font-bold mb-2">Tutaj pojawi się Twój przejrzysty materiał</h2>
                                            <p className="max-w-md mx-auto font-medium">Wklej tekst podręcznikowy w panelu po lewej stronie, a AI podzieli go na łatwe do przyswojenia "fiszki" edukacyjne.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-8 animate-[reveal_0.5s_ease-out]">
                                        <h1 className={`text-3xl md:text-4xl font-extrabold mb-8 tracking-tight text-center ${dyslexiaMode ? 'dyslexia-text' : 'text-indigo-900'}`}>
                                            {chunkedData.title}
                                        </h1>

                                        <div className="space-y-6">
                                            {chunkedData.chunks.map((chunk, idx) => (
                                                <div key={idx} className={`chunk-card p-6 md:p-8 rounded-2xl shadow-sm transition-all ${dyslexiaMode ? 'bg-white border-2 border-amber-200' : 'bg-white border border-slate-200 hover:border-indigo-300 hover:shadow-md'}`}>
                                                    <div className="flex items-start gap-4">
                                                        <div className={`text-3xl md:text-4xl flex-shrink-0 p-3 rounded-2xl ${dyslexiaMode ? 'bg-amber-50' : 'bg-indigo-50'}`}>
                                                            {chunk.icon}
                                                        </div>
                                                        <div className="flex-1 pt-1">
                                                            <h2 className={`text-lg md:text-xl font-bold mb-3 ${dyslexiaMode ? 'dyslexia-text' : 'text-slate-800'}`}>
                                                                {chunk.heading}
                                                            </h2>
                                                            <p className={`text-base md:text-lg leading-relaxed ${dyslexiaMode ? 'dyslexia-text' : 'text-slate-600'}`}>
                                                                {renderContentWithHighlights(chunk.content, chunk.keywords_to_bold)}
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10 print:block print:space-y-6">
                                            <div className={`p-6 rounded-2xl ${dyslexiaMode ? 'bg-emerald-50 border-2 border-emerald-200' : 'bg-emerald-50 border border-emerald-200'}`}>
                                                <h3 className={`text-sm font-black uppercase tracking-widest mb-3 flex items-center gap-2 ${dyslexiaMode ? 'dyslexia-text' : 'text-emerald-800'}`}>
                                                    <Icon name="Sparkles" size={18}/> W pigułce
                                                </h3>
                                                <p className={`font-medium leading-relaxed ${dyslexiaMode ? 'dyslexia-text' : 'text-emerald-900'}`}>
                                                    {chunkedData.summary}
                                                </p>
                                            </div>

                                            {params.includeQuiz && chunkedData.quiz && (
                                                <div className={`p-6 rounded-2xl ${dyslexiaMode ? 'bg-rose-50 border-2 border-rose-200' : 'bg-rose-50 border border-rose-200'}`}>
                                                    <h3 className={`text-sm font-black uppercase tracking-widest mb-3 flex items-center gap-2 ${dyslexiaMode ? 'dyslexia-text' : 'text-rose-800'}`}>
                                                        <Icon name="Brain" size={18}/> Sprawdź się!
                                                    </h3>
                                                    <ul className="space-y-3">
                                                        {chunkedData.quiz.map((q, i) => (
                                                            <li key={i} className={`flex gap-3 leading-relaxed font-medium ${dyslexiaMode ? 'dyslexia-text' : 'text-rose-900'}`}>
                                                                <span className="font-black text-rose-500">{i+1}.</span> {q}
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
