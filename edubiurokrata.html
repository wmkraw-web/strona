<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>EduBiurokrata AI - Kreator Protokołów i Pism</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; /* Głęboki granat/czerń */
            color: #f8fafc; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        /* Szklane panele Premium */
        .glass-panel { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .glass-nav { 
            background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .text-gradient { 
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Wielka poświata w tle */
        .hero-glow {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 800px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, rgba(2, 6, 23, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Efekt wejścia */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 8px; }
        
        .btn-bounce:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURACJA AI ---
        const PROMPTS = {
            protokol: `Jesteś perfekcyjnym, bezdusznym szkolnym biurokratą.
Twoje zadanie: Przekształć luźne notatki nauczyciela w wysoce sformalizowany PROTOKÓŁ Z ZEBRANIA Z RODZICAMI.
Struktura, którą MUSISZ zastosować:
1. Nagłówek: PROTOKÓŁ Z ZEBRANIA Z RODZICAMI KLASY [wymyśl klasę, jeśli nie podano] w dniu [dzisiejsza data].
2. Miejsce: [np. Sala nr X]
3. Porządek zebrania (wypunktowany, oficjalny).
4. Przebieg zebrania (zmień notatki na sztywny język np. "Wychowawca zapoznał rodziców z...", "Omówiono kwestie dotyczące...").
5. Wnioski / Ustalenia końcowe.
6. Podpisy (miejsce na podpis protokólanta i przewodniczącego).
Nie dodawaj żadnych własnych uwag z zewnątrz, użyj tylko faktów od nauczyciela, ale rozbuduj je o piękny, urzędniczy styl i "lanie wody" na temat dobra ucznia i podstaw programowych.`,

            notatka: `Jesteś perfekcyjnym, bezdusznym szkolnym biurokratą.
Twoje zadanie: Przekształć notatki w oficjalną NOTATKĘ SŁUŻBOWĄ (z incydentu, spotkania z rodzicem itp.) gotową do wpięcia w teczkę ucznia.
Struktura:
1. Miejscowość, data.
2. Nagłówek: NOTATKA SŁUŻBOWA.
3. Sporządzający: [Wychowawca / Nauczyciel].
4. Dotyczy: [Krótki temat bazujący na notatkach].
5. Treść: Opis w trybie bezosobowym i obiektywnym (np. "W dniu dzisiejszym doszło do...", "Uczeń zachowywał się w sposób naruszający statut szkoły..."). Unikaj emocji, używaj rygorystycznego języka oświatowego.
6. Wnioski/Zalecenia: (np. Powiadomiono pedagoga, wezwano rodziców).
7. Miejsce na podpis.`,

            sprawozdanie: `Jesteś perfekcyjnym, bezdusznym szkolnym biurokratą.
Twoje zadanie: Przekształć krótką notatkę z wycieczki lub wyjścia szkolnego w obszerne, sformalizowane SPRAWOZDANIE Z WYCIECZKI SZKOLNEJ.
Struktura:
1. Nagłówek: SPRAWOZDANIE Z WYCIECZKI / WYJŚCIA EDUKACYJNEGO.
2. Cel wycieczki (Dopisz tu "urzędnicze" cele edukacyjne, np. kształtowanie postaw patriotycznych, realizacja podstawy programowej, integracja zespołu klasowego).
3. Przebieg: Zmień podane fakty na sztywny opis.
4. Podsumowanie: Jak zachowywali się uczniowie i jaki był walor edukacyjny wydarzenia.
5. Miejsce na podpis kierownika wycieczki.`
        };

        function App() {
            const [activeTab, setActiveTab] = useState('protokol');
            const [inputText, setInputText] = useState('');
            const [generatedText, setGeneratedText] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState('');
            const [copyStatus, setCopyStatus] = useState('Skopiuj dokument');

            const resultRef = useRef(null);

            const generateResponse = async () => {
                if (!inputText.trim()) {
                    setError('Proszę wpisać chociaż krótką notatkę, aby AI miało na czym pracować.');
                    return;
                }

                setIsGenerating(true);
                setError('');
                setGeneratedText('');
                setCopyStatus('Skopiuj dokument');

                try {
                    const apiKey = ""; // Klucz wstrzykiwany przez środowisko
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const systemInstruction = PROMPTS[activeTab];
                    const finalPrompt = `Stwórz dokument na podstawie tych notatek:\n\n"""\n${inputText}\n"""`;

                    const payload = {
                        contents: [{ parts: [{ text: finalPrompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        generationConfig: { temperature: 0.2 } // Niska temperatura dla sztywnego, urzędniczego stylu
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`Błąd API: ${response.status}`);
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        setGeneratedText(text);
                        setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                    } else {
                        throw new Error("Pusta odpowiedź z API.");
                    }

                } catch (err) {
                    console.error("Błąd generowania:", err);
                    setError('Brak połączenia z AI. Wyświetlam dokument demonstracyjny.');
                    
                    // Fallback dla pokazu
                    setTimeout(() => {
                        const demoData = {
                            protokol: "PROTOKÓŁ Z ZEBRANIA Z RODZICAMI\n\nData: 15.05.2024 r.\nMiejsce: Sala nr 12\n\nPorządek zebrania:\n1. Powitanie przybyłych rodziców.\n2. Omówienie bieżących wyników w nauce, ze szczególnym uwzględnieniem przedmiotu matematyka.\n3. Przedstawienie planów dotyczących wycieczki klasowej.\n4. Wolne wnioski i zapytania.\n\nPrzebieg zebrania:\nWychowawca klasy powitał zebranych rodziców (frekwencja wyniosła 30%). W pierwszej części spotkania przeanalizowano wyniki w nauce. Zwrócono szczególną uwagę na trudności w opanowaniu materiału z matematyki. Wychowawca zaapelował o zintensyfikowanie nadzoru rodzicielskiego nad procesem odrabiania prac domowych. Następnie omówiono kwestię planowanego wyjścia do kina w miesiącu czerwcu.\n\nWnioski:\n1. Rodzice zobowiązali się do systematycznego monitorowania postępów edukacyjnych dzieci.\n2. Wyrażono wstępną akceptację dla organizacji wycieczki w czerwcu.\n\n.....................................................\n(podpis protokólanta)",
                            notatka: "NOTATKA SŁUŻBOWA\n\nMiejscowość, data: Warszawa, 12.04.2024 r.\nSporządzający: Jan Kowalski, Nauczyciel wychowania fizycznego\nDotyczy: Zakłócanie porządku lekcji i incydent na przerwie\n\nTreść:\nW dniu dzisiejszym podczas zajęć edukacyjnych uczeń Jakub (klasa VI) permanentnie zakłócał proces dydaktyczny poprzez głośne rozmowy, ignorując wielokrotne upomnienia słowne. Dodatkowo, podczas przerwy międzylekcyjnej o godzinie 10:35, doszło do incydentu polegającego na naruszeniu nietykalności cielesnej innego ucznia (Tomasza). \n\nWnioski i zalecenia:\nZ uwagi na powtarzający się charakter zachowań naruszających przepisy Statutu Szkoły, powiadomiono pedagoga szkolnego w celu objęcia ucznia procedurą wsparcia. Wnioskuję o pilne wezwanie rodziców do szkoły.\n\n.....................................................\n(czytelny podpis)",
                            sprawozdanie: "SPRAWOZDANIE Z WYCIECZKI EDUKACYJNEJ\n\nCel wycieczki:\n1. Realizacja podstawy programowej w zakresie obcowania z dobrami kultury.\n2. Kształtowanie właściwych postaw społecznych i integracja zespołu klasowego.\n3. Uwrażliwienie na sztukę kinematografii.\n\nPrzebieg wyjścia:\nW dniu dzisiejszym zorganizowano wyjście edukacyjne do placówki kinowej. Podopieczni obejrzeli seans filmowy, który posiadał wysokie walory edukacyjne i moralne. \n\nPodsumowanie:\nUczniowie podczas całego czasu trwania wyjścia zachowywali się w sposób bardzo kulturalny, w pełni przestrzegając regulaminu wycieczek szkolnych. Wyjście pozwoliło na realizację założonych celów wychowawczych. \n\n.....................................................\n(podpis kierownika wycieczki)"
                        };
                        setGeneratedText(demoData[activeTab]);
                        setIsGenerating(false);
                    }, 1500);
                } finally {
                    setIsGenerating(false);
                }
            };

            const copyToClipboard = () => {
                if (!generatedText) return;
                const textArea = document.createElement("textarea");
                textArea.value = generatedText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
                setCopyStatus('Skopiowano! ✓');
                setTimeout(() => setCopyStatus('Skopiuj dokument'), 3000);
            };

            return (
                <div className="min-h-screen relative flex flex-col">
                    <div className="hero-glow"></div>

                    {/* NAWIGACJA */}
                    <nav className="fixed top-0 w-full z-50 glass-nav">
                        <div className="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-amber-500 to-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                </div>
                                <span className="text-xl font-extrabold tracking-tight text-white">EduBiurokrata<span className="text-amber-500">AI</span></span>
                            </div>
                            <a href="index.html" className="flex items-center gap-2 text-sm font-bold text-slate-400 hover:text-white transition-colors bg-slate-800/50 hover:bg-slate-700 px-4 py-2 rounded-full border border-slate-700">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                                Wróć do EduBox
                            </a>
                        </div>
                    </nav>

                    <main className="flex-grow pt-32 pb-20 px-4 sm:px-6">
                        <div className="max-w-4xl mx-auto">
                            
                            {/* Nagłówek */}
                            <div className="text-center mb-10 fade-in">
                                <h1 className="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">
                                    Mniej pisania, <span className="text-gradient">więcej spokoju.</span>
                                </h1>
                                <p className="text-slate-400 text-lg max-w-2xl mx-auto">
                                    Wrzuć krótką notatkę, a sztuczna inteligencja zamieni ją w sformalizowany, bezduszny dokument urzędowy, gotowy do podpisania przez dyrektora.
                                </p>
                            </div>

                            {/* Tryby Pracy (Taby) */}
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 fade-in" style={{animationDelay: '0.1s'}}>
                                {[
                                    { id: 'protokol', title: 'Protokół', desc: 'Z zebrania z rodzicami / rady', icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /> },
                                    { id: 'notatka', title: 'Notatka Służbowa', desc: 'O incydencie do teczki ucznia', icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /> },
                                    { id: 'sprawozdanie', title: 'Sprawozdanie', desc: 'Z wycieczki lub wyjścia do kina', icon: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" /> }
                                ].map((tab) => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`p-5 rounded-2xl border-2 transition-all duration-300 text-left flex flex-col gap-2 ${activeTab === tab.id ? 'bg-amber-900/20 border-amber-500 shadow-[0_0_20px_rgba(245,158,11,0.15)]' : 'glass-panel border-slate-700/50 hover:border-slate-600 opacity-70'}`}
                                    >
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${activeTab === tab.id ? 'bg-amber-500 text-amber-950' : 'bg-slate-800 text-slate-400'}`}>
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">{tab.icon}</svg>
                                        </div>
                                        <div>
                                            <h3 className={`font-bold ${activeTab === tab.id ? 'text-white' : 'text-slate-300'}`}>{tab.title}</h3>
                                            <p className="text-xs text-slate-400">{tab.desc}</p>
                                        </div>
                                    </button>
                                ))}
                            </div>

                            {/* Pole Textarea */}
                            <div className="glass-panel p-6 sm:p-8 rounded-3xl fade-in" style={{animationDelay: '0.2s'}}>
                                <label className="block text-white font-bold mb-4 flex items-center justify-between">
                                    <span>Skrótowe notatki (im gorzej napiszesz, tym lepiej AI to naprawi):</span>
                                </label>
                                
                                <textarea 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder={
                                        activeTab === 'protokol' ? "Np. Zebranie 15 maja. Przyszło mało osób. Mówiłem o słabych ocenach z matmy i że jedziemy do kina w czerwcu. Rodzice się zgodzili." :
                                        activeTab === 'notatka' ? "Np. Kuba znów gadał na lekcji, a na przerwie rzucił w Tomka plecakiem. Dzwoniłem do matki." :
                                        "Np. Byliśmy w muzeum 10 października. Dzieci grzeczne. Fajna wystawa o dinozaurach."
                                    }
                                    className="w-full h-32 bg-slate-900/50 border border-slate-700 text-slate-200 rounded-2xl p-4 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 custom-scrollbar resize-y text-sm sm:text-base"
                                ></textarea>

                                {error && (
                                    <div className="mt-4 p-3 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm">{error}</div>
                                )}

                                <div className="mt-6 flex justify-end">
                                    <button 
                                        onClick={generateResponse}
                                        disabled={isGenerating || !inputText.trim()}
                                        className={`px-8 py-4 rounded-xl font-bold text-white transition-all flex items-center gap-2 shadow-lg btn-bounce
                                            ${isGenerating ? 'bg-slate-700 cursor-not-allowed' : 'bg-gradient-to-r from-amber-500 to-red-500 hover:shadow-amber-500/25'}`}
                                    >
                                        {isGenerating ? 'Generowanie...' : 'Generuj Oficjalny Dokument'}
                                    </button>
                                </div>
                            </div>

                            {/* Wynik */}
                            {generatedText && (
                                <div ref={resultRef} className="mt-8 glass-panel p-6 sm:p-8 rounded-3xl fade-in border-amber-500/30 shadow-[0_0_30px_rgba(245,158,11,0.1)]">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
                                        <h3 className="text-xl font-bold text-white flex items-center gap-2">
                                            Gotowy do wydruku
                                        </h3>
                                        <button 
                                            onClick={copyToClipboard}
                                            className="bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 border border-amber-500/50 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors btn-bounce"
                                        >
                                            {copyStatus}
                                        </button>
                                    </div>
                                    
                                    <div className="bg-white p-8 rounded-xl shadow-inner min-h-[300px]">
                                        <p className="text-black whitespace-pre-wrap font-serif text-sm sm:text-base leading-relaxed">
                                            {generatedText}
                                        </p>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* Stopka */}
                    <footer className="py-6 border-t border-slate-800 text-center text-sm font-bold text-slate-600 uppercase tracking-widest mt-auto">
                        Część systemu EduBox AI
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
