<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>EduDialog AI - Asystent Trudnych Rozmów i Opinii</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; /* Głęboki granat/czerń */
            color: #f8fafc; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        /* Szklane panele Premium */
        .glass-panel { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .glass-nav { 
            background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .text-gradient { 
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        /* Wielka poświata w tle (Hero Glow) */
        .hero-glow {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(2, 6, 23, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Efekt wejścia */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 8px; }
        
        /* Animacja ładowania AI */
        .pulse-border {
            animation: pulseBorder 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulseBorder {
            0%, 100% { border-color: rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
            50% { border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURACJA AI ---
        // Prompty systemowe dbające o najwyższy profesjonalizm dokumentów
        const SYSTEM_PROMPT_NVC = `Jesteś ekspertem ds. komunikacji NVC (Porozumienie Bez Przemocy) oraz dyplomacji szkolnej. 
Zadanie: Przekształć surowe, emocjonalne notatki nauczyciela o uczniu w profesjonalną, empatyczną i kulturalną wiadomość do rodzica (np. na e-dziennik Librus/Vulcan).
Zasady:
1. Używaj "metody kanapki" (zacznij od czegoś pozytywnego, przejdź do problemu, zakończ propozycją współpracy).
2. Pisz o faktach, unikaj oceniania i etykietowania ucznia (zamiast "jest leniwy" napisz "obserwuję trudności z zaangażowaniem w zadania").
3. Wyrażaj troskę o ucznia.
4. Zaproponuj konkretny krok (rozmowa telefoniczna, spotkanie, prośba o wsparcie w domu).
5. Zachowaj wysoce profesjonalny, oficjalny, ale ciepły ton.
6. Nie dodawaj wstępów typu "Oto propozycja wiadomości". Podaj sam gotowy tekst do skopiowania.`;

        const SYSTEM_PROMPT_PPP = `Jesteś wybitnym pedagogiem specjalnym i ekspertem ds. diagnozy psychologiczno-pedagogicznej.
Zadanie: Przekształć potoczne notatki nauczyciela w wysoce sformalizowany fragment opinii o uczniu, przeznaczony dla Poradni Psychologiczno-Pedagogicznej (PPP) lub do IPET/WOPFU.
Zasady:
1. Zmień język potoczny na rygorystyczny, naukowy żargon pedagogiczny.
   - Np. "bije innych" -> "przejawia zachowania agresywne i trudności w regulacji emocji"
   - Np. "nie uważa na lekcji" -> "wykazuje deficyty uwagi, ma trudności z koncentracją i utrzymaniem zadania"
   - Np. "nie potrafi czytać" -> "prezentuje opóźnienia w zakresie dekodowania tekstu i technik czytania"
2. Zachowaj obiektywizm i opisowość. Unikaj stygmatyzacji.
3. Konstruuj zdania złożone, profesjonalne, typowe dla oficjalnych orzeczeń.
4. Nie dodawaj wstępów typu "Oto opinia". Zwróć tylko gotowy tekst, podzielony na czytelne akapity (np. Funkcjonowanie emocjonalno-społeczne, Funkcjonowanie poznawcze).`;

        function App() {
            const [activeTab, setActiveTab] = useState('nvc'); // 'nvc' lub 'ppp'
            const [inputText, setInputText] = useState('');
            const [generatedText, setGeneratedText] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState('');
            const [copyStatus, setCopyStatus] = useState('Skopiuj tekst');

            const resultRef = useRef(null);

            // Funkcja do komunikacji z API Gemini
            const generateResponse = async () => {
                if (!inputText.trim()) {
                    setError('Proszę wprowadzić notatki o uczniu.');
                    return;
                }

                setIsGenerating(true);
                setError('');
                setGeneratedText('');
                setCopyStatus('Skopiuj tekst');

                try {
                    const apiKey = ""; // Klawisz wstrzykiwany przez środowisko
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const systemInstruction = activeTab === 'nvc' ? SYSTEM_PROMPT_NVC : SYSTEM_PROMPT_PPP;
                    
                    // Pełny prompt łączący instrukcję i notatki nauczyciela
                    const finalPrompt = `Przekształć poniższe notatki zgodnie z instrukcją systemową.\n\nNotatki nauczyciela:\n"""\n${inputText}\n"""`;

                    const payload = {
                        contents: [{ parts: [{ text: finalPrompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        generationConfig: {
                            temperature: 0.3 // Niska temperatura dla bardziej formalnych, spójnych wyników
                        }
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`Błąd API: ${response.status}`);
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        setGeneratedText(text);
                        // Przewiń płynnie do wyniku
                        setTimeout(() => {
                            resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 100);
                    } else {
                        throw new Error("Pusta odpowiedź z API.");
                    }

                } catch (err) {
                    console.error("Błąd generowania:", err);
                    setError('Przepraszamy, wystąpił błąd podczas łączenia z AI. Spróbuj ponownie.');
                    
                    // Fallback dla demonstracji w przypadku braku klucza API w środowisku
                    setTimeout(() => {
                        const demoText = activeTab === 'nvc' 
                            ? "Szanowni Państwo,\n\nKontaktuję się z Państwem, ponieważ zależy mi na jak najlepszym funkcjonowaniu Jasia w naszej klasie. Zauważyłam, że Jaś ma świetne pomysły i często wykazuje się dużą kreatywnością podczas zajęć plastycznych.\n\nJednocześnie niepokoi mnie zachowanie syna podczas przerw. Obserwuję, że w sytuacjach trudnych Jaś reaguje impulsywnie, co prowadzi do konfliktów z rówieśnikami. Bardzo zależy mi, aby czuł się w szkole bezpiecznie i potrafił lepiej regulować swoje emocje.\n\nChciałabym zaprosić Państwa na krótkie spotkanie lub rozmowę telefoniczną w dogodnym terminie, abyśmy mogli wspólnie zastanowić się, jak wesprzeć Jasia. \n\nZ poważaniem,\nWychowawca"
                            : "Funkcjonowanie emocjonalno-społeczne:\nUczeń wykazuje znaczne trudności w zakresie samoregulacji emocjonalnej oraz kontroli impulsów. W sytuacjach nieustrukturyzowanych (przerwy międzylekcyjne) przejawia zachowania o charakterze agresywnym w stosunku do rówieśników, co dezorganizuje funkcjonowanie grupy i wpływa na obniżenie poczucia bezpieczeństwa. Uczeń ma trudności z adekwatnym odczytywaniem intencji innych oraz przewidywaniem konsekwencji własnych działań.\n\nFunkcjonowanie poznawcze:\nWykazuje deficyty w obszarze koncentracji uwagi. Czas skupienia na zadaniu jest krótkotrwały, uczeń łatwo ulega dystraktorom zewnętrznym, co wymaga od nauczyciela ciągłego monitorowania pracy i zewnętrznego motywowania.";
                        setGeneratedText(demoText);
                        setIsGenerating(false);
                        setError('UWAGA: Wyświetlono tekst demonstracyjny (brak podłączenia do API w tym widoku).');
                    }, 1500);

                } finally {
                    setIsGenerating(false);
                }
            };

            // Kopiowanie do schowka z zabezpieczeniem fallbackowym
            const copyToClipboard = () => {
                if (!generatedText) return;
                
                try {
                    // Próba nowoczesnego API (nie zawsze działa w iframe)
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(generatedText).then(() => {
                            setCopyStatus('Skopiowano! ✓');
                            setTimeout(() => setCopyStatus('Skopiuj tekst'), 3000);
                        });
                    } else {
                        // Fallback z execCommand
                        const textArea = document.createElement("textarea");
                        textArea.value = generatedText;
                        textArea.style.position = "fixed";
                        textArea.style.left = "-999999px";
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();
                        document.execCommand('copy');
                        textArea.remove();
                        setCopyStatus('Skopiowano! ✓');
                        setTimeout(() => setCopyStatus('Skopiuj tekst'), 3000);
                    }
                } catch (err) {
                    setCopyStatus('Błąd kopiowania');
                    console.error('Failed to copy!', err);
                }
            };

            return (
                <div className="min-h-screen relative flex flex-col">
                    <div className="hero-glow"></div>

                    {/* NAWIGACJA */}
                    <nav className="fixed top-0 w-full z-50 glass-nav">
                        <div className="max-w-4xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                                </div>
                                <span className="text-xl font-extrabold tracking-tight text-white">EduDialog<span className="text-blue-500">AI</span></span>
                            </div>
                            <a href="index.html" className="flex items-center gap-2 text-sm font-bold text-slate-400 hover:text-white transition-colors bg-slate-800/50 hover:bg-slate-700 px-4 py-2 rounded-full border border-slate-700">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                                Wróć do EduBox
                            </a>
                        </div>
                    </nav>

                    {/* GŁÓWNA ZAWARTOŚĆ */}
                    <main className="flex-grow pt-32 pb-20 px-4 sm:px-6">
                        <div className="max-w-4xl mx-auto">
                            
                            {/* Nagłówek */}
                            <div className="text-center mb-10 fade-in">
                                <h1 className="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">
                                    Trudne rozmowy, <span className="text-gradient">proste rozwiązania.</span>
                                </h1>
                                <p className="text-slate-400 text-lg max-w-2xl mx-auto">
                                    Wyrzuć z siebie frustrację i obserwacje, a AI zamieni je w profesjonalną wiadomość dla rodzica lub formalną opinię do Poradni Psychologiczno-Pedagogicznej.
                                </p>
                            </div>

                            {/* Przełącznik trybów */}
                            <div className="flex flex-col sm:flex-row gap-4 mb-8 fade-in" style={{animationDelay: '0.1s'}}>
                                <button 
                                    onClick={() => setActiveTab('nvc')}
                                    className={`flex-1 p-6 rounded-3xl border-2 transition-all duration-300 flex items-start gap-4 text-left ${activeTab === 'nvc' ? 'bg-blue-900/20 border-blue-500 shadow-[0_0_30px_rgba(59,130,246,0.15)]' : 'glass-panel border-slate-700/50 hover:border-slate-600 opacity-70'}`}
                                >
                                    <div className={`p-3 rounded-2xl ${activeTab === 'nvc' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400'}`}>
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                    </div>
                                    <div>
                                        <h3 className={`font-bold text-lg mb-1 ${activeTab === 'nvc' ? 'text-white' : 'text-slate-300'}`}>E-dziennik (Rodzic)</h3>
                                        <p className="text-sm text-slate-400">Język korzyści, NVC, empatia i współpraca. Idealne do trudnych wiadomości.</p>
                                    </div>
                                </button>

                                <button 
                                    onClick={() => setActiveTab('ppp')}
                                    className={`flex-1 p-6 rounded-3xl border-2 transition-all duration-300 flex items-start gap-4 text-left ${activeTab === 'ppp' ? 'bg-purple-900/20 border-purple-500 shadow-[0_0_30px_rgba(168,85,247,0.15)]' : 'glass-panel border-slate-700/50 hover:border-slate-600 opacity-70'}`}
                                >
                                    <div className={`p-3 rounded-2xl ${activeTab === 'ppp' ? 'bg-purple-600 text-white' : 'bg-slate-800 text-slate-400'}`}>
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                    </div>
                                    <div>
                                        <h3 className={`font-bold text-lg mb-1 ${activeTab === 'ppp' ? 'text-white' : 'text-slate-300'}`}>Opinia (PPP / IPET)</h3>
                                        <p className="text-sm text-slate-400">Formalny żargon pedagogiczny, diagnoza deficytów, język specjalistyczny.</p>
                                    </div>
                                </button>
                            </div>

                            {/* Panel wprowadzania */}
                            <div className="glass-panel p-6 sm:p-8 rounded-3xl fade-in" style={{animationDelay: '0.2s'}}>
                                <label className="block text-white font-bold mb-4 flex items-center justify-between">
                                    <span>Twoje surowe notatki / obserwacje:</span>
                                    <span className={`text-xs px-2 py-1 rounded-md ${inputText.length > 50 ? 'bg-emerald-900/50 text-emerald-400' : 'bg-slate-800 text-slate-400'}`}>
                                        {inputText.length} znaków
                                    </span>
                                </label>
                                
                                <textarea 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder={activeTab === 'nvc' 
                                        ? "Np. Kuba znowu dzisiaj przeszkadzał na lekcji, ciągle gadał, uderzył Tomka na przerwie. Rodzice muszą coś z tym zrobić, bo ja nie mam siły..."
                                        : "Np. Uczeń nic nie umie z czytania, strasznie wolno sylabizuje, zgaduje wyrazy. Na lekcji się kręci, rysuje po ławce, nie wykonuje moich poleceń."}
                                    className="w-full h-40 bg-slate-900/50 border border-slate-700 text-slate-200 rounded-2xl p-4 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 custom-scrollbar resize-y transition-colors text-sm sm:text-base"
                                ></textarea>

                                {error && (
                                    <div className="mt-4 p-4 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm flex items-start gap-3">
                                        <svg className="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <p>{error}</p>
                                    </div>
                                )}

                                <div className="mt-6 flex justify-end">
                                    <button 
                                        onClick={generateResponse}
                                        disabled={isGenerating || !inputText.trim()}
                                        className={`px-8 py-4 rounded-xl font-bold text-white transition-all flex items-center gap-2 shadow-lg
                                            ${isGenerating ? 'bg-slate-700 cursor-not-allowed' : activeTab === 'nvc' ? 'bg-blue-600 hover:bg-blue-500 hover:shadow-blue-500/25 active:scale-95' : 'bg-purple-600 hover:bg-purple-500 hover:shadow-purple-500/25 active:scale-95'}
                                            disabled:opacity-50 disabled:active:scale-100`}
                                    >
                                        {isGenerating ? (
                                            <>
                                                <svg className="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                                Przetwarzanie AI...
                                            </>
                                        ) : (
                                            <>
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                                                Przekształć w {activeTab === 'nvc' ? 'wiadomość' : 'opinię'}
                                            </>
                                        )}
                                    </button>
                                </div>
                            </div>

                            {/* Miejsce na wynik */}
                            {generatedText && (
                                <div ref={resultRef} className={`mt-8 glass-panel p-6 sm:p-8 rounded-3xl fade-in ${activeTab === 'nvc' ? 'border-blue-500/30 shadow-[0_0_30px_rgba(59,130,246,0.1)]' : 'border-purple-500/30 shadow-[0_0_30px_rgba(168,85,247,0.1)]'}`}>
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
                                        <h3 className="text-xl font-bold text-white flex items-center gap-2">
                                            <span className="text-emerald-400">
                                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                            </span>
                                            Gotowy materiał
                                        </h3>
                                        <button 
                                            onClick={copyToClipboard}
                                            className="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-600 px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-colors active:scale-95"
                                        >
                                            {copyStatus === 'Skopiowano! ✓' ? (
                                                <svg className="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"/></svg>
                                            ) : (
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
                                            )}
                                            {copyStatus}
                                        </button>
                                    </div>
                                    
                                    <div className="bg-[#0f172a] p-6 rounded-2xl border border-slate-700/50">
                                        <p className="text-slate-200 whitespace-pre-wrap leading-relaxed text-sm sm:text-base font-medium">
                                            {generatedText}
                                        </p>
                                    </div>

                                    <div className="mt-4 flex items-start gap-2 text-xs text-slate-500">
                                        <svg className="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        <p>Zawsze przeczytaj wygenerowany tekst i w razie potrzeby dostosuj go do konkretnej sytuacji przed wysłaniem. AI może sporadycznie popełniać błędy.</p>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* STOPKA */}
