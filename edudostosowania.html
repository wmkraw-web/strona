<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>EduDostosowania AI - Wymagania Edukacyjne</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        .glass-panel { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .glass-nav { 
            background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .text-gradient { 
            background: linear-gradient(135deg, #14b8a6 0%, #8b5cf6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .hero-glow {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 800px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.15) 0%, rgba(2, 6, 23, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 8px; }
        
        .btn-bounce:active { transform: scale(0.95); }

        /* Stylizacja wydruku */
        @media print {
            body { background-color: white; color: black; }
            .print-hidden { display: none !important; }
            .glass-panel { border: none; background: transparent; filter: none; padding: 0; }
            .print-content { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const BUY_COFFEE_LINK = "https://buycoffee.to/magiccolor";

        const SUBJECTS = [
            'Edukacja wczesnoszkolna', 'Język polski', 'Matematyka', 'Język obcy (np. angielski)', 
            'Historia', 'Geografia', 'Biologia / Przyroda', 'Fizyka', 'Chemia', 'Wychowanie fizyczne', 'Informatyka'
        ];

        const DIAGNOSES = [
            'Dysleksja rozwojowa', 'Dysortografia / Dysgrafia', 'Dyskalkulia', 
            'ADHD (Nadpobudliwość psychoruchowa)', 'ADD (Zaburzenia koncentracji uwagi)', 
            'Spektrum Autyzmu / Zespół Aspergera', 'Niedosłuch', 'Słabowidzenie',
            'Niepełnosprawność intelektualna w stopniu lekkim', 'Uczeń zdolny / uzdolniony'
        ];

        const SYSTEM_PROMPT = `Jesteś ekspertem ds. edukacji włączającej, pedagogiem specjalnym oraz metodykiem.
Twoje zadanie: Na podstawie wybranego przedmiotu i diagnozy z PPP wygeneruj oficjalny dokument "Dostosowanie wymagań edukacyjnych".
Styl: Wysoce sformalizowany, zgodny z najnowszymi wytycznymi Ministerstwa Edukacji Narodowej (MEN), gotowy do wpięcia w teczkę ucznia i IPET.

Struktura dokumentu, którą musisz zastosować:
1. NAGŁÓWEK: Dostosowanie wymagań edukacyjnych z przedmiotu: [Przedmiot] dla ucznia z diagnozą: [Diagnoza].
2. WARUNKI I FORMY PRACY NA LEKCJI (wypunktowane zasady wsparcia w czasie zajęć, np. miejsce w klasie, czas na odpowiedź, forma przekazu instrukcji).
3. FORMY SPRAWDZANIA WIEDZY I UMIEJĘTNOŚCI (wypunktowane, np. wydłużony czas na sprawdzianie, ustna forma odpowiedzi zamiast pisemnej).
4. KRYTERIA OCENIANIA (wypunktowane zasady oceniania, np. ocenianie wysiłku wkładanego w pracę, nieocenianie błędów ortograficznych, dostosowanie skali ocen).
5. UWAGI DODATKOWE (opcjonalne, w tym te przekazane przez nauczyciela).
6. Miejsce na "Data i podpis nauczyciela: ......................................."`;

        function App() {
            const [selectedSubject, setSelectedSubject] = useState('');
            const [selectedDiagnosis, setSelectedDiagnosis] = useState('');
            const [extraNotes, setExtraNotes] = useState('');
            
            const [generatedText, setGeneratedText] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState('');
            const [copyStatus, setCopyStatus] = useState('Kopiuj');

            const resultRef = useRef(null);

            const generateDocument = async () => {
                if (!selectedSubject || !selectedDiagnosis) {
                    setError('Proszę wybrać przedmiot oraz diagnozę ucznia.');
                    return;
                }

                setIsGenerating(true);
                setError('');
                setGeneratedText('');
                setCopyStatus('Kopiuj');

                try {
                    const apiKey = ""; // Klucz zostanie dodany w środowisku produkcyjnym
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const finalPrompt = `Przedmiot: ${selectedSubject}\nDiagnoza: ${selectedDiagnosis}\nDodatkowe uwagi nauczyciela: ${extraNotes || 'Brak'}`;

                    const payload = {
                        contents: [{ parts: [{ text: finalPrompt }] }],
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        generationConfig: { temperature: 0.2 } // Niska temperatura dla sztywnego stylu
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`Błąd API: ${response.status}`);
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        setGeneratedText(text);
                        setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                    } else {
                        throw new Error("Pusta odpowiedź z API.");
                    }

                } catch (err) {
                    console.error("Błąd generowania:", err);
                    setError('Brak połączenia z chmurą AI. Wczytuję dokument demonstracyjny.');
                    
                    // Fallback dla demonstracji
                    setTimeout(() => {
                        const demoText = `DOSTOSOWANIE WYMAGAŃ EDUKACYJNYCH
Przedmiot: Język polski
Diagnoza: Dysleksja rozwojowa

I. WARUNKI I FORMY PRACY NA LEKCJI:
1. Zapewnienie uczniowi optymalnego miejsca w sali (blisko nauczyciela, z dala od dystraktorów).
2. Wydłużenie czasu na czytanie tekstów o podwyższonym stopniu trudności.
3. Unikanie głośnego czytania nowych tekstów przy całej klasie, chyba że uczeń sam wyrazi taką chęć.
4. Stosowanie powiększonej czcionki w materiałach drukowanych (minimum 12-14 pkt).
5. Podawanie wyraźnych, krótkich instrukcji i upewnianie się, czy uczeń prawidłowo zrozumiał polecenie.

II. FORMY SPRAWDZANIA WIEDZY I UMIEJĘTNOŚCI:
1. Wydłużenie czasu na napisanie sprawdzianu, testu lub wypracowania (zwykle o ok. 25-30%).
2. Możliwość zaliczenia materiału w formie ustnej w przypadku wyraźnych trudności w wypowiedzi pisemnej.
3. Czytanie poleceń w sprawdzianach przez nauczyciela w razie zgłoszenia takiej potrzeby przez ucznia.
4. Zezwolenie na korzystanie ze słowników ortograficznych w trakcie pisania prac samodzielnych.

III. KRYTERIA OCENIANIA:
1. Nieobniżanie ocen za błędy ortograficzne (specyficzne dla dysleksji).
2. Ocenianie przede wszystkim wiedzy merytorycznej, argumentacji oraz logiki wypowiedzi, a nie strony graficznej pisma.
3. Branie pod uwagę wysiłku ucznia i jego zaangażowania w proces edukacyjny.

Data i podpis nauczyciela: .......................................`;
                        setGeneratedText(demoText);
                        setIsGenerating(false);
                    }, 1500);
                } finally {
                    setIsGenerating(false);
                }
            };

            const copyToClipboard = () => {
                if (!generatedText) return;
                const textArea = document.createElement("textarea");
                textArea.value = generatedText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
                setCopyStatus('Skopiowano! ✓');
                setTimeout(() => setCopyStatus('Kopiuj'), 3000);
            };

            const printDocument = () => {
                window.print();
            };

            return (
                <div className="min-h-screen relative flex flex-col print:bg-white">
                    <div className="hero-glow print-hidden"></div>

                    {/* NAWIGACJA Z PRZYCISKIEM KAWY */}
                    <nav className="fixed top-0 w-full z-50 glass-nav print-hidden">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-teal-400 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-teal-500/20">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                                </div>
                                <span className="text-xl font-extrabold tracking-tight text-white hidden sm:block">EduDostosowania<span className="text-teal-400">AI</span></span>
                            </div>
                            
                            <div className="flex items-center gap-2 sm:gap-4">
                                <a href={BUY_COFFEE_LINK} target="_blank" className="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-xl text-xs sm:text-sm font-bold shadow-[0_0_15px_rgba(217,119,6,0.4)] transition-all btn-bounce flex items-center gap-2 uppercase tracking-wide">
                                    <span>☕</span> <span className="hidden sm:inline">Postaw Kawę</span>
                                </a>

                                <a href="index.html" className="flex items-center gap-2 text-xs sm:text-sm font-bold text-slate-400 hover:text-white transition-colors bg-slate-800/50 hover:bg-slate-700 px-3 sm:px-4 py-2 rounded-xl border border-slate-700">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                                    <span className="hidden sm:inline">Wróć</span>
                                </a>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-32 pb-20 px-4 sm:px-6 print:pt-0 print:pb-0">
                        <div className="max-w-5xl mx-auto">
                            
                            {/* Nagłówek */}
                            <div className="text-center mb-10 fade-in print-hidden">
                                <div className="inline-flex items-center gap-2 bg-teal-900/30 border border-teal-500/30 px-4 py-1.5 rounded-full text-[10px] font-black text-teal-400 uppercase tracking-widest mb-4">
                                    Narzędzie Ochrony Prawnej i IPET
                                </div>
                                <h1 className="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">
                                    Dostosowania <span className="text-gradient">na tacy.</span>
                                </h1>
                                <p className="text-slate-400 text-lg max-w-2xl mx-auto">
                                    Wybierz przedmiot i diagnozę z PPP, a AI wygeneruje gotowy do wydruku i wpięcia w teczkę dokument z metodami pracy i kryteriami oceniania ucznia.
                                </p>
                            </div>

                            {/* Panel Sterowania */}
                            <div className="glass-panel p-6 sm:p-8 rounded-[2rem] fade-in border border-slate-700/50 print-hidden" style={{animationDelay: '0.1s'}}>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 mb-8">
                                    <div>
                                        <label className="block text-white font-bold mb-3 text-sm uppercase tracking-wider flex items-center gap-2">
                                            <span className="text-teal-400">1.</span> Wybierz diagnozę / potrzebę ucznia:
                                        </label>
                                        <select 
                                            value={selectedDiagnosis} 
                                            onChange={(e) => setSelectedDiagnosis(e.target.value)}
                                            className="w-full bg-slate-900 border border-slate-600 text-white rounded-xl p-4 focus:ring-2 focus:ring-teal-500 outline-none"
                                        >
                                            <option value="" disabled>--- Wybierz z listy ---</option>
                                            {DIAGNOSES.map(d => <option key={d} value={d}>{d}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-white font-bold mb-3 text-sm uppercase tracking-wider flex items-center gap-2">
                                            <span className="text-teal-400">2.</span> Wybierz nauczany przedmiot:
                                        </label>
                                        <select 
                                            value={selectedSubject} 
                                            onChange={(e) => setSelectedSubject(e.target.value)}
                                            className="w-full bg-slate-900 border border-slate-600 text-white rounded-xl p-4 focus:ring-2 focus:ring-teal-500 outline-none"
                                        >
                                            <option value="" disabled>--- Wybierz z listy ---</option>
                                            {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-white font-bold mb-3 text-sm uppercase tracking-wider flex items-center gap-2">
                                        <span className="text-teal-400">3.</span> Twoje uwagi do dokumentu (opcjonalnie):
                                    </label>
                                    <textarea 
                                        value={extraNotes}
                                        onChange={(e) => setExtraNotes(e.target.value)}
                                        placeholder="Np. Uczeń słabo widzi na lewe oko, musi siedzieć w pierwszej ławce przy oknie. Bardzo stresuje się przy odpowiedzi ustnej."
                                        className="w-full h-24 bg-slate-900/50 border border-slate-700 text-slate-200 rounded-xl p-4 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 custom-scrollbar resize-y text-sm"
                                    ></textarea>
                                </div>

                                {error && <div className="mt-4 p-4 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm font-medium text-center">{error}</div>}

                                <div className="mt-8 flex justify-center">
                                    <button 
                                        onClick={generateDocument}
                                        disabled={isGenerating || !selectedSubject || !selectedDiagnosis}
                                        className={`w-full sm:w-auto px-10 py-5 rounded-2xl font-black text-white text-lg transition-all flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(20,184,166,0.2)] btn-bounce
                                            ${(isGenerating || !selectedSubject || !selectedDiagnosis) ? 'bg-slate-700 cursor-not-allowed' : 'bg-gradient-to-r from-teal-500 to-purple-600 hover:scale-105'}`}
                                    >
                                        {isGenerating ? (
                                            <><svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Przetwarzanie wytycznych MEN...</>
                                        ) : 'Wygeneruj Oficjalny Dokument'}
                                    </button>
                                </div>
                            </div>

                            {/* Sekcja Wyników */}
                            {generatedText && (
                                <div ref={resultRef} className="mt-12 fade-in print:mt-0">

                                    <div className="glass-panel p-8 sm:p-12 rounded-[2.5rem] border border-teal-500/30 shadow-[0_0_40px_rgba(20,184,166,0.15)] relative overflow-hidden bg-white print:shadow-none print:border-none print:p-0 print:rounded-none">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 to-purple-600 print-hidden"></div>
                                        
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 print-hidden border-b border-slate-200 pb-4">
                                            <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                                <svg className="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                                Gotowe "Dostosowania"
                                            </h3>
                                            <div className="flex gap-2 w-full sm:w-auto">
                                                <button onClick={copyToClipboard} className="flex-1 sm:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 px-4 py-2 rounded-xl text-sm font-bold transition-all btn-bounce text-center">
                                                    {copyStatus}
                                                </button>
                                                <button onClick={printDocument} className="flex-1 sm:flex-none bg-teal-600 hover:bg-teal-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all btn-bounce shadow-md shadow-teal-500/30">
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                                                    Drukuj Dokument
                                                </button>
                                            </div>
                                        </div>

                                        <div className="text-black print-content whitespace-pre-wrap">
                                            {generatedText}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-8 text-center bg-slate-900/50 p-6 rounded-2xl border border-slate-800 print-hidden max-w-xl mx-auto">
                                        <p className="text-slate-400 mb-3 font-medium">Uratowaliśmy Cię przed studiowaniem wytycznych prawnych?</p>
                                        <a href={BUY_COFFEE_LINK} target="_blank" className="inline-flex items-center gap-2 text-teal-400 hover:text-teal-300 font-bold hover:underline">
                                            Postaw systemowi EduBox wirtualną kawę ☕!
                                        </a>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    <footer className="py-6 border-t border-slate-800 text-center text-sm font-bold text-slate-600 uppercase tracking-widest mt-auto print-hidden">
                        Część systemu EduBox AI
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
