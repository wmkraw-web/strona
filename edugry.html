<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGry AI - Generator Gier Edukacyjnych</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Nunito:wght@700;800;900&display=swap');
        
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; overflow-x: hidden; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .kids-font { font-family: 'Nunito', sans-serif; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input:focus, select:focus, textarea:focus { box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); border-color: #e11d48 !important; }

        @media print {
            body { background: white; color: black; }
            .print-hidden { display: none !important; }
            #print-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; background: white !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .page-break { page-break-after: always; }
            .page-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .cut-line { border: 2px dashed #94a3b8 !important; }
        }
        
        @keyframes slide-up { 0% { opacity: 0; transform: translate(-50%, 20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        .animate-toast { animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .bot-bubble { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes blink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        .bot-eye { animation: blink 4s infinite; transform-origin: center; }
        
        .dark-grid-bg {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Gamepad2: <><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></>,
                Grid: <><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></>,
                Layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                HelpCircle: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const BotHelperAvatar = () => (
            <svg viewBox="0 0 100 100" className="w-14 h-14 drop-shadow-md flex-shrink-0" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 30 V15" stroke="#fca5a5" strokeWidth="4" strokeLinecap="round"/>
                <circle cx="50" cy="12" r="5" fill="#f43f5e"/>
                <rect x="25" y="30" width="50" height="40" rx="12" fill="#be123c"/>
                <rect x="32" y="38" width="36" height="22" rx="6" fill="#ffffff"/>
                <circle cx="40" cy="49" r="3.5" fill="#be123c" className="bot-eye"/>
                <circle cx="60" cy="49" r="3.5" fill="#be123c" className="bot-eye"/>
                <path d="M 45 56 Q 50 60 55 56" stroke="#be123c" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
            </svg>
        );

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [toastMessage, setToastMessage] = useState('');
            const [showInstructions, setShowInstructions] = useState(false);
            
            const [activeTab, setActiveTab] = useState('jamam');
            const [botMessage, setBotMessage] = useState("Witaj! Gry edukacyjne to najlepszy sposób na powtórkę. Wpisz listę słówek po lewej stronie, a ja je potasuję i zamienię w piękne karty do gry.");

            const [wordsInput, setWordsInput] = useState('Kotek\nPiesek\nŻaba\nChomik\nPapuga\nRyba\nKrólik\nJaszczurka\nŻółw\nWąż');
            
            // Parametry Bingo
            const [bingoSize, setBingoSize] = useState('3'); // 3x3 lub 4x4
            const [bingoCount, setBingoCount] = useState(10); // Liczba plansz do wygenerowania
            
            // Parametry "Ja mam"
            const [cardTheme, setCardTheme] = useState('blue');

            const [generatedCards, setGeneratedCards] = useState(null);

            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(''), 4000); };

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { 
                    setIsPremium(true); setAccessCode(''); 
                    showToast('Kod Premium aktywny! 🌟');
                    setBotMessage("Premium odblokowane! Możesz teraz wygenerować dowolną liczbę kart BINGO i gigantyczne talie 'Ja mam, kto ma'.");
                } else { showToast('Nieprawidłowy kod dostępu!'); }
            };

            // Pomocnicza funkcja do tasowania tablicy (Fisher-Yates)
            const shuffleArray = (array) => {
                const newArray = [...array];
                for (let i = newArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
                }
                return newArray;
            };

            const generateGame = () => {
                const wordsList = wordsInput.split('\n').map(w => w.trim()).filter(w => w.length > 0);
                
                if (wordsList.length < 3) {
                    showToast('Wpisz co najmniej 3 słowa/pojęcia!');
                    return;
                }

                if (activeTab === 'jamam') {
                    // Generowanie "Ja mam, kto ma?"
                    const shuffled = shuffleArray(wordsList);
                    const cards = [];
                    
                    for (let i = 0; i < shuffled.length; i++) {
                        const currentWord = shuffled[i];
                        const nextWord = shuffled[(i + 1) % shuffled.length]; // Zapętlenie
                        cards.push({ mam: currentWord, szukam: nextWord });
                    }
                    
                    setGeneratedCards({ type: 'jamam', cards: cards });
                    setBotMessage(`Super! Wygenerowałem ${cards.length} pięknych kart. Rozdaj je dzieciom - pierwsza osoba czyta swoją kartę i gra zapętli się aż wróci do startu!`);
                } 
                else if (activeTab === 'bingo') {
                    // Generowanie BINGO
                    const size = parseInt(bingoSize);
                    const cellsNeeded = size * size;
                    
                    if (wordsList.length < cellsNeeded) {
                        showToast(`Do planszy ${size}x${size} potrzebujesz minimum ${cellsNeeded} słów! Dopisz więcej.`);
                        return;
                    }

                    if (!isPremium && bingoCount > 5) {
                        showToast('Wersja darmowa pozwala na max 5 plansz. Użyj kodu Premium!');
                        setBingoCount(5);
                        return;
                    }

                    const boards = [];
                    for (let i = 0; i < bingoCount; i++) {
                        // Tasujemy słowa i bierzemy wymaganą ilość (np. 9 dla 3x3)
                        const boardWords = shuffleArray(wordsList).slice(0, cellsNeeded);
                        boards.push(boardWords);
                    }

                    setGeneratedCards({ type: 'bingo', boards: boards, size: size });
                    setBotMessage(`Wygenerowałem ${bingoCount} unikalnych plansz BINGO! Każde dziecko dostanie inny układ słów. Świetna robota!`);
                }
            };

            // Paleta kolorów dla kart "Ja mam, kto ma"
            const themeColors = {
                blue: { bg: 'bg-blue-50', border: 'border-blue-400', top: 'bg-blue-500', text: 'text-blue-800' },
                emerald: { bg: 'bg-emerald-50', border: 'border-emerald-400', top: 'bg-emerald-500', text: 'text-emerald-800' },
                rose: { bg: 'bg-rose-50', border: 'border-rose-400', top: 'bg-rose-500', text: 'text-rose-800' },
                amber: { bg: 'bg-amber-50', border: 'border-amber-400', top: 'bg-amber-500', text: 'text-amber-800' },
                purple: { bg: 'bg-purple-50', border: 'border-purple-400', top: 'bg-purple-500', text: 'text-purple-800' }
            };

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden">
                    {toastMessage && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-rose-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm animate-toast flex items-center gap-3 border border-rose-400">
                            <Icon name="AlertCircle" size={18} /> {toastMessage}
                        </div>
                    )}

                    <nav className="fixed top-0 w-full z-50 glass-nav py-4 px-6 print-hidden">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3 font-extrabold text-xl tracking-tight cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className="bg-gradient-to-br from-rose-500 to-pink-600 p-2 rounded-xl text-white shadow-[0_0_15px_rgba(225,29,72,0.5)]">
                                    <Icon name="Gamepad2" size={22}/>
                                </div>
                                <span>Edu<span className="text-rose-500">Gry</span> AI</span>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button onClick={() => setShowInstructions(true)} className="flex items-center space-x-2 text-rose-400 hover:text-rose-300 hover:bg-slate-800 px-4 py-2 rounded-xl font-bold transition-colors border border-transparent hover:border-slate-700">
                                    <Icon name="HelpCircle" size={20} /> <span className="hidden sm:inline">Jak grać?</span>
                                </button>
                                {!isPremium && (
                                    <div className="hidden md:flex items-center space-x-2 bg-slate-900 p-1.5 rounded-xl border border-slate-700">
                                        <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-white placeholder-slate-500"/>
                                        <button onClick={handleVerifyCode} className="p-2 text-white rounded-lg bg-rose-600 hover:bg-rose-500 transition-colors shadow-md"><Icon name="Lock" size={16}/></button>
                                    </div>
                                )}
                                <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 text-sm shadow-md">
                                    <Icon name="Coffee" size={18} className="text-amber-400"/><span>Postaw Kawę</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 pt-32 pb-24 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0 relative z-10">
                        
                        {/* LEWY PANEL (KONTROLKI) */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            <div className="glass-panel p-2 rounded-2xl flex gap-2">
                                <button onClick={() => setActiveTab('jamam')} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all duration-300 ${activeTab === 'jamam' ? 'bg-rose-600 text-white shadow-lg border border-rose-500' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name="Layers" size={24} className="mb-2" /> Ja mam, kto ma?
                                </button>
                                <button onClick={() => setActiveTab('bingo')} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all duration-300 ${activeTab === 'bingo' ? 'bg-indigo-600 text-white shadow-lg border border-indigo-500' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name="Grid" size={24} className="mb-2" /> Karty BINGO
                                </button>
                            </div>

                            <div className="glass-panel p-6 md:p-8 rounded-[2rem] space-y-5 relative overflow-hidden">
                                <h2 className={`font-bold flex items-center text-sm uppercase tracking-widest border-b border-slate-700/50 pb-4 ${activeTab === 'jamam' ? 'text-rose-400' : 'text-indigo-400'}`}>
                                    <Icon name={activeTab === 'jamam' ? 'Layers' : 'Grid'} className="mr-2" size={18}/> 
                                    Konfiguracja Gry
                                </h2>

                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase block mb-2">Baza Słów / Pojęć</label>
                                    <textarea 
                                        value={wordsInput} 
                                        onChange={e=>setWordsInput(e.target.value)} 
                                        placeholder="Wpisz słowa (każde w nowej linijce), np. Pies, Kot, Statek..." 
                                        className={`w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm focus:border-${activeTab === 'jamam' ? 'rose' : 'indigo'}-500 h-48 resize-none custom-scrollbar font-medium leading-relaxed`} 
                                    />
                                    <p className="text-[10px] text-slate-500 mt-2 text-right">Liczba pojęć: {wordsInput.split('\n').filter(w => w.trim().length > 0).length}</p>
                                </div>

                                {activeTab === 'jamam' && (
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase block mb-2">Kolor Kart</label>
                                        <div className="flex gap-2">
                                            {Object.keys(themeColors).map(color => (
                                                <button key={color} onClick={() => setCardTheme(color)} className={`w-8 h-8 rounded-full border-2 transition-all ${cardTheme === color ? 'border-white scale-110 shadow-md' : 'border-transparent opacity-50 hover:opacity-100'}`} style={{backgroundColor: color === 'emerald' ? '#10b981' : color === 'rose' ? '#f43f5e' : color === 'amber' ? '#f59e0b' : color === 'purple' ? '#a855f7' : '#3b82f6'}}></button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'bingo' && (
                                    <>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-2">Rozmiar Planszy</label>
                                            <select value={bingoSize} onChange={e=>setBingoSize(e.target.value)} className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm focus:border-indigo-500 appearance-none font-bold">
                                                <option value="3" className="bg-slate-900">3 x 3 (9 haseł)</option>
                                                <option value="4" className="bg-slate-900">4 x 4 (16 haseł)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-2">Liczba kart dla uczniów</label>
                                            <input type="number" min="1" max={isPremium ? "100" : "5"} value={bingoCount} onChange={e=>setBingoCount(e.target.value)} className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm focus:border-indigo-500 font-bold" />
                                            {!isPremium && <p className="text-[9px] text-indigo-400 mt-1 uppercase font-bold">Darmowa wersja: Max 5 plansz</p>}
                                        </div>
                                    </>
                                )}

                                <button onClick={generateGame} className={`w-full text-white py-4 rounded-xl font-black text-sm tracking-widest shadow-lg flex justify-center items-center gap-2 transition-all active:scale-95 uppercase mt-4 ${activeTab === 'jamam' ? 'bg-rose-600 hover:bg-rose-500 shadow-rose-500/20' : 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-500/20'}`}>
                                    <Icon name="Sparkles" size={20}/> Generuj do Druku
                                </button>
                            </div>

                            <div className="p-5 rounded-3xl shadow-lg border flex items-start gap-4 transition-colors bg-slate-800/50 border-slate-700">
                                <BotHelperAvatar />
                                <div className="flex-1 pt-1">
                                    <h4 className="font-black text-xs uppercase tracking-widest mb-1.5 text-rose-400">EduBot Rozrywka</h4>
                                    <p className="text-sm font-medium leading-relaxed text-slate-300 bot-bubble" key={botMessage}>{botMessage}</p>
                                </div>
                            </div>
                        </div>

                        {/* PRAWY PANEL (WYNIK DO DRUKU) */}
                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10 print:block">
                            {!generatedCards ? (
                                <div className="glass-panel w-full max-w-[210mm] min-h-[297mm] shadow-2xl p-8 rounded-[2rem] flex flex-col items-center justify-center text-center space-y-6 print-hidden border-2 border-dashed border-slate-700 opacity-60">
                                    <div className="p-6 bg-slate-800/50 rounded-full border border-slate-700 shadow-inner">
                                        <Icon name="Gamepad2" size={64} className={activeTab === 'jamam' ? 'text-rose-500' : 'text-indigo-500'} />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-bold mb-3 text-white">Tutaj pojawią się Twoje gry</h2>
                                        <p className="max-w-md mx-auto text-slate-400 leading-relaxed text-sm">Wpisz listę słówek. My zajmiemy się matematyką, przetasujemy je i ułożymy w formacie gotowym do druku i wycięcia!</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full max-w-[210mm] animate-[reveal_0.5s_ease-out] print:max-w-full">
                                    <div className="flex justify-end gap-3 mb-6 print-hidden bg-slate-900/50 p-2 rounded-2xl border border-slate-800 backdrop-blur-md">
                                        <button onClick={() => window.print()} className={`w-full hover:bg-slate-50 text-slate-900 px-6 py-4 rounded-xl font-black flex items-center justify-center gap-3 transition-all text-sm active:scale-95 uppercase tracking-widest shadow-xl ${generatedCards.type === 'jamam' ? 'bg-rose-100' : 'bg-indigo-100'}`}>
                                            <Icon name="Printer" size={20}/> Wydrukuj Projekt (Zapisz PDF)
                                        </button>
                                    </div>

                                    {/* KARTKA A4 DO DRUKU */}
                                    <div id="print-container" className="bg-white shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-10 text-slate-900 rounded-sm min-h-[297mm] kids-font flex flex-col">
                                        
                                        <div className="print-hidden mb-6 flex items-center justify-center text-slate-400 text-xs font-bold uppercase tracking-widest gap-2 pb-4 border-b border-slate-200">
                                            <Icon name="Gamepad2" size={16} /> Podgląd Wydruku
                                        </div>

                                        {generatedCards.type === 'jamam' && (
                                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-6 auto-rows-max">
                                                {generatedCards.cards.map((card, idx) => (
                                                    <div key={idx} className={`cut-line border-2 ${themeColors[cardTheme].border} rounded-2xl overflow-hidden flex flex-col ${themeColors[cardTheme].bg} shadow-sm page-break-inside-avoid h-56 relative`}>
                                                        {/* Górna część: "Ja mam" */}
                                                        <div className={`${themeColors[cardTheme].top} text-white text-center py-2 text-xs font-black uppercase tracking-widest`}>
                                                            Ja mam:
                                                        </div>
                                                        <div className={`flex-1 flex items-center justify-center text-2xl font-black text-center p-4 ${themeColors[cardTheme].text} leading-tight`}>
                                                            {card.mam}
                                                        </div>
                                                        
                                                        {/* Rozdzielacz */}
                                                        <div className={`border-t-2 border-dashed ${themeColors[cardTheme].border} opacity-50`}></div>

                                                        {/* Dolna część: "Kto ma" */}
                                                        <div className="bg-white/50 text-center py-2 text-[10px] font-black uppercase tracking-widest text-slate-500">
                                                            Kto ma:
                                                        </div>
                                                        <div className={`flex-1 flex items-center justify-center text-xl font-bold text-center p-3 text-slate-700 leading-tight`}>
                                                            {card.szukam} ?
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {generatedCards.type === 'bingo' && (
                                            <div className="flex flex-col gap-16">
                                                {generatedCards.boards.map((board, idx) => (
                                                    <div key={idx} className="page-break-inside-avoid">
                                                        <div className="text-center mb-6">
                                                            <h1 className="text-4xl font-black tracking-widest uppercase text-indigo-900" style={{ letterSpacing: '0.3em' }}>B I N G O</h1>
                                                            <p className="text-xs font-bold text-slate-400 mt-2 uppercase tracking-widest">Karta ucznia #{idx + 1}</p>
                                                        </div>
                                                        
                                                        <div className="bg-indigo-50 p-2 rounded-[2rem] border-4 border-indigo-900 shadow-lg">
                                                            <div 
                                                                className="grid gap-2 bg-indigo-900 border-2 border-indigo-900 rounded-[1.5rem] overflow-hidden p-2"
                                                                style={{ gridTemplateColumns: `repeat(${generatedCards.size}, minmax(0, 1fr))` }}
                                                            >
                                                                {board.map((word, cellIdx) => (
                                                                    <div key={cellIdx} className="bg-white aspect-square flex items-center justify-center p-2 text-center rounded-xl shadow-sm border border-slate-100">
                                                                        <span className="font-bold text-slate-800 text-sm sm:text-base leading-tight break-words hyphens-auto">
                                                                            {word}
                                                                        </span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {showInstructions && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md print-hidden">
                            <div className="glass-panel w-full max-w-2xl max-h-[90vh] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col font-sans border border-slate-700">
                                <div className="flex justify-between items-center p-6 border-b border-slate-700 bg-slate-900/80 flex-shrink-0">
                                    <h2 className="text-xl font-black text-white flex items-center gap-3"><Icon name="Gamepad2" className="text-rose-500"/> Jak grać?</h2>
                                    <button onClick={() => setShowInstructions(false)} className="p-2 hover:bg-slate-800 rounded-xl transition-colors text-slate-400 hover:text-white font-bold text-lg">✕</button>
                                </div>

                                <div className="p-6 md:p-8 overflow-y-auto space-y-6 text-sm text-slate-300 custom-scrollbar bg-slate-900/50">
                                    <div className="space-y-3 bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                                        <h3 className="font-bold text-rose-400 text-lg border-b border-slate-700 pb-2">🃏 "Ja mam, kto ma?"</h3>
                                        <p>To genialna gra na koncentrację dla całej klasy! System sam układa słowa w "zamkniętą pętlę".</p>
                                        <ol className="list-decimal pl-5 space-y-1 text-slate-400">
                                            <li>Wydrukuj i wytnij karty, a następnie rozdaj je uczniom.</li>
                                            <li>Zaczyna losowy uczeń, czytając swoją kartę np: "Ja mam Psa. Kto ma Kota?".</li>
                                            <li>Osoba z napisem "Ja mam Kota" na górze swojej karty musi szybko się odezwać i przeczytać swoją!</li>
                                            <li>Gra kończy się, gdy wrócicie do pierwszej osoby.</li>
                                        </ol>
                                    </div>

                                    <div className="space-y-3 bg-slate-800/50 p-5 rounded-2xl border border-slate-700">
                                        <h3 className="font-bold text-indigo-400 text-lg border-b border-slate-700 pb-2">🎲 Klasyczne BINGO</h3>
                                        <p>Zamiast używać pustych plansz do samodzielnego wypełniania przez dzieci, wygeneruj gotowe, unikalne karty dla każdego ucznia!</p>
                                        <ol className="list-decimal pl-5 space-y-1 text-slate-400">
                                            <li>Wpisz dużo pojęć z ostatniego działu (np. daty, słówka po angielsku). Dla 3x3 wpisz co najmniej 9, dla 4x4 co najmniej 16.</li>
                                            <li>Wydrukuj i rozdaj uczniom unikalne plansze.</li>
                                            <li>Ty czytasz np. definicje lub polskie tłumaczenia, a uczniowie skreślają hasła na kartach! Pierwszy, kto skreśli linię, krzyczy BINGO!</li>
                                        </ol>
                                    </div>

                                    <div className="text-center pt-4">
                                        <button onClick={() => setShowInstructions(false)} className="bg-rose-600 hover:bg-rose-500 text-white px-10 py-4 rounded-xl font-black shadow-[0_0_20px_rgba(225,29,72,0.3)] transition-all active:scale-95 text-base tracking-wide w-full sm:w-auto uppercase">
                                            Zrozumiałem!
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
