<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduNowość 2025 AI - Edukacja Obywatelska i Zdrowotna</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; }
        .scenario-page { font-family: 'Lora', serif; line-height: 1.7; color: #1e293b; }

        @media print {
            body { background: white; }
            .print-hidden { display: none !important; }
            #scenario-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .civic-gradient { background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); }
        .health-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>,
                HeartPulse: <><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const PREDEFINED_TOPICS = {
            civic: [
                "Jak rozpoznać Fake News i manipulację w sieci?",
                "Wybory do samorządu uczniowskiego - jak to działa?",
                "Prawa i obowiązki obywatela RP",
                "Podatki - na co idą nasze pieniądze?",
                "Konstytucja w życiu codziennym ucznia",
                "Debata Oksfordzka: Wolność słowa a mowa nienawiści"
            ],
            health: [
                "Higiena cyfrowa i detoks od smartfona",
                "Zdrowie psychiczne: Jak radzić sobie ze stresem i presją ocen?",
                "Zaburzenia odżywiania i zdrowy stosunek do ciała",
                "Asertywność: Jak mówić 'NIE' grupie rówieśniczej?",
                "Znaczenie snu dla rozwoju mózgu nastolatka",
                "Pierwsza pomoc emocjonalna - jak wspierać rówieśników?"
            ]
        };

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            
            const [subject, setSubject] = useState('civic'); // 'civic' or 'health'
            const [params, setParams] = useState({
                topic: '',
                age: 'Klasy 4-6 Szkoły Podstawowej',
                duration: '45 minut',
                method: 'Symulacja / Gra ról'
            });

            const [scenario, setScenario] = useState(null);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { setIsPremium(true); setAccessCode(''); } 
                else alert('Błędny kod!');
            };

            const generateScenario = async () => {
                if (!params.topic.trim()) return alert('Wybierz lub wpisz temat zajęć!');
                setIsGenerating(true);
                
                const subjectName = subject === 'civic' ? 'Edukacja Obywatelska' : 'Edukacja Zdrowotna';
                
                const systemPrompt = `Jesteś wybitnym polskim metodykiem i edukatorem, ekspertem w tworzeniu nowoczesnych scenariuszy lekcji dla nowego przedmiotu szkolnego: ${subjectName}. 
                Odpowiadaj WYŁĄCZNIE poprawnym formatem JSON. Nie dodawaj żadnego formatowania markdown poza JSON.
                Struktura JSON:
                {
                  "title": "Tytuł lekcji",
                  "main_goal": "Główny cel lekcji",
                  "hook": "Haczyk (Jak zaintrygować klasę w pierwszych 5 minutach?)",
                  "phases": [
                    { "step_name": "Nazwa etapu", "time": "X min", "details": "Szczegółowy opis dla nauczyciela..." }
                  ],
                  "simulation": "Bardzo dokładny opis scenki rodzajowej, debaty lub gry symulacyjnej, w której uczniowie biorą aktywny udział (podaj role i zasady gry)",
                  "discussion_questions": ["Pytanie 1", "Pytanie 2", "Pytanie 3"],
                  "homework": "Praktyczne zadanie domowe (nie pisanie eseju, lecz np. zrobienie ankiety w domu, sprawdzenie źródła informacji, itp.)"
                }`;

                const userPrompt = `Przedmiot: ${subjectName}. Temat: ${params.topic}. Grupa docelowa: ${params.age}. Czas: ${params.duration}. Główna metoda pracy: ${params.method}. Stwórz nowoczesny, odważny i angażujący uczniów scenariusz, unikający nudnych wykładów.`;

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: userPrompt, system: systemPrompt })
                    });
                    
                    if (!res.ok) throw new Error("Błąd serwera");
                    
                    const data = await res.json();
                    let text = data.text;
                    const start = text.indexOf('{');
                    const end = text.lastIndexOf('}');
                    setScenario(JSON.parse(text.substring(start, end + 1)));
                } catch (error) {
                    console.error(error); 
                    alert("Serwer przeciążony. Spróbuj ponownie.");
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const exportToWord = () => {
                if(!scenario) return;
                const content = document.getElementById('scenario-container').innerHTML;
                const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Scenariusz ${subject === 'civic' ? 'Obywatelski' : 'Zdrowotny'}</title><style>body {font-family: Arial; font-size: 11pt;} h1 {font-size: 18pt; color: ${subject === 'civic' ? '#1e40af' : '#065f46'};} h2 {font-size: 14pt; border-bottom: 2px solid ${subject === 'civic' ? '#3b82f6' : '#10b981'}; padding-bottom: 5px; margin-top: 20px;} b {color: #1e293b;}</style></head><body>`;
                const footer = `</body></html>`;
                const blob = new Blob(['\ufeff', header + content + footer], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Scenariusz_${subject === 'civic' ? 'Obywatelski' : 'Zdrowotny'}_${scenario.title.replace(/\s+/g, '_')}.doc`;
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    {/* EKRAN ŁADOWANIA */}
                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex flex-col items-center justify-center text-white">
                            <div className="bg-white p-8 rounded-3xl flex flex-col items-center space-y-4 max-w-sm text-slate-800 shadow-2xl">
                                <div className={`w-16 h-16 border-8 rounded-full animate-spin ${subject === 'civic' ? 'border-blue-100 border-t-blue-600' : 'border-emerald-100 border-t-emerald-600'}`}></div>
                                <h3 className="text-xl font-black text-center">Analizuję podstawę programową...</h3>
                                <p className="text-xs text-slate-500 text-center font-medium">To potrwa około 15 sekund.</p>
                            </div>
                        </div>
                    )}

                    {/* NAWIGACJA */}
                    <nav className="bg-white border-b px-6 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-xl tracking-tight text-slate-800">
                            <div className={`${subject === 'civic' ? 'bg-blue-600 shadow-blue-200' : 'bg-emerald-600 shadow-emerald-200'} p-2.5 rounded-xl text-white shadow-lg transition-colors`}>
                                <Icon name={subject === 'civic' ? 'Shield' : 'HeartPulse'} size={24}/>
                            </div>
                            <span className="hidden sm:inline">Edu<span className={subject === 'civic' ? 'text-blue-600' : 'text-emerald-600'}>Nowość</span> 2025 AI</span>
                        </div>
                        <div className="flex items-center space-x-3">
                            {!isPremium && (
                                <div className="hidden md:flex items-center space-x-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium"/>
                                    <button onClick={handleVerifyCode} className={`p-2 text-white rounded-lg ${subject === 'civic' ? 'bg-blue-600' : 'bg-emerald-600'}`}><Icon name="Lock" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-gradient-to-r from-amber-400 to-amber-500 text-amber-950 px-4 py-2.5 rounded-xl font-bold shadow-sm transition-transform active:scale-95 text-sm">
                                <Icon name="Coffee" size={18} /><span>Postaw Kawę</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0">
                        
                        {/* PANEL LEWY - KONFIGURACJA */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            
                            {/* Wybór Przedmiotu */}
                            <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex">
                                <button onClick={() => {setSubject('civic'); setParams({...params, topic: ''});}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-xs uppercase tracking-widest transition-all ${subject === 'civic' ? 'civic-gradient text-white shadow-lg shadow-blue-500/30' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="Shield" size={24} className="mb-2" />
                                    Ed. Obywatelska
                                </button>
                                <button onClick={() => {setSubject('health'); setParams({...params, topic: ''});}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-xs uppercase tracking-widest transition-all ${subject === 'health' ? 'health-gradient text-white shadow-lg shadow-emerald-500/30' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="HeartPulse" size={24} className="mb-2" />
                                    Ed. Zdrowotna
                                </button>
                            </div>

                            {/* Konfiguracja */}
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-5">
                                <h2 className={`font-bold text-sm uppercase tracking-widest border-b pb-3 ${subject === 'civic' ? 'text-blue-800' : 'text-emerald-800'}`}>
                                    Krok 1: Parametry Lekcji
                                </h2>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">Wybierz gotowy temat lub wpisz własny</label>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {PREDEFINED_TOPICS[subject].map((t, i) => (
                                            <button key={i} onClick={() => setParams({...params, topic: t})} className={`text-left text-[11px] px-3 py-2 rounded-lg border transition-colors ${params.topic === t ? (subject === 'civic' ? 'bg-blue-50 border-blue-200 text-blue-700 font-bold' : 'bg-emerald-50 border-emerald-200 text-emerald-700 font-bold') : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                                                {t}
                                            </button>
                                        ))}
                                    </div>
                                    <textarea 
                                        value={params.topic} 
                                        onChange={e => setParams({...params, topic: e.target.value})} 
                                        placeholder="...lub wpisz tutaj swój własny temat." 
                                        className={`w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-semibold text-sm resize-none ${subject === 'civic' ? 'focus:border-blue-500' : 'focus:border-emerald-500'}`}
                                        rows="2"
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Wiek uczniów</label>
                                        <select value={params.age} onChange={e => setParams({...params, age: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium">
                                            <option>Klasy 4-6 Szkoły Podst.</option>
                                            <option>Klasy 7-8 Szkoły Podst.</option>
                                            <option>Szkoła Ponadpodstawowa</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Główna Metoda</label>
                                        <select value={params.method} onChange={e => setParams({...params, method: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium">
                                            <option>Symulacja / Gra ról</option>
                                            <option>Debata Oksfordzka</option>
                                            <option>Metoda Projektowa</option>
                                            <option>Studium Przypadku (Case Study)</option>
                                        </select>
                                    </div>
                                </div>

                                {!isPremium ? (
                                    <div className={`p-4 rounded-xl border border-dashed flex flex-col items-center justify-center text-center gap-2 ${subject === 'civic' ? 'bg-blue-50 border-blue-200' : 'bg-emerald-50 border-emerald-200'}`}>
                                        <Icon name="Lock" size={24} className={subject === 'civic' ? 'text-blue-400' : 'text-emerald-400'}/>
                                        <span className={`text-xs font-bold ${subject === 'civic' ? 'text-blue-800' : 'text-emerald-800'}`}>Odblokuj kodem Premium</span>
                                    </div>
                                ) : (
                                    <button onClick={generateScenario} className={`w-full text-white py-4 rounded-2xl font-black text-sm tracking-widest shadow-lg flex justify-center items-center gap-2 transition-transform active:scale-95 ${subject === 'civic' ? 'bg-blue-600 hover:bg-blue-700 shadow-blue-500/30' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-500/30'}`}>
                                        <Icon name="Sparkles" size={20}/> WYGENERUJ SCENARIUSZ
                                    </button>
                                )}
                            </div>

                            {scenario && (
                                <div className="grid grid-cols-1 gap-3">
                                    <button onClick={() => window.print()} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl font-bold flex justify-center items-center gap-2 transition-colors">
                                        <Icon name="Printer" size={20}/> DRUKUJ DO PDF
                                    </button>
                                    <button onClick={exportToWord} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 py-4 rounded-2xl font-bold flex justify-center items-center gap-2 transition-colors">
                                        <Icon name="Download" size={20}/> EKSPORT DO WORD
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* PANEL PRAWY - SCENARIUSZ */}
                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10">
                            <div className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-2xl p-10 md:p-16 scenario-page text-slate-900 relative">
                                
                                {!scenario ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-40 text-center space-y-4 pt-32">
                                        <Icon name={subject === 'civic' ? 'Shield' : 'HeartPulse'} size={64} className={subject === 'civic' ? 'text-blue-300' : 'text-emerald-300'} />
                                        <h2 className="text-2xl font-bold">Twoja lekcja pojawi się tutaj</h2>
                                        <p className="max-w-sm">Wybierz parametry po lewej stronie, aby wygenerować nowoczesny scenariusz oparty o aktualne wytyczne MEN 2025.</p>
                                    </div>
                                ) : (
                                    <div id="scenario-container">
                                        <div className={`border-b-4 pb-8 mb-10 ${subject === 'civic' ? 'border-blue-600' : 'border-emerald-600'}`}>
                                            <div className={`text-xs font-black uppercase tracking-widest mb-3 ${subject === 'civic' ? 'text-blue-600' : 'text-emerald-600'}`}>
                                                Scenariusz Lekcji: {subject === 'civic' ? 'Edukacja Obywatelska' : 'Edukacja Zdrowotna'}
                                            </div>
                                            <h1 className="text-3xl md:text-4xl font-black text-slate-800 mb-6 uppercase tracking-tight leading-tight">{scenario.title}</h1>
                                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <span className="font-bold text-slate-900 uppercase text-xs tracking-wider">Cel Główny:</span>
                                                <p className="text-slate-700 italic mt-1">{scenario.main_goal}</p>
                                            </div>
                                        </div>

                                        <div className="space-y-10">
                                            {/* HACZYK */}
                                            <section className={`bg-amber-50 p-6 rounded-2xl border ${subject === 'civic' ? 'border-blue-100' : 'border-emerald-100'}`}>
                                                <h2 className={`text-sm font-black uppercase mb-2 tracking-widest flex items-center gap-2 ${subject === 'civic' ? 'text-blue-800' : 'text-emerald-800'}`}>
                                                    🎣 Haczyk (Zaintrygowanie klasy)
                                                </h2>
                                                <div className="text-slate-700 text-base leading-relaxed">{scenario.hook}</div>
                                            </section>

                                            {/* PRZEBIEG */}
                                            <section>
                                                <h2 className={`text-lg font-black uppercase border-b-2 pb-2 mb-6 ${subject === 'civic' ? 'text-blue-700 border-blue-200' : 'text-emerald-700 border-emerald-200'}`}>
                                                    Przebieg Zajęć
                                                </h2>
                                                <div className="space-y-6">
                                                    {scenario.phases.map((phase, idx) => (
                                                        <div key={idx} className="flex gap-4">
                                                            <div className={`flex-shrink-0 w-16 h-16 rounded-full flex flex-col items-center justify-center text-white font-black leading-none shadow-md ${subject === 'civic' ? 'bg-blue-600' : 'bg-emerald-600'}`}>
                                                                <span className="text-xl">{phase.time.split(' ')[0]}</span>
                                                                <span className="text-[10px] font-medium uppercase opacity-80">min</span>
                                                            </div>
                                                            <div className="flex-1 pt-1">
                                                                <h3 className="font-bold text-slate-800 text-lg mb-1">{phase.step_name}</h3>
                                                                <div className="whitespace-pre-wrap text-slate-600 text-base leading-relaxed">{phase.details}</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </section>

                                            {/* SYMULACJA */}
                                            <section className={`p-6 rounded-2xl border-l-4 shadow-sm ${subject === 'civic' ? 'bg-blue-50 border-blue-500' : 'bg-emerald-50 border-emerald-500'}`}>
                                                <h2 className={`text-sm font-black uppercase mb-3 tracking-widest flex items-center gap-2 ${subject === 'civic' ? 'text-blue-800' : 'text-emerald-800'}`}>
                                                    🎭 Główna Aktywność (Symulacja / Gra)
                                                </h2>
                                                <div className="whitespace-pre-wrap text-slate-700 text-base leading-relaxed">{scenario.simulation}</div>
                                            </section>

                                            {/* DYSKUSJA I ZADANIE */}
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <section className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                                    <h2 className="text-sm font-black uppercase mb-4 tracking-widest text-slate-800">
                                                        💬 Pytania do dyskusji
                                                    </h2>
                                                    <ul className="space-y-3">
                                                        {scenario.discussion_questions.map((q, i) => (
                                                            <li key={i} className="flex gap-2 text-slate-700">
                                                                <span className={`font-black ${subject === 'civic' ? 'text-blue-500' : 'text-emerald-500'}`}>Q.</span> {q}
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </section>

                                                <section className="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                                    <h2 className="text-sm font-black uppercase mb-4 tracking-widest text-slate-800">
                                                        🏠 Zadanie Domowe (Praktyczne)
                                                    </h2>
                                                    <div className="text-slate-700 leading-relaxed italic border-l-2 border-slate-300 pl-3">
                                                        "{scenario.homework}"
                                                    </div>
                                                </section>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
