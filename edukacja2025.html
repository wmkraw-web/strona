<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukacja 2025 AI - Nowoczesne Scenariusze</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; overflow-x: hidden; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        .scenario-page { font-family: 'Lora', serif; line-height: 1.7; color: #0f172a; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input:focus, select:focus, textarea:focus { box-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }

        @media print {
            body { background: white; color: black; }
            .print-hidden { display: none !important; }
            #print-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; background: white !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .page-break { page-break-before: always; }
            .page-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
        }
        
        @keyframes slide-up { 0% { opacity: 0; transform: translate(-50%, 20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        .animate-toast { animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Animacje Bota */
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .bot-bubble { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes blink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        .bot-eye { animation: blink 4s infinite; transform-origin: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>,
                HeartPulse: <><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>;
        };

        // --- AVATAR BOTA ---
        const BotHelperAvatar = ({ colorClass }) => (
            <svg viewBox="0 0 100 100" className="w-14 h-14 drop-shadow-md flex-shrink-0" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 30 V15" stroke="#94a3b8" strokeWidth="4" strokeLinecap="round"/>
                <circle cx="50" cy="12" r="5" fill="currentColor" className={colorClass}/>
                <rect x="25" y="30" width="50" height="40" rx="12" fill="currentColor" className={colorClass}/>
                <rect x="32" y="38" width="36" height="22" rx="6" fill="#ffffff"/>
                <circle cx="40" cy="49" r="3.5" fill="currentColor" className={`bot-eye ${colorClass}`}/>
                <circle cx="60" cy="49" r="3.5" fill="currentColor" className={`bot-eye ${colorClass}`}/>
                <path d="M 45 56 Q 50 60 55 56" stroke="currentColor" strokeWidth="2.5" fill="none" strokeLinecap="round" className={colorClass}/>
            </svg>
        );

        const PREDEFINED_TOPICS = {
            civic: [
                "Jak rozpoznać Fake News i manipulację w sieci?",
                "Wybory do samorządu uczniowskiego - jak to działa?",
                "Podatki - na co idą nasze pieniądze?",
                "Debata Oksfordzka: Wolność słowa a mowa nienawiści"
            ],
            health: [
                "Higiena cyfrowa i detoks od smartfona",
                "Zdrowie psychiczne: Jak radzić sobie z presją ocen?",
                "Asertywność: Jak mówić 'NIE' grupie rówieśniczej?",
                "Pierwsza pomoc emocjonalna w kryzysie"
            ]
        };

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            const [botMessage, setBotMessage] = useState('');
            
            const [subject, setSubject] = useState('civic');
            const [params, setParams] = useState({
                topic: '',
                age: 'Klasy 7-8 Szkoły Podstawowej',
                duration: '45 minut',
                method: 'Symulacja / Gra ról',
                detailLevel: 'full' // full lub short
            });

            const [scenario, setScenario] = useState(null);

            // Kolory Theme w zależności od przedmiotu
            const currentTheme = subject === 'civic' 
                ? { primary: 'blue', text: 'text-blue-400', border: 'border-blue-500/50', gradient: 'from-blue-600 to-indigo-600', shadow: 'shadow-[0_0_20px_rgba(37,99,235,0.3)]', botBg: 'bg-blue-900/40 border-blue-500/30' }
                : { primary: 'emerald', text: 'text-emerald-400', border: 'border-emerald-500/50', gradient: 'from-emerald-500 to-teal-600', shadow: 'shadow-[0_0_20px_rgba(16,185,129,0.3)]', botBg: 'bg-emerald-900/40 border-emerald-500/30' };

            useEffect(() => {
                if (subject === 'civic') setBotMessage("Edukacja Obywatelska! Nowy przedmiot w 2025. Skupmy się na budowaniu świadomego społeczeństwa. Jaki temat wybieramy?");
                else setBotMessage("Edukacja Zdrowotna to priorytet. Wybierz temat, a ja przygotuję scenariusz, który zaangażuje dzieci do dbania o siebie i innych.");
            }, [subject]);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 4000);
            };

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { 
                    setIsPremium(true); 
                    setAccessCode(''); 
                    showToast('Kod aktywny! Witamy w Premium 🌟');
                    setBotMessage("Odblokowano funkcje PRO! Możesz teraz generować wielostronicowe, pełne konspekty metodyczne.");
                } else {
                    showToast('Nieprawidłowy kod dostępu!');
                }
            };

            const generateScenario = async () => {
                if (!params.topic.trim()) {
                    showToast('Wybierz lub wpisz temat zajęć!');
                    return;
                }
                
                setIsGenerating(true);
                setScenario(null);
                setBotMessage("Analizuję podstawę programową i piszę dla Ciebie gotowca. Proszę o chwilę cierpliwości...");
                
                const subjectName = subject === 'civic' ? 'Edukacja Obywatelska' : 'Edukacja Zdrowotna';
                const detailInstruction = params.detailLevel === 'full' 
                    ? "Wymagany jest BARDZO ROZBUDOWANY konspekt (wersja FULL - Kopiuj/Wklej dla nauczyciela). W sekcji 'lesson_plan' dodaj skrypty (co mówi nauczyciel, co robią uczniowie). Opisy muszą być wyczerpujące i profesjonalne." 
                    : "Wymagany jest SKRÓCONY konspekt (zarys lekcji na 1 stronę). Podaj najważniejsze punkty i metodyczne sedno sprawy w zwięzły sposób.";
                
                const systemPrompt = `Jesteś wybitnym polskim ekspertem edukacyjnym i metodykiem. Przygotowujesz materiały dla nauczycieli do nowego przedmiotu: ${subjectName} (od 2025 r.).
                Odpowiadaj WYŁĄCZNIE i TYLKO w poprawnym formacie JSON.
                ${detailInstruction}
                
                Wymagana struktura JSON (użyj dokładnie tych kluczy języka angielskiego, ale treść po POLSKU):
                {
                  "title": "Tytuł lekcji",
                  "subject": "Nazwa przedmiotu i etap edukacyjny",
                  "core_curriculum": "Odniesienie do podstawy programowej (np. Uczeń potrafi...)",
                  "main_goal": "Cel ogólny",
                  "specific_goals": ["Cel szczegółowy 1", "Cel szczegółowy 2", "Cel szczegółowy 3"],
                  "key_competencies": ["Kompetencja 1", "Kompetencja 2"],
                  "methods_and_forms": "Metody i formy pracy",
                  "materials": ["Materiał 1", "Materiał 2"],
                  "hook": "Haczyk / Lodołamacz (Jak zacząć lekcję, by zaintrygować)",
                  "lesson_plan": [
                    {
                      "phase_name": "Nazwa fazy (np. Faza wstępna - 5 min)",
                      "teacher_activity": "Szczegółowo: Co mówi i robi nauczyciel (skrypt)",
                      "student_activity": "Szczegółowo: Co robią uczniowie"
                    }
                  ],
                  "main_activity_details": "Bardzo dokładny opis głównej aktywności (zasady gry, debaty, studium przypadku). Gotowiec do przeczytania uczniom.",
                  "summary": "Podsumowanie lekcji i ewaluacja",
                  "homework": "Praktyczne zadanie domowe (ciekawe, nieobciążające)"
                }`;

                const userPrompt = `Przedmiot: ${subjectName}\nTemat: ${params.topic}\nGrupa: ${params.age}\nCzas: ${params.duration}\nMetoda: ${params.method}\nPoziom szczegółowości: ${params.detailLevel}`;

                try {
                    // Łączymy się z naszym potężnym Vercel API (Omijamy awaryjne zewnętrzne publiczne modele)
                    const payload = { 
                        system: systemPrompt,
                        prompt: userPrompt,
                        temperature: 0.4, // Niska temperatura dla struktury i profesjonalizmu
                        format: "json",
                        model: "gpt-4o-mini"
                    };

                    const res = await fetch('/api/chat', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.details || data.message || "Błąd serwera");
                    
                    let text = data.text;
                    let cleanText = text;
                    
                    // Usuwanie ukrytych myśli (Reasoning Leak Protection)
                    if (cleanText.includes('"reasoning_content"')) {
                        const contentMarker = '"content":"';
                        const startIdx = cleanText.indexOf(contentMarker);
                        if (startIdx !== -1) {
                            let extracted = cleanText.substring(startIdx + contentMarker.length);
                            extracted = extracted.replace(/"\s*}\s*$/, '').replace(/"$/, ''); 
                            cleanText = extracted.replace(/\\n/g, '\n').replace(/\\"/g, '"'); 
                        }
                    } else {
                        try {
                            const outerObj = JSON.parse(text);
                            if (outerObj.content) cleanText = outerObj.content;
                            else if (outerObj.choices && outerObj.choices[0].message.content) cleanText = outerObj.choices[0].message.content;
                        } catch(e) {}
                    }
                    
                    cleanText = cleanText.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
                    let jsonStr = cleanText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const start = jsonStr.indexOf('{');
                    const end = jsonStr.lastIndexOf('}');
                    if(start !== -1 && end !== -1) {
                        jsonStr = jsonStr.substring(start, end + 1);
                    }
                    
                    const parsedData = JSON.parse(jsonStr);
                    setScenario(parsedData);
                    setBotMessage("Bum! Konspekt wygenerowany na najwyższym poziomie. Dyrekcja będzie zachwycona.");
                    
                } catch (error) {
                    console.error("Błąd AI:", error); 
                    showToast(`Błąd: ${error.message}`);
                    setBotMessage("Ups, serwer AI chwilowo zajęty. Kliknij generuj jeszcze raz!");
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const exportToWord = () => {
                if(!scenario) return;
                const content = document.getElementById('scenario-render-area').innerHTML;
                const headerColor = subject === 'civic' ? '#1e40af' : '#065f46';
                const borderColor = subject === 'civic' ? '#3b82f6' : '#10b981';
                
                const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Scenariusz Lekcji</title>
                <style>
                    body { font-family: 'Times New Roman', serif; font-size: 11pt; line-height: 1.5; color: #000; }
                    h1 { font-size: 18pt; color: ${headerColor}; text-align: center; text-transform: uppercase; margin-bottom: 20px;}
                    h2 { font-size: 14pt; color: ${headerColor}; border-bottom: 1.5px solid ${borderColor}; padding-bottom: 5px; margin-top: 20px;}
                    h3 { font-size: 12pt; color: #333; margin-top: 15px;}
                    p { margin-bottom: 10px; }
                    ul { padding-left: 20px; }
                    .box { background-color: #f8fafc; padding: 15px; border: 1px solid #cbd5e1; margin-bottom: 15px; }
                    .table-row { display: flex; border-bottom: 1px solid #e2e8f0; padding: 10px 0; }
                    .table-col { flex: 1; padding: 0 10px; }
                    b { color: #000; }
                </style></head><body>`;
                const footer = `</body></html>`;
                
                const blob = new Blob(['\ufeff', header + content + footer], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Scenariusz_${subject === 'civic' ? 'Obywatelski' : 'Zdrowotny'}_${Date.now()}.doc`;
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden">
                    
                    {/* POWIADOMIENIA TOAST */}
                    {toastMessage && (
                        <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm animate-toast flex items-center gap-3 border ${currentTheme.border}`}>
                            <Icon name="AlertCircle" size={18} className={currentTheme.text} />
                            {toastMessage}
                        </div>
                    )}

                    {/* EKRAN ŁADOWANIA */}
                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center text-white">
                            <div className={`glass-panel p-10 rounded-3xl flex flex-col items-center space-y-6 max-w-sm border ${currentTheme.border} ${currentTheme.shadow}`}>
                                <div className={`w-16 h-16 border-4 border-slate-700 rounded-full animate-spin ${subject === 'civic' ? 'border-t-blue-500' : 'border-t-emerald-500'}`}></div>
                                <div className="text-center">
                                    <h3 className="text-xl font-bold mb-2 text-white">Piszę Scenariusz...</h3>
                                    <p className="text-xs text-slate-400 font-medium">Dogłębna analiza metodyczna (ok. 15 sek).</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* GÓRNA NAWIGACJA */}
                    <nav className="fixed top-0 w-full z-50 glass-nav py-4 px-6 print-hidden">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3 font-extrabold text-xl tracking-tight cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className={`bg-gradient-to-br ${currentTheme.gradient} p-2 rounded-xl text-white shadow-lg`}>
                                    <Icon name={subject === 'civic' ? 'Shield' : 'HeartPulse'} size={22}/>
                                </div>
                                <span>Edu<span className={currentTheme.text}>Nowość</span> 2025</span>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                {!isPremium && (
                                    <div className="hidden md:flex items-center space-x-2 bg-slate-900 p-1.5 rounded-xl border border-slate-700">
                                        <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-white placeholder-slate-500"/>
                                        <button onClick={handleVerifyCode} className="p-2 text-white rounded-lg bg-slate-800 hover:bg-slate-700 transition-colors border border-slate-600"><Icon name="Lock" size={16}/></button>
                                    </div>
                                )}
                                <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 text-sm shadow-md">
                                    <Icon name="Coffee" size={18} className="text-amber-400"/><span>Postaw Kawę</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* GŁÓWNY WIDOK APLIKACJI */}
                    <div className="max-w-7xl mx-auto px-4 pt-32 pb-24 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0 relative z-10">
                        
                        {/* PANEL LEWY - KONFIGURACJA */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            
                            {/* Wybór Przedmiotu */}
                            <div className="glass-panel p-2 rounded-2xl flex gap-2">
                                <button onClick={() => {setSubject('civic'); setParams({...params, topic: ''}); setScenario(null);}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all duration-300 ${subject === 'civic' ? 'bg-gradient-to-br from-blue-600 to-indigo-600 text-white shadow-[0_0_20px_rgba(37,99,235,0.3)] border border-blue-500' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name="Shield" size={24} className={`mb-2 ${subject === 'civic' ? 'text-white' : 'text-blue-400'}`} /> Obywatelska
                                </button>
                                <button onClick={() => {setSubject('health'); setParams({...params, topic: ''}); setScenario(null);}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all duration-300 ${subject === 'health' ? 'bg-gradient-to-br from-emerald-500 to-teal-600 text-white shadow-[0_0_20px_rgba(16,185,129,0.3)] border border-emerald-500' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name="HeartPulse" size={24} className={`mb-2 ${subject === 'health' ? 'text-white' : 'text-emerald-400'}`} /> Zdrowotna
                                </button>
                            </div>

                            {/* Formularz Danych */}
                            <div className="glass-panel p-6 md:p-8 rounded-[2rem] space-y-6">
                                <h2 className={`font-bold text-sm uppercase tracking-widest border-b border-slate-700/50 pb-4 ${currentTheme.text} flex items-center gap-2`}>
                                    Parametry Lekcji
                                </h2>
                                
                                <div>
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-3">Wybierz gotowy temat lub wpisz własny</label>
                                    <div className="flex flex-wrap gap-2 mb-4 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                                        {PREDEFINED_TOPICS[subject].map((t, i) => (
                                            <button key={i} onClick={() => {setParams({...params, topic: t}); setBotMessage(`Świetny wybór! Temat "${t}" daje ogromne pole do ciekawej dyskusji w klasie.`);}} className={`text-left text-xs px-3 py-2.5 rounded-xl border transition-all ${params.topic === t ? (subject === 'civic' ? 'bg-blue-600/20 border-blue-500 text-blue-300 font-bold' : 'bg-emerald-600/20 border-emerald-500 text-emerald-300 font-bold') : 'bg-slate-800/50 border-slate-700 text-slate-400 hover:bg-slate-800 hover:border-slate-600'}`}>
                                                {t}
                                            </button>
                                        ))}
                                    </div>
                                    <textarea 
                                        value={params.topic} 
                                        onChange={e => setParams({...params, topic: e.target.value})} 
                                        onFocus={() => setBotMessage("Jeśli masz własny pomysł z podstawy programowej, po prostu go tutaj wpisz!")}
                                        placeholder="...lub wpisz tutaj swój własny temat." 
                                        className={`w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm font-medium resize-none focus:border-${currentTheme.primary}-500 transition-colors placeholder-slate-600`}
                                        rows="2"
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Wiek uczniów</label>
                                        <select value={params.age} onChange={e => setParams({...params, age: e.target.value})} className={`w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm font-medium focus:border-${currentTheme.primary}-500 transition-colors appearance-none`}>
                                            <option className="bg-slate-900">Klasy 4-6 SP</option>
                                            <option className="bg-slate-900">Klasy 7-8 SP</option>
                                            <option className="bg-slate-900">Szkoła Ponadpodstawowa</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Główna Metoda</label>
                                        <select value={params.method} onChange={e => setParams({...params, method: e.target.value})} className={`w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm font-medium focus:border-${currentTheme.primary}-500 transition-colors appearance-none`}>
                                            <option className="bg-slate-900">Symulacja / Gra ról</option>
                                            <option className="bg-slate-900">Debata Oksfordzka</option>
                                            <option className="bg-slate-900">Metoda Projektowa</option>
                                            <option className="bg-slate-900">Studium Przypadku</option>
                                        </select>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Format Scenariusza</label>
                                    <select value={params.detailLevel} onChange={e => {
                                        setParams({...params, detailLevel: e.target.value});
                                        if(e.target.value === 'full') setBotMessage("Wersja Pełna (Rozbudowana)! Przygotuję szczegółowy konspekt ze skryptem dla nauczyciela (co mówić, jak reagować). Idealne jako 'gotowiec'.");
                                        else setBotMessage("Wersja Skrócona. Czyste ramy czasowe i konkrety na 1 stronę A4, dla doświadczonego nauczyciela, który potrzebuje tylko inspiracji.");
                                    }} className={`w-full p-4 bg-slate-800 border border-slate-600 rounded-xl outline-none text-white text-sm font-bold focus:border-${currentTheme.primary}-500 transition-colors appearance-none`}>
                                        <option value="full" className="bg-slate-900">Pełny / Rozbudowany (Kopiuj-Wklej)</option>
                                        <option value="short" className="bg-slate-900">Skrócony (Zarys punktowy na 1 stronę)</option>
                                    </select>
                                </div>

                                {!isPremium ? (
                                    <div className="p-6 rounded-xl border-2 border-dashed border-slate-700 flex flex-col items-center justify-center text-center gap-3 bg-slate-900/50">
                                        <div className="p-3 bg-slate-800 rounded-full"><Icon name="Lock" size={24} className="text-slate-400"/></div>
                                        <div>
                                            <span className="text-sm font-bold text-slate-300 block mb-1">Funkcja zablokowana</span>
                                            <span className="text-xs text-slate-500">Wpisz kod Premium na górnym pasku.</span>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={generateScenario} disabled={isGenerating} className={`w-full bg-gradient-to-r ${currentTheme.gradient} text-white py-4 rounded-xl font-black text-sm tracking-widest shadow-lg flex justify-center items-center gap-2 transition-all active:scale-95 uppercase disabled:opacity-50`}>
                                        <Icon name="Sparkles" size={20}/> Generuj Konspekt
                                    </button>
                                )}
                            </div>

                            {/* AGENT EDU-BOT (POMOCNIK) */}
                            <div className={`p-5 rounded-3xl shadow-lg border flex items-start gap-4 animate-[reveal_0.3s_ease-out] transition-colors ${currentTheme.botBg}`}>
                                <BotHelperAvatar colorClass={currentTheme.botColor} />
                                <div className="flex-1 pt-1">
                                    <h4 className={`font-black text-xs uppercase tracking-widest mb-1.5 ${currentTheme.botColor}`}>EduBot Metodyk</h4>
                                    <p className="text-sm font-medium leading-relaxed text-slate-300 bot-bubble" key={botMessage}>{botMessage}</p>
                                </div>
                            </div>
                        </div>

                        {/* PANEL PRAWY - WYNIK (JASNY DOKUMENT) */}
                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10 print:block">
                            
                            {!scenario ? (
                                <div className="glass-panel w-full max-w-[210mm] min-h-[297mm] shadow-2xl p-8 rounded-[2rem] flex flex-col items-center justify-center text-center space-y-6 print-hidden border-2 border-dashed border-slate-700">
                                    <div className="p-6 bg-slate-800/50 rounded-full border border-slate-700 shadow-inner opacity-50">
                                        <Icon name={subject === 'civic' ? 'Shield' : 'HeartPulse'} size={64} className={currentTheme.text} />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-bold mb-3 text-white">Twój konspekt pojawi się tutaj</h2>
                                        <p className="max-w-md mx-auto text-slate-400 leading-relaxed text-sm">Nowe przedmioty wymagają nowego podejścia. Otrzymasz materiał gotowy do wdrożenia w klasie.</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full max-w-[210mm] animate-[reveal_0.5s_ease-out] print:max-w-full">
                                    
                                    {/* Toolbar Pobierania */}
                                    <div className="flex justify-end gap-3 mb-6 print-hidden bg-slate-900/50 p-2 rounded-2xl border border-slate-800 backdrop-blur-md">
                                        <button onClick={exportToWord} className={`flex-1 sm:flex-none text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm active:scale-95 shadow-[0_0_15px_rgba(255,255,255,0.1)] ${subject === 'civic' ? 'bg-blue-600 hover:bg-blue-500' : 'bg-emerald-600 hover:bg-emerald-500'}`}>
                                            <Icon name="Download" size={18}/> Word (.docx)
                                        </button>
                                        <button onClick={() => window.print()} className="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm active:scale-95">
                                            <Icon name="Printer" size={18}/> Drukuj PDF
                                        </button>
                                    </div>

                                    {/* KARTA WYNIKOWA (JASNA, DOKUMENT) */}
                                    <div className="bg-white shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-10 md:p-16 scenario-page text-slate-900 rounded-[2rem] min-h-[297mm]" id="print-container">
                                        <div id="scenario-render-area">
                                            
                                            {/* NAGŁÓWEK DOKUMENTU */}
                                            <div className="text-center border-b-2 pb-6 mb-8" style={{ borderColor: subject === 'civic' ? '#3b82f6' : '#10b981' }}>
                                                <div className="text-xs font-black uppercase tracking-widest mb-3 opacity-60" style={{ color: subject === 'civic' ? '#1e40af' : '#065f46' }}>
                                                    Scenariusz Zajęć: {scenario.subject}
                                                </div>
                                                <h1 className="text-2xl md:text-3xl font-black uppercase tracking-tight mb-6" style={{ color: subject === 'civic' ? '#1e40af' : '#065f46' }}>
                                                    {scenario.title}
                                                </h1>
                                            </div>

                                            <div className="space-y-8">
                                                {/* SEKCJA 1: ZAŁOŻENIA */}
                                                <section>
                                                    <h2 className="text-lg font-black uppercase mb-4" style={{ color: subject === 'civic' ? '#1e40af' : '#065f46', borderBottom: `1px solid ${subject === 'civic' ? '#bfdbfe' : '#a7f3d0'}`, paddingBottom: '4px' }}>I. Założenia Ogólne</h2>
                                                    <div className="space-y-4 text-sm">
                                                        <div className="box" style={{ backgroundColor: '#f8fafc', padding: '15px', borderRadius: '8px', border: '1px solid #e2e8f0' }}>
                                                            <p><b>Cel główny:</b> {scenario.main_goal}</p>
                                                            <p className="mt-2"><b>Podstawa programowa:</b> <i>{scenario.core_curriculum}</i></p>
                                                        </div>
                                                        
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            <div>
                                                                <b>Cele szczegółowe:</b>
                                                                <ul className="list-disc pl-5 mt-2 space-y-1">
                                                                    {scenario.specific_goals?.map((g, i) => <li key={i}>{g}</li>)}
                                                                </ul>
                                                            </div>
                                                            <div>
                                                                <b>Kompetencje kluczowe:</b>
                                                                <ul className="list-disc pl-5 mt-2 space-y-1">
                                                                    {scenario.key_competencies?.map((k, i) => <li key={i}>{k}</li>)}
                                                                </ul>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="mt-4">
                                                            <p><b>Metody i formy pracy:</b> {scenario.methods_and_forms}</p>
                                                            <p className="mt-1"><b>Pomoce dydaktyczne:</b> {scenario.materials?.join(', ')}</p>
                                                        </div>
                                                    </div>
                                                </section>

                                                {/* SEKCJA 2: HACZYK */}
                                                <section className="box" style={{ backgroundColor: subject === 'civic' ? '#eff6ff' : '#ecfdf5', padding: '20px', borderRadius: '12px', borderLeft: `4px solid ${subject === 'civic' ? '#3b82f6' : '#10b981'}` }}>
                                                    <h2 className="text-base font-black uppercase mb-2" style={{ color: subject === 'civic' ? '#1e40af' : '#065f46' }}>Lodołamacz / Zaciekawienie (Hook)</h2>
                                                    <p className="text-sm italic text-slate-700">{scenario.hook}</p>
                                                </section>

                                                {/* SEKCJA 3: PRZEBIEG */}
                                                <section>
                                                    <h2 className="text-lg font-black uppercase mb-4" style={{ color: subject === 'civic' ? '#1e40af' : '#065f46', borderBottom: `1px solid ${subject === 'civic' ? '#bfdbfe' : '#a7f3d0'}`, paddingBottom: '4px' }}>II. Przebieg Lekcji (Krok po Kroku)</h2>
                                                    <div className="space-y-6">
                                                        {scenario.lesson_plan?.map((phase, idx) => (
                                                            <div key={idx} className="border-l-2 pl-4" style={{ borderColor: subject === 'civic' ? '#93c5fd' : '#6ee7b7' }}>
                                                                <h3 className="font-bold text-base mb-2" style={{ color: '#0f172a' }}>{idx + 1}. {phase.phase_name}</h3>
                                                                <div className="text-sm space-y-3">
                                                                    <div className="table-row" style={{ display: 'flex', gap: '15px' }}>
                                                                        <div style={{ flex: '1', backgroundColor: '#f1f5f9', padding: '10px', borderRadius: '6px' }}>
                                                                            <span className="text-[10px] font-bold uppercase text-slate-500 block mb-1">Działania Nauczyciela (Skrypt)</span>
                                                                            <p>{phase.teacher_activity}</p>
                                                                        </div>
                                                                        <div style={{ flex: '1', backgroundColor: '#f8fafc', padding: '10px', borderRadius: '6px', border: '1px dashed #cbd5e1' }}>
                                                                            <span className="text-[10px] font-bold uppercase text-slate-500 block mb-1">Działania Uczniów</span>
                                                                            <p>{phase.student_activity}</p>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </section>

                                                {/* SEKCJA 4: SYMULACJA */}
                                                <section>
                                                    <h2 className="text-lg font-black uppercase mb-4" style={{ color: subject === 'civic' ? '#1e40af' : '#065f46', borderBottom: `1px solid ${subject === 'civic' ? '#bfdbfe' : '#a7f3d0'}`, paddingBottom: '4px' }}>III. Główna Aktywność / Gra</h2>
                                                    <div className="text-sm leading-relaxed whitespace-pre-wrap bg-slate-50 p-5 rounded-xl border border-slate-200">
                                                        {scenario.main_activity_details}
                                                    </div>
                                                </section>

                                                {/* SEKCJA 5: ZAKOŃCZENIE */}
                                                <section className="page-break-inside-avoid">
                                                    <h2 className="text-lg font-black uppercase mb-4" style={{ color: subject === 'civic' ? '#1e40af' : '#065f46', borderBottom: `1px solid ${subject === 'civic' ? '#bfdbfe' : '#a7f3d0'}`, paddingBottom: '4px' }}>IV. Podsumowanie i Ewaluacja</h2>
                                                    <div className="text-sm space-y-4">
                                                        <p>{scenario.summary}</p>
                                                        
                                                        {scenario.discussion_questions && (
                                                            <div className="box" style={{ backgroundColor: '#f8fafc', padding: '15px', borderRadius: '8px', border: '1px solid #e2e8f0' }}>
                                                                <b>Pytania do podsumowującej dyskusji:</b>
                                                                <ul className="list-disc pl-5 mt-2 space-y-1">
                                                                    {scenario.discussion_questions.map((q, i) => <li key={i}>{q}</li>)}
                                                                </ul>
                                                            </div>
                                                        )}
                                                        
                                                        <div className="box" style={{ backgroundColor: '#fffbeb', padding: '15px', borderRadius: '8px', borderLeft: '4px solid #f59e0b' }}>
                                                            <b>Zadanie po lekcji (Opcjonalne):</b>
                                                            <p className="mt-1 italic">{scenario.homework}</p>
                                                        </div>
                                                    </div>
                                                </section>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
