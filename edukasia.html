<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>EduKasia PRO - Osobisty Asystent SPE</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #1e1b4b; 
            color: #f8fafc; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        .aura-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: -1;
            animation: float 15s infinite ease-in-out alternate;
            pointer-events: none;
        }
        .aura-1 { top: -10%; left: -10%; width: 60vw; height: 600px; background: radial-gradient(circle, #f43f5e, transparent 70%); }
        .aura-2 { top: 40%; right: -10%; width: 50vw; height: 600px; background: radial-gradient(circle, #8b5cf6, transparent 70%); animation-delay: -5s; }
        .aura-3 { bottom: -10%; left: 20%; width: 60vw; height: 600px; background: radial-gradient(circle, #3b82f6, transparent 70%); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -50px) scale(1.05); }
            100% { transform: translate(-30px, 30px) scale(0.95); }
        }

        .glass-panel { background: rgba(30, 27, 75, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-nav { background: rgba(30, 27, 75, 0.85); backdrop-filter: blur(24px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e1b4b; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f43f5e; border-radius: 8px; }
        .btn-bounce:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .success-card {
            background: linear-gradient(135deg, #ffffff 0%, #fdf2f8 100%);
            border: 8px solid #fbcfe8;
            box-shadow: 0 25px 50px -12px rgba(244, 63, 94, 0.25);
            color: #4c1d95;
            position: relative;
            overflow: hidden;
        }

        .source-link:hover { color: #f472b6; text-decoration: underline; }

        @media print {
            body { background-color: white !important; color: black !important; }
            .print-hidden { display: none !important; }
            .glass-panel { background: transparent !important; border: none !important; box-shadow: none !important; backdrop-filter: none !important; }
            .success-card { border: 4px solid #fbcfe8 !important; box-shadow: none !important; transform: scale(1.1); margin: 2cm auto; }
            * { text-shadow: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const PROMPTS = {
            sos_zachowanie: `Jesteś pedagogiem specjalnym i terapeutą integracji sensorycznej (SI). Przeanalizuj opisane zachowanie dziecka (np. autyzm, ADHD) i podaj natychmiastowe rozwiązanie. Odpowiedź podziel na: 1. 🧠 POTENCJALNA PRZYCZYNA: Funkcja zachowania. 2. 🚨 SZYBKA REAKCJA: 3 punkty, co zrobić tu i teraz. 3. 🛠️ DZIAŁANIE NA JUTRO: Jak zapobiec temu w przyszłości.`,
            sos_rodzic: `Jesteś psychologiem i mediatorem (NVC). Nauczyciel ma problem we współpracy z rodzicem. Podziel poradę na: 1. 💡 PERSPEKTYWA RODZICA: Z czego to wynika. 2. 🗣️ GOTOWE ZDANIA: 3 gotowe sformułowania do użycia przez nauczyciela. 3. 🚧 STRATEGIA: Jak ustalić granice.`
        };

        function App() {
            // =========================================================================
            // TYLKO TO HASŁO ZMIENIASZ W PLIKU HTML (Klucz API jest bezpieczny na Vercelu)
            const SECRET_PIN = "kasia123"; 
            // =========================================================================

            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [activeTab, setActiveTab] = useState('sos'); 
            const resultRef = useRef(null);

            // Stany
            const [sosMode, setSosMode] = useState('zachowanie');
            const [sosInput, setSosInput] = useState('');
            const [useWebSearch, setUseWebSearch] = useState(true);
            const [sosResult, setSosResult] = useState('');
            const [sosSources, setSosSources] = useState([]);
            const [isGeneratingSos, setIsGeneratingSos] = useState(false);
            const [sosError, setSosError] = useState('');

            const [customText, setCustomText] = useState('');
            const aacButtons = [
                { id: 1, label: 'Chcę przerwę', emoji: '⏸️' }, { id: 2, label: 'Toaleta', emoji: '🚽' },
                { id: 3, label: 'Pić', emoji: '💧' }, { id: 4, label: 'Jeść', emoji: '🍎' },
                { id: 5, label: 'Pomocy', emoji: '🆘' }, { id: 6, label: 'Boli mnie', emoji: '🩹' },
                { id: 7, label: 'Stop', emoji: '🛑' }, { id: 8, label: 'Koniec', emoji: '✅' },
                { id: 9, label: 'Jestem zły', emoji: '😠' }, { id: 10, label: 'Jestem wesoły', emoji: '😊' }
            ];

            const [successName, setSuccessName] = useState('');
            const [successAction, setSuccessAction] = useState('');
            const [successText, setSuccessText] = useState('');
            const [showSuccessCard, setShowSuccessCard] = useState(false);
            const [isGeneratingSuccess, setIsGeneratingSuccess] = useState(false);

            const [storyProblem, setStoryProblem] = useState('');
            const [generatedStory, setGeneratedStory] = useState('');
            const [generatedImage, setGeneratedImage] = useState('');
            const [isGeneratingStory, setIsGeneratingStory] = useState(false);
            const [storyError, setStoryError] = useState('');

            // --- FUNKCJE POMOCNICZE ---
            const fetchWithRetry = async (url, options, retries = 3, delay = 1000) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) {
                            const errData = await response.json().catch(() => ({}));
                            throw new Error(errData.error || `Status API: ${response.status}`);
                        }
                        return await response.json();
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(res => setTimeout(res, delay * Math.pow(2, i)));
                    }
                }
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'pl-PL';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.1;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // ==================================================================================
            // BEZPIECZNY KONTROLER API - Automatycznie wykrywa środowisko (Vercel vs Podgląd)
            // ==================================================================================
            const secureApiCall = async (payload, endpointType) => {
                let url;
                let fetchOptions;

                // Sprawdzamy czy strona działa u Ciebie na produkcji/hostingu
                const isProduction = window.location.hostname.includes('vercel.app') || 
                                     window.location.hostname !== '' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1';

                if (isProduction) {
                    // JESTEŚ NA VERCELU: Łączy się z bezpiecznym, ukrytym plikiem api/gemini.js
                    url = '/api/gemini';
                    fetchOptions = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ payload, type: endpointType })
                    };
                } else {
                    // JESTEŚ W PODGLĄDZIE (Lokalnie): Używa wstrzykiwanego klucza testowego środowiska
                    const apiKey = ""; 
                    url = endpointType === 'text' 
                        ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`
                        : `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                    fetchOptions = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    };
                }

                return await fetchWithRetry(url, fetchOptions);
            };

            // --- AKCJE GŁÓWNE OPARTE O BEZPIECZNE POŁĄCZENIE ---
            const generateSos = async () => {
                if (!sosInput.trim()) { setSosError('Opisz krótko sytuację w klasie.'); return; }
                
                setIsGeneratingSos(true); setSosError(''); setSosResult(''); setSosSources([]);

                try {
                    const payload = {
                        contents: [{ parts: [{ text: `Rozwiąż problem: ${sosInput}` }] }],
                        systemInstruction: { parts: [{ text: PROMPTS[`sos_${sosMode}`] }] },
                        generationConfig: { temperature: 0.5 }
                    };
                    if (useWebSearch) payload.tools = [{ google_search: {} }];

                    const data = await secureApiCall(payload, 'text');
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        setSosResult(text);
                        if (useWebSearch && data.candidates[0].groundingMetadata?.groundingAttributions) {
                            const extractedSources = [];
                            const seenUris = new Set();
                            data.candidates[0].groundingMetadata.groundingAttributions.forEach(attr => {
                                if (attr.web && attr.web.uri && !seenUris.has(attr.web.uri)) {
                                    seenUris.add(attr.web.uri);
                                    extractedSources.push({ title: attr.web.title || attr.web.uri, uri: attr.web.uri });
                                }
                            });
                            setSosSources(extractedSources);
                        }
                        setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                    } else throw new Error("Pusta odpowiedź z API.");
                } catch (err) {
                    setSosError('Błąd połączenia: ' + err.message);
                } finally {
                    setIsGeneratingSos(false);
                }
            };

            const handleSuccessGenerate = async () => {
                if (!successName.trim() || !successAction.trim()) return;
                
                setIsGeneratingSuccess(true); setShowSuccessCard(false); setSuccessText('');
                try {
                    const payload = {
                        contents: [{ parts: [{ text: `Dziecko o imieniu ${successName} osiągnęło sukces: ${successAction}. Napisz bardzo radosną, krótką (max 3 zdania) pochwałę/dyplomik dla rodziców. Zacznij od 'Wielkie brawa!'. Dodaj urocze emotikony.` }] }],
                        systemInstruction: { parts: [{ text: "Jesteś pełnym ciepła wychowawcą przedszkolnym." }] },
                        generationConfig: { temperature: 0.7 }
                    };
                    
                    const data = await secureApiCall(payload, 'text');
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) { setSuccessText(text); setShowSuccessCard(true); } else throw new Error();
                } catch (err) {
                    alert("Błąd generowania. Serwer niedostępny lub brak poprawnego klucza w zmiennych środowiskowych Vercela.");
                } finally {
                    setIsGeneratingSuccess(false);
                }
            };

            const generateStoryAndImage = async () => {
                if (!storyProblem.trim()) { setStoryError('Wpisz problem ucznia.'); return; }
                
                setIsGeneratingStory(true); setStoryError(''); setGeneratedStory(''); setGeneratedImage('');

                try {
                    // 1. TEKST
                    const textPayload = { contents: [{ parts: [{ text: `Napisz radosną, uspokajającą rymowankę (max 4 zdania) dla dziecka ze spektrum autyzmu. Dziecko: ${storyProblem}. Zakończ pochwałą.` }] }], generationConfig: { temperature: 0.7 } };
                    const textData = await secureApiCall(textPayload, 'text');
                    const story = textData.candidates?.[0]?.content?.parts?.[0]?.text;

                    // 2. OBRAZEK
                    const imgPayload = { instances: { prompt: `Cute 2D illustration for children book, a happy child resolving this problem: ${storyProblem}. Bright colors, therapeutic, calming.` }, parameters: { sampleCount: 1 } };
                    const imgData = await secureApiCall(imgPayload, 'image');
                    const base64Image = imgData.predictions?.[0]?.bytesBase64Encoded;
                    
                    if (story && base64Image) {
                        setGeneratedStory(story); setGeneratedImage(`data:image/png;base64,${base64Image}`);
                    } else throw new Error();
                } catch (err) {
                    setStoryError('Błąd połączenia z serwerem. Upewnij się, że poprawnie skonfigurowałeś zmienne Vercel.');
                } finally {
                    setIsGeneratingStory(false);
                }
            };

            // EKRAN LOGOWANIA
            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen relative flex items-center justify-center p-4">
                        <div className="aura-blob aura-1"></div>
                        <div className="aura-blob aura-2"></div>
                        <div className="glass-panel p-10 rounded-3xl max-w-md w-full text-center shadow-[0_0_50px_rgba(244,63,94,0.2)] border border-rose-500/30 fade-in relative z-10">
                            <div className="w-24 h-24 bg-rose-500/20 text-rose-400 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl border border-rose-500/50">👩‍🏫</div>
                            <h2 className="text-4xl font-black text-white mb-2">EduKasia <span className="text-rose-400">PRO</span></h2>
                            <p className="text-slate-400 text-sm mb-8 font-medium">Podaj kod PIN, aby odblokować system.</p>
                            <input 
                                type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)}
                                onKeyPress={(e) => { if (e.key === 'Enter' && passwordInput === SECRET_PIN) setIsAuthenticated(true); }}
                                placeholder="Wpisz PIN..."
                                className="w-full bg-slate-900 border border-slate-600 text-center text-white rounded-xl px-5 py-4 focus:ring-2 focus:ring-rose-500 outline-none mb-6 text-2xl tracking-[0.5em] font-bold"
                            />
                            <button 
                                onClick={() => { if (passwordInput === SECRET_PIN) setIsAuthenticated(true); else alert('Zły PIN!'); }}
                                className="w-full bg-gradient-to-r from-rose-600 to-fuchsia-600 hover:from-rose-500 hover:to-fuchsia-500 text-white font-black py-4 rounded-xl transition-all transform hover:scale-105 btn-bounce text-lg shadow-[0_10px_20px_rgba(244,63,94,0.3)]"
                            >
                                Odblokuj System
                            </button>
                        </div>
                    </div>
                );
            }

            // GŁÓWNY WIDOK
            return (
                <div className="min-h-screen relative flex flex-col">
                    <div className="aura-blob aura-1"></div><div className="aura-blob aura-2"></div><div className="aura-blob aura-3"></div>

                    <nav className="fixed top-0 w-full z-50 glass-nav print-hidden">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-rose-500 to-fuchsia-600 rounded-xl flex items-center justify-center shadow-lg">
                                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                                </div>
                                <span className="text-xl font-extrabold tracking-tight text-white hidden sm:block">EduKasia<span className="text-rose-400">PRO</span></span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="bg-emerald-500/20 text-emerald-400 text-xs font-bold px-3 py-1.5 rounded-full border border-emerald-500/50 flex items-center gap-2 hidden md:flex">
                                    <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div> Zalogowano bezpiecznie
                                </div>
                                <button onClick={() => setIsAuthenticated(false)} className="flex items-center gap-2 text-xs sm:text-sm font-bold text-slate-300 hover:text-white transition-colors bg-slate-800 hover:bg-slate-700 px-4 py-2.5 rounded-xl border border-slate-600">
                                    Wyjdź (Zablokuj)
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-28 pb-20 px-4 sm:px-6 print:pt-0 print:pb-0">
                        <div className="max-w-4xl mx-auto">
                            
                            {/* Pasek Zakładek */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8 fade-in print-hidden">
                                <button onClick={() => setActiveTab('sos')} className={`p-4 rounded-2xl font-bold flex flex-col items-center gap-2 border-2 transition-all ${activeTab === 'sos' ? 'bg-blue-600/30 border-blue-500 text-white shadow-[0_0_20px_rgba(59,130,246,0.3)]' : 'glass-panel border-slate-700/50 text-slate-400 hover:border-slate-500 hover:text-white'}`}>
                                    <span className="text-2xl">🚨</span> <span className="text-xs sm:text-sm">Porady & Sieć</span>
                                </button>
                                <button onClick={() => setActiveTab('aac')} className={`p-4 rounded-2xl font-bold flex flex-col items-center gap-2 border-2 transition-all ${activeTab === 'aac' ? 'bg-indigo-600/30 border-indigo-500 text-white shadow-[0_0_20px_rgba(99,102,241,0.3)]' : 'glass-panel border-slate-700/50 text-slate-400 hover:border-slate-500 hover:text-white'}`}>
                                    <span className="text-2xl">🗣️</span> <span className="text-xs sm:text-sm">Komunikator AAC</span>
                                </button>
                                <button onClick={() => setActiveTab('sukces')} className={`p-4 rounded-2xl font-bold flex flex-col items-center gap-2 border-2 transition-all ${activeTab === 'sukces' ? 'bg-rose-600/30 border-rose-500 text-white shadow-[0_0_20px_rgba(244,63,94,0.3)]' : 'glass-panel border-slate-700/50 text-slate-400 hover:border-slate-500 hover:text-white'}`}>
                                    <span className="text-2xl">🏆</span> <span className="text-xs sm:text-sm">Kartki dla Rodziców</span>
                                </button>
                                <button onClick={() => setActiveTab('bajka')} className={`p-4 rounded-2xl font-bold flex flex-col items-center gap-2 border-2 transition-all ${activeTab === 'bajka' ? 'bg-amber-600/30 border-amber-500 text-white shadow-[0_0_20px_rgba(245,158,11,0.3)]' : 'glass-panel border-slate-700/50 text-slate-400 hover:border-slate-500 hover:text-white'}`}>
                                    <span className="text-2xl">🎨</span> <span className="text-xs sm:text-sm">Magiczny Obrazek</span>
                                </button>
                            </div>

                            {/* WIDOK: SOS */}
                            {activeTab === 'sos' && (
                                <div className="glass-panel p-6 sm:p-8 rounded-[2rem] fade-in border border-blue-500/30 print-hidden">
                                    <h2 className="text-3xl font-black text-blue-400 mb-2">Przedszkolne SOS 🚨</h2>
                                    <div className="flex gap-4 mb-6">
                                        <button onClick={() => setSosMode('zachowanie')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${sosMode === 'zachowanie' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400'}`}>Kryzys Dziecka</button>
                                        <button onClick={() => setSosMode('rodzic')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${sosMode === 'rodzic' ? 'bg-fuchsia-600 text-white' : 'bg-slate-800 text-slate-400'}`}>Trudny Rodzic</button>
                                    </div>
                                    <textarea value={sosInput} onChange={(e) => setSosInput(e.target.value)} placeholder="Opisz problem..." className="w-full h-32 bg-slate-900 border border-slate-600 text-white rounded-2xl p-5 focus:ring-2 focus:ring-blue-500 outline-none mb-4 custom-scrollbar"></textarea>
                                    
                                    <div className="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-slate-700 mb-6">
                                        <input type="checkbox" checked={useWebSearch} onChange={(e) => setUseWebSearch(e.target.checked)} className="w-6 h-6 rounded-full cursor-pointer accent-blue-500"/>
                                        <label className="text-sm font-bold text-white cursor-pointer">Przeszukaj darmowy Internet 🌍 (Omija płatne artykuły)</label>
                                    </div>

                                    {sosError && <div className="mb-4 p-4 bg-red-900/40 border border-red-500/50 rounded-xl text-red-400 text-sm font-bold text-center">{sosError}</div>}
                                    <button onClick={generateSos} disabled={isGeneratingSos || !sosInput} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black py-4 rounded-xl shadow-lg btn-bounce disabled:opacity-50">
                                        {isGeneratingSos ? 'Szukam rozwiązania...' : 'Ratuj Sytuację!'}
                                    </button>

                                    {sosResult && (
                                        <div ref={resultRef} className="mt-8">
                                            <div className="bg-slate-900 p-6 rounded-2xl border border-blue-500/30 mb-6 text-slate-200 whitespace-pre-wrap">{sosResult}</div>
                                            {useWebSearch && sosSources.length > 0 && (
                                                <div className="bg-indigo-900/30 p-6 rounded-2xl border border-indigo-500/30">
                                                    <h3 className="text-lg font-bold text-indigo-400 mb-3">🌍 Darmowe Źródła z Sieci:</h3>
                                                    <ul className="space-y-2">{sosSources.map((s, i) => <li key={i}><a href={s.uri} target="_blank" className="text-slate-300 hover:text-white underline source-link text-sm">➡️ {s.title}</a></li>)}</ul>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* WIDOK: AAC */}
                            {activeTab === 'aac' && (
                                <div className="glass-panel p-6 sm:p-8 rounded-[2rem] fade-in border border-indigo-500/30 print-hidden">
                                    <h2 className="text-3xl font-black text-indigo-400 mb-8 text-center">Komunikator AAC 🗣️</h2>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mb-8">
                                        {aacButtons.map(btn => (
                                            <button key={btn.id} onClick={() => speak(btn.label)} className="bg-slate-800/50 hover:bg-indigo-600/30 border border-slate-700 hover:border-indigo-500 aspect-square rounded-2xl flex flex-col items-center justify-center gap-3 p-2 shadow-lg active:scale-95 transition-all">
                                                <span className="text-5xl">{btn.emoji}</span><span className="text-white font-bold text-sm">{btn.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="border-t border-slate-700 pt-6 flex flex-col sm:flex-row gap-4">
                                        <input type="text" value={customText} onChange={(e) => setCustomText(e.target.value)} placeholder="Wpisz dowolne słowo dla ucznia..." className="flex-1 bg-slate-900 border border-slate-600 text-white rounded-xl px-5 py-4 focus:ring-2 focus:ring-indigo-500 outline-none" />
                                        <button onClick={() => { if(customText) speak(customText); }} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-8 py-4 rounded-xl transition-all btn-bounce flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(79,70,229,0.4)]">
                                            🔊 Czytaj na głos
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* WIDOK: SUKCES */}
                            {activeTab === 'sukces' && (
                                <div className="glass-panel p-6 sm:p-8 rounded-[2rem] fade-in border border-rose-500/30">
                                    <h2 className="text-3xl font-black text-rose-400 mb-6 text-center print-hidden">Dziennik Sukcesów 🏆</h2>
                                    <div className="flex flex-col sm:flex-row gap-4 mb-6 print-hidden">
                                        <input type="text" value={successName} onChange={(e) => {setSuccessName(e.target.value); setShowSuccessCard(false);}} placeholder="Imię (np. Staś)" className="flex-1 bg-slate-900 border border-slate-600 text-white rounded-xl px-4 py-3 outline-none focus:border-rose-500" />
                                        <input type="text" value={successAction} onChange={(e) => {setSuccessAction(e.target.value); setShowSuccessCard(false);}} placeholder="Co się udało? (np. zjadł zupę)" className="flex-[2] bg-slate-900 border border-slate-600 text-white rounded-xl px-4 py-3 outline-none focus:border-rose-500" />
                                    </div>
                                    {!showSuccessCard ? (
                                        <button onClick={handleSuccessGenerate} disabled={!successName || !successAction || isGeneratingSuccess} className="w-full bg-rose-600 text-white font-black py-4 rounded-xl disabled:bg-slate-700 print-hidden">{isGeneratingSuccess ? '✨ Układam dedykację...' : 'Generuj E-Kartkę'}</button>
                                    ) : (
                                        <div className="fade-in flex flex-col items-center">
                                            <div className="success-card w-full max-w-sm rounded-3xl p-8 text-center mt-4">
                                                <div className="text-6xl mb-4 relative z-10">🏆</div>
                                                <h3 className="text-3xl font-black mb-2 relative z-10 text-rose-600">Sukces Dnia!</h3>
                                                <p className="text-xl font-bold mb-4 relative z-10 text-slate-800">Uczeń: {successName}</p>
                                                <div className="bg-white/80 p-4 relative z-10 rounded-2xl shadow-inner text-lg font-medium text-slate-700 whitespace-pre-wrap">{successText}</div>
                                            </div>
                                            <button onClick={() => window.print()} className="mt-8 bg-emerald-600 text-white font-bold px-8 py-3 rounded-xl print-hidden shadow-lg">🖨️ Wydrukuj</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* WIDOK: BAJKA */}
                            {activeTab === 'bajka' && (
                                <div className="glass-panel p-6 sm:p-8 rounded-[2rem] fade-in border border-amber-500/30 print-hidden">
                                    <h2 className="text-3xl font-black text-amber-400 mb-6 text-center">Magiczny Komiks AI 🎨</h2>
                                    <textarea value={storyProblem} onChange={(e) => setStoryProblem(e.target.value)} placeholder="Opisz lęk dziecka..." className="w-full h-24 bg-slate-900 border border-slate-600 text-white rounded-xl p-4 mb-4"></textarea>
                                    {storyError && <div className="mb-4 text-red-400 text-sm font-bold">{storyError}</div>}
                                    <button onClick={generateStoryAndImage} disabled={isGeneratingStory || !storyProblem} className="w-full bg-amber-600 text-white font-black py-4 rounded-xl disabled:bg-slate-700">{isGeneratingStory ? '✨ Maluję...' : 'Stwórz Magiczną Bajkę'}</button>
                                    
                                    {generatedStory && generatedImage && (
                                        <div className="mt-8 bg-slate-900 p-6 rounded-3xl flex flex-col md:flex-row gap-6 items-center fade-in border border-amber-500/50">
                                            <img src={generatedImage} className="w-full md:w-1/2 rounded-2xl border-4 border-amber-400 shadow-2xl" />
                                            <div className="w-full md:w-1/2">
                                                <p className="text-slate-200 text-lg italic mb-6">{generatedStory}</p>
                                                <button onClick={() => speak(generatedStory)} className="bg-amber-600 text-white px-6 py-3 rounded-xl font-bold">🔊 Przeczytaj na głos</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
