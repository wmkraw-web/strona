<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMotywator AI - Karty Wyjścia i Tajne Misje</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;600;700&display=swap');
        
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: #f8fafc; overflow-x: hidden; }
        
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Font do druku (Młodzieżowy i czytelny) */
        .print-font { font-family: 'Space Grotesk', sans-serif; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input:focus, select:focus, textarea:focus { box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); border-color: #8b5cf6 !important; }

        @media print {
            body { background: white; color: black; }
            .print-hidden { display: none !important; }
            #print-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; background: white !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .page-break { page-break-before: always; }
            .page-break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
            .ticket-card { border: 2px dashed #94a3b8 !important; }
        }
        
        @keyframes slide-up { 0% { opacity: 0; transform: translate(-50%, 20px); } 100% { opacity: 1; transform: translate(-50%, 0); } }
        .animate-toast { animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* Animacje Bota */
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .bot-bubble { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes blink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } }
        .bot-eye { animation: blink 4s infinite; transform-origin: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Ticket: <><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><line x1="13" x2="13" y1="7" y2="17"/><line x1="9" x2="9" y1="7" y2="17"/></>,
                Target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>;
        };

        const BotHelperAvatar = () => (
            <svg viewBox="0 0 100 100" className="w-14 h-14 drop-shadow-md flex-shrink-0" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 30 V15" stroke="#94a3b8" strokeWidth="4" strokeLinecap="round"/>
                <circle cx="50" cy="12" r="5" fill="#a78bfa"/>
                <rect x="25" y="30" width="50" height="40" rx="12" fill="#6d28d9"/>
                <rect x="32" y="38" width="36" height="22" rx="6" fill="#ffffff"/>
                <circle cx="40" cy="49" r="3.5" fill="#6d28d9" className="bot-eye"/>
                <circle cx="60" cy="49" r="3.5" fill="#6d28d9" className="bot-eye"/>
                <path d="M 45 56 Q 50 60 55 56" stroke="#6d28d9" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
            </svg>
        );

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            
            const [botMessage, setBotMessage] = useState("Cześć! Zamiast prac domowych, wygeneruję dla Ciebie 4 'Karty Wyjścia' na koniec lekcji oraz 1 grywalną 'Misję Tajną' do domu. Uczniowie to pokochają!");
            
            const [params, setParams] = useState({
                topic: '',
                level: 'Klasy 4-6 SP',
                focus: 'Utrwalenie wiedzy'
            });

            const [generatedData, setGeneratedData] = useState(null);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 4000);
            };

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { 
                    setIsPremium(true); 
                    setAccessCode(''); 
                    showToast('Kod aktywny! Witamy w Premium 🌟');
                    setBotMessage("Odblokowano funkcje PRO! Teraz misje i bilety wyjścia będą spersonalizowane i oparte na psychologii grywalizacji.");
                } else {
                    showToast('Nieprawidłowy kod dostępu!');
                }
            };

            const generateContent = async () => {
                if (!params.topic.trim()) {
                    showToast('Wpisz temat zrealizowanej lekcji!');
                    return;
                }
                
                setIsGenerating(true);
                setGeneratedData(null);
                setBotMessage("Opracowuję karty wyjścia i wymyślam wciągającą fabułę dla Tajnej Misji... Chwileczkę!");
                
                const systemPrompt = `Jesteś ekspertem ds. grywalizacji i oceniania kształtującego w edukacji. Zamiast zadawać klasyczne prace domowe, tworzysz narzędzia motywacyjne.
                Odpowiadaj WYŁĄCZNIE i TYLKO w formacie JSON.
                
                WYTYCZNE:
                1. Stwórz 4 różne "Bilety Wyjścia" (Exit Tickets) – to szybkie pytania na koniec lekcji (np. 'Napisz 2 rzeczy, które dziś zapamiętałeś' lub krótka zagadka do tematu).
                2. Stwórz 1 "Tajną Misję" – dobrowolne, grywalne zadanie do wykonania w domu bez użycia podręcznika (np. poszukanie czegoś w kuchni, wywiad z rodzicem). Musi mieć tajemniczy i angażujący tytuł.
                3. Dostosuj ton i trudność do wieku: ${params.level}.
                
                FORMAT JSON:
                {
                  "lesson_topic": "Tytuł lekcji",
                  "exit_tickets": [
                    { "id": 1, "type": "Krótka kategoria", "question": "Treść pytania na bilecik" },
                    { "id": 2, "type": "Krótka kategoria", "question": "Treść pytania na bilecik" },
                    { "id": 3, "type": "Krótka kategoria", "question": "Treść pytania na bilecik" },
                    { "id": 4, "type": "Krótka kategoria", "question": "Treść pytania na bilecik" }
                  ],
                  "secret_mission": {
                    "codename": "Kryptonim misji (np. Operacja O2)",
                    "objective": "Dokładny opis misji dla ucznia",
                    "xp_reward": "Nagroda (np. 100 XP i uśmiech nauczyciela)"
                  }
                }`;

                const userPrompt = `Temat zrealizowanej lekcji: ${params.topic}\nEtap edukacyjny: ${params.level}\nGłówny cel: ${params.focus}. Proszę o wygenerowanie danych w JSON.`;

                try {
                    const payload = { 
                        system: systemPrompt,
                        prompt: userPrompt,
                        temperature: 0.6,
                        format: "json",
                        model: "gpt-4o-mini"
                    };

                    const res = await fetch('/api/chat', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.details || data.message || "Błąd serwera");
                    
                    let cleanText = data.text;
                    if (cleanText.includes('"reasoning_content"')) {
                        const startIdx = cleanText.indexOf('"content":"');
                        if (startIdx !== -1) {
                            let extracted = cleanText.substring(startIdx + 11).replace(/"\s*}\s*$/, '').replace(/"$/, ''); 
                            cleanText = extracted.replace(/\\n/g, '\n').replace(/\\"/g, '"'); 
                        }
                    } else {
                        try { const outerObj = JSON.parse(cleanText); if(outerObj.content) cleanText = outerObj.content; else if (outerObj.choices) cleanText = outerObj.choices[0].message.content; } catch(e){}
                    }
                    cleanText = cleanText.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
                    let jsonStr = cleanText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const start = jsonStr.indexOf('{');
                    const end = jsonStr.lastIndexOf('}');
                    if(start !== -1 && end !== -1) jsonStr = jsonStr.substring(start, end + 1);
                    
                    setGeneratedData(JSON.parse(jsonStr));
                    setBotMessage("Bum! Masz gotowe materiały. Bilety wydrukuj, przetnij na 4 części i rozdaj na 3 minuty przed dzwonkiem!");
                    
                } catch (error) {
                    console.error("Błąd AI:", error); 
                    showToast(`Błąd: ${error.message}`);
                    setBotMessage("Serwer jest obciążony. Odczekaj 5 sekund i kliknij Generuj jeszcze raz!");
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const exportToWord = () => {
                if(!generatedData) return;
                const content = document.getElementById('print-container').innerHTML;
                const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Karty Wyjścia - EduMotywator</title>
                <style>
                    body { font-family: 'Arial', sans-serif; font-size: 11pt; color: #000; }
                    .ticket-grid { display: block; }
                    .ticket-card { border: 1px dashed #666; padding: 15px; margin-bottom: 20px; width: 45%; float: left; margin-right: 5%; height: 200px; box-sizing: border-box; }
                    .ticket-header { font-size: 14pt; font-weight: bold; text-align: center; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px; }
                    .mission-card { clear: both; border: 2px solid #000; padding: 20px; background-color: #f9f9f9; margin-top: 40px; }
                    h2 { color: #5b21b6; }
                </style></head><body>`;
                const footer = `</body></html>`;
                const blob = new Blob(['\ufeff', header + content + footer], { type: 'application/msword' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `EduMotywator_${Date.now()}.doc`;
                link.click();
            };

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden">
                    
                    {toastMessage && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-violet-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-sm animate-toast flex items-center gap-3 border border-violet-400">
                            <Icon name="AlertCircle" size={18} /> {toastMessage}
                        </div>
                    )}

                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center text-white">
                            <div className="glass-panel p-10 rounded-3xl flex flex-col items-center space-y-6 max-w-sm border border-violet-500/20 shadow-[0_0_50px_rgba(139,92,246,0.2)]">
                                <div className="w-16 h-16 border-4 border-slate-700 border-t-violet-500 rounded-full animate-spin"></div>
                                <div className="text-center">
                                    <h3 className="text-xl font-bold mb-2 text-white">Generowanie Grywalizacji...</h3>
                                    <p className="text-xs text-slate-400 font-medium">Uczniowie to pokochają.</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed top-0 w-full z-50 glass-nav py-4 px-6 print-hidden">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3 font-extrabold text-xl tracking-tight cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className="bg-gradient-to-br from-violet-500 to-fuchsia-600 p-2 rounded-xl text-white shadow-lg">
                                    <Icon name="Ticket" size={22}/>
                                </div>
                                <span>Edu<span className="text-violet-400">Motywator</span> AI</span>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                {!isPremium && (
                                    <div className="hidden md:flex items-center space-x-2 bg-slate-900 p-1.5 rounded-xl border border-slate-700">
                                        <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium text-white placeholder-slate-500"/>
                                        <button onClick={handleVerifyCode} className="p-2 text-white rounded-lg bg-slate-800 hover:bg-slate-700 transition-colors border border-slate-600"><Icon name="Lock" size={16}/></button>
                                    </div>
                                )}
                                <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 text-sm shadow-md">
                                    <Icon name="Coffee" size={18} className="text-amber-400"/><span>Postaw Kawę</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 pt-32 pb-24 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0 relative z-10">
                        
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            
                            <div className="glass-panel p-6 md:p-8 rounded-[2rem] space-y-6 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-[0.03] text-violet-400"><Icon name="Target" size={80}/></div>
                                <h2 className="font-bold text-sm uppercase tracking-widest border-b border-slate-700/50 pb-4 text-violet-400 flex items-center gap-2 relative z-10">
                                    <Icon name="Target" size={18} /> Konfigurator Motywatora
                                </h2>
                                
                                <div className="relative z-10">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">Temat zrealizowanej lekcji</label>
                                    <textarea 
                                        value={params.topic} 
                                        onChange={e => setParams({...params, topic: e.target.value})} 
                                        placeholder="np. Budowa komórki roślinnej, Pierwsza Wojna Światowa..." 
                                        className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm font-medium resize-none focus:border-violet-500 transition-colors placeholder-slate-600 h-28 custom-scrollbar"
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-3 relative z-10">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Wiek Uczniów</label>
                                        <select value={params.level} onChange={e => setParams({...params, level: e.target.value})} className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm font-medium focus:border-violet-500 transition-colors appearance-none">
                                            <option className="bg-slate-900">Klasy 1-3 SP</option>
                                            <option className="bg-slate-900">Klasy 4-6 SP</option>
                                            <option className="bg-slate-900">Klasy 7-8 SP</option>
                                            <option className="bg-slate-900">Liceum/Technikum</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Cel Główny</label>
                                        <select value={params.focus} onChange={e => setParams({...params, focus: e.target.value})} className="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl outline-none text-white text-sm font-medium focus:border-violet-500 transition-colors appearance-none">
                                            <option className="bg-slate-900">Utrwalenie wiedzy</option>
                                            <option className="bg-slate-900">Kreatywne myślenie</option>
                                            <option className="bg-slate-900">Informacja zwrotna (dla mnie)</option>
                                        </select>
                                    </div>
                                </div>

                                {!isPremium ? (
                                    <div className="p-6 rounded-xl border-2 border-dashed border-slate-700 flex flex-col items-center justify-center text-center gap-3 bg-slate-900/50 relative z-10">
                                        <div className="p-3 bg-slate-800 rounded-full"><Icon name="Lock" size={24} className="text-slate-400"/></div>
                                        <div>
                                            <span className="text-sm font-bold text-slate-300 block mb-1">Funkcja zablokowana</span>
                                            <span className="text-xs text-slate-500">Wpisz kod Premium na górnym pasku.</span>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={generateContent} disabled={isGenerating} className="w-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white py-4 rounded-xl font-black text-sm tracking-widest shadow-lg shadow-violet-500/20 flex justify-center items-center gap-2 transition-all active:scale-95 uppercase disabled:opacity-50 relative z-10">
                                        <Icon name="Sparkles" size={20}/> Generuj z AI
                                    </button>
                                )}
                            </div>

                            <div className="p-5 rounded-3xl shadow-lg border flex items-start gap-4 animate-[reveal_0.3s_ease-out] transition-colors bg-violet-900/20 border-violet-500/30">
                                <BotHelperAvatar />
                                <div className="flex-1 pt-1">
                                    <h4 className="font-black text-xs uppercase tracking-widest mb-1.5 text-violet-400">EduBot Motywator</h4>
                                    <p className="text-sm font-medium leading-relaxed text-slate-300 bot-bubble" key={botMessage}>{botMessage}</p>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10 print:block">
                            
                            {!generatedData ? (
                                <div className="glass-panel w-full max-w-[210mm] min-h-[297mm] shadow-2xl p-8 rounded-[2rem] flex flex-col items-center justify-center text-center space-y-6 print-hidden border-2 border-dashed border-slate-700">
                                    <div className="p-6 bg-slate-800/50 rounded-full border border-slate-700 shadow-inner opacity-50">
                                        <Icon name="Ticket" size={64} className="text-violet-500" />
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-bold mb-3 text-white">Materiały bez zadawania do domu!</h2>
                                        <p className="max-w-md mx-auto text-slate-400 leading-relaxed text-sm">Wypełnij temat lekcji po lewej stronie. Aplikacja stworzy dla Ciebie gotowe do wydruku "Bilety Wyjścia" dla uczniów oraz jedną intrygującą, tajną misję.</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full max-w-[210mm] animate-[reveal_0.5s_ease-out] print:max-w-full">
                                    
                                    <div className="flex justify-end gap-3 mb-6 print-hidden bg-slate-900/50 p-2 rounded-2xl border border-slate-800 backdrop-blur-md">
                                        <button onClick={exportToWord} className="flex-1 sm:flex-none bg-violet-600 hover:bg-violet-500 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm shadow-[0_0_15px_rgba(139,92,246,0.3)] active:scale-95">
                                            <Icon name="Download" size={18}/> Word (.docx)
                                        </button>
                                        <button onClick={() => window.print()} className="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm active:scale-95">
                                            <Icon name="Printer" size={18}/> Drukuj PDF
                                        </button>
                                    </div>

                                    {/* BIAŁY KONTENER A4 DO DRUKU */}
                                    <div id="print-container" className="bg-white shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-10 md:p-12 text-slate-900 rounded-[2rem] min-h-[297mm] print-font">
                                        
                                        <div className="text-center mb-8 border-b-2 border-slate-200 pb-6 print-hidden">
                                            <h1 className="text-2xl font-black text-slate-800 uppercase tracking-tight">Gotowe materiały</h1>
                                            <p className="text-sm text-slate-500 mt-2">Wydrukuj tę stronę. U góry znajdują się bilety wyjścia do pocięcia, na dole Tajna Misja.</p>
                                        </div>

                                        {/* GRID 2x2 NA BILETY WYJŚCIA */}
                                        <h2 className="text-xl font-black text-violet-700 mb-4 flex items-center gap-2 uppercase tracking-wide"><Icon name="Ticket" size={24}/> Bilety Wyjścia (Rozdaj w klasie)</h2>
                                        <div className="grid grid-cols-2 gap-4 mb-12 ticket-grid">
                                            {generatedData.exit_tickets.map((ticket, i) => (
                                                <div key={i} className="ticket-card border-2 border-dashed border-slate-300 rounded-xl p-5 bg-slate-50 relative h-48 flex flex-col page-break-inside-avoid">
                                                    <div className="flex justify-between items-center mb-3 border-b border-slate-200 pb-2">
                                                        <span className="text-[10px] font-black uppercase tracking-widest text-violet-600 bg-violet-100 px-2 py-1 rounded-md">{ticket.type}</span>
                                                        <span className="text-xs font-bold text-slate-400">Bilet #{ticket.id}</span>
                                                    </div>
                                                    <p className="text-sm md:text-base font-bold text-slate-800 flex-grow leading-snug">{ticket.question}</p>
                                                    <div className="border-t border-slate-200 mt-4 pt-2">
                                                        <span className="text-[10px] text-slate-400 font-medium">Imię: .......................................</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* KARTA TAJNEJ MISJI */}
                                        <div className="page-break-inside-avoid mission-card relative overflow-hidden rounded-2xl border-4 border-slate-800 bg-slate-50 p-8 shadow-sm">
                                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-violet-500 via-fuchsia-500 to-amber-500"></div>
                                            <div className="absolute top-6 right-6 opacity-10 text-slate-900"><Icon name="Trophy" size={80}/></div>
                                            
                                            <div className="flex items-center gap-3 mb-6 relative z-10">
                                                <div className="bg-slate-800 text-white p-2.5 rounded-xl"><Icon name="Target" size={24}/></div>
                                                <div>
                                                    <h2 className="text-sm font-black text-slate-500 uppercase tracking-widest">Dobrowolne wyzwanie domowe</h2>
                                                    <h3 className="text-2xl font-black text-slate-900 uppercase tracking-tight">{generatedData.secret_mission.codename}</h3>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-white border-2 border-slate-200 p-6 rounded-xl mb-6 relative z-10">
                                                <h4 className="text-xs font-black text-violet-600 uppercase tracking-widest mb-2">Treść Misji:</h4>
                                                <p className="text-base font-medium text-slate-800 leading-relaxed">{generatedData.secret_mission.objective}</p>
                                            </div>

                                            <div className="flex items-center justify-between border-t-2 border-slate-200 pt-4 relative z-10">
                                                <div className="flex items-center gap-2">
                                                    <Icon name="Sparkles" size={20} className="text-amber-500"/>
                                                    <span className="text-sm font-bold text-slate-700">Nagroda za raport z misji: <span className="text-amber-600 font-black">{generatedData.secret_mission.xp_reward}</span></span>
                                                </div>
                                                <div className="text-[10px] font-black uppercase text-slate-400 tracking-widest border border-slate-300 px-3 py-1.5 rounded-lg">Misja Opcjonalna</div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
