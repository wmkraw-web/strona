<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Przedszkolne SOS AI - Wsparcie SPE i Rodzice</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0b1120; 
            color: #f8fafc; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        /* Magiczne Aury w tle - Kojące kolory (róż, fiolet, błękit) */
        .aura-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            z-index: -1;
            animation: float 12s infinite ease-in-out alternate;
            pointer-events: none;
        }
        .aura-1 { top: -5%; left: -10%; width: 60vw; height: 600px; background: radial-gradient(circle, #ec4899, transparent 70%); }
        .aura-2 { top: 30%; right: -10%; width: 50vw; height: 600px; background: radial-gradient(circle, #8b5cf6, transparent 70%); animation-delay: -4s; }
        .aura-3 { bottom: 10%; left: 10%; width: 55vw; height: 600px; background: radial-gradient(circle, #3b82f6, transparent 70%); animation-delay: -8s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -40px) scale(1.05); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }

        .glass-panel { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .glass-nav { 
            background: rgba(11, 17, 32, 0.7); 
            backdrop-filter: blur(24px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }
        
        .text-gradient { 
            background: linear-gradient(135deg, #f472b6 0%, #a855f7 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 8px; }
        
        .btn-bounce:active { transform: scale(0.95); }

        /* Styl do linków źródłowych */
        .source-link {
            transition: all 0.2s ease;
        }
        .source-link:hover {
            transform: translateX(5px);
            color: #f472b6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const BUY_COFFEE_LINK = "https://buycoffee.to/magiccolor";

        const PROMPTS = {
            zachowanie: `Jesteś wybitnym pedagogiem specjalnym, terapeutą integracji sensorycznej (SI) oraz analitykiem zachowania (ABA) w przedszkolu specjalnym.
Zadanie: Przeanalizuj opisane zachowanie dziecka i podaj natychmiastowe rozwiązanie.
Twoja odpowiedź musi być podzielona na 3 wyraźne sekcje:
1. 🧠 POTENCJALNA PRZYCZYNA: Dlaczego dziecko tak robi? (funkcja zachowania: ucieczka, stymulacja, potrzeba uwagi, namacalne wzmocnienie, czy przebodźcowanie).
2. 🚨 SZYBKA REAKCJA: 3 punkty, co zrobić tu i teraz, w momencie napadu (jak uspokoić, jak zadbać o bezpieczeństwo).
3. 🛠️ DZIAŁANIE DŁUGOTERMINOWE: Jak pracować z dzieckiem nad tym problemem w kolejne dni.
Pisz krótko, empatycznie i językiem bardzo praktycznym. Omiń suchą teorię, daj same narzędzia.`,

            rodzic: `Jesteś empatycznym psychologiem i mediatorem w przedszkolu specjalnym. 
Zadanie: Nauczyciel ma problem we współpracy z rodzicem dziecka specjalnego (rodzic wypiera problem, jest roszczeniowy, lub bezradny).
Podziel poradę na 3 sekcje:
1. 💡 PERSPEKTYWA RODZICA: Wyjaśnij krótko nauczycielowi, z czego może wynikać postawa rodzica (żal, stres, mechanizmy obronne).
2. 🗣️ GOTOWE ZDANIA: Podaj 3 gotowe sformułowania (konkretne zdania w cudzysłowach), których nauczyciel może użyć w rozmowie, by nie atakować rodzica, a wejść z nim w sojusz (język NVC).
3. 🚧 STRATEGIA ROZMOWY: Jak ustalić granice i zaplanować współpracę.`,
        };

        function App() {
            const [activeMode, setActiveMode] = useState('zachowanie'); // 'zachowanie' lub 'rodzic'
            const [inputText, setInputText] = useState('');
            const [useWebSearch, setUseWebSearch] = useState(true); // Nowa funkcja! Wyszukiwanie Google
            
            const [generatedText, setGeneratedText] = useState('');
            const [sources, setSources] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState('');
            
            const resultRef = useRef(null);

            // Funkcja realizująca "Exponential Backoff" dla stabilności API
            const fetchWithRetry = async (url, options, retries = 3, delay = 1000) => {
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, options);
                        if (!response.ok) throw new Error(`Status API: ${response.status}`);
                        return await response.json();
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(res => setTimeout(res, delay * Math.pow(2, i))); // 1s, 2s, 4s
                    }
                }
            };

            const generateAdvice = async () => {
                if (!inputText.trim()) {
                    setError('Opisz krótko sytuację, zanim poprosisz o poradę.');
                    return;
                }

                setIsGenerating(true);
                setError('');
                setGeneratedText('');
                setSources([]);

                try {
                    const apiKey = ""; // Klawisz środowiska chmurowego
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const systemInstruction = PROMPTS[activeMode];
                    const finalPrompt = `Sytuacja/Problem do rozwiązania:\n"""\n${inputText}\n"""`;

                    const payload = {
                        contents: [{ parts: [{ text: finalPrompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        generationConfig: { temperature: 0.5 } // Trochę ciepła na empatię i kreatywne rozwiązania
                    };

                    // AKTYWACJA GOOGLE SEARCH GROUNDING!
                    if (useWebSearch) {
                        payload.tools = [{ google_search: {} }];
                    }

                    const data = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        setGeneratedText(text);
                        
                        // Ekstrakcja linków źródłowych (Grounding)
                        if (useWebSearch && data.candidates[0].groundingMetadata?.groundingAttributions) {
                            const attributions = data.candidates[0].groundingMetadata.groundingAttributions;
                            // Wydobywamy unikalne linki i tytuły
                            const extractedSources = [];
                            const seenUris = new Set();
                            
                            attributions.forEach(attr => {
                                const web = attr.web;
                                if (web && web.uri && !seenUris.has(web.uri)) {
                                    seenUris.add(web.uri);
                                    extractedSources.push({ title: web.title || web.uri, uri: web.uri });
                                }
                            });
                            setSources(extractedSources);
                        }
                        
                        setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                    } else {
                        throw new Error("Pusta odpowiedź z API.");
                    }

                } catch (err) {
                    console.error("Błąd generowania:", err);
                    setError('Chwilowy brak połączenia z siecią. Wczytuję poradę pokazową z bazy offline.');
                    
                    // Fallback Demo
                    setTimeout(() => {
                        const demoText = activeMode === 'zachowanie' 
                            ? "🧠 POTENCJALNA PRZYCZYNA:\nZachowanie (rzucanie zabawkami w momencie polecenia 'czas na obiad') ma najprawdopodobniej funkcję **ucieczkową**. Dziecko ma trudności z przejściami (tzw. tranzycjami) pomiędzy preferowaną aktywnością (zabawa) a niepreferowaną/wymagającą (obiad, hałas w jadalni).\n\n🚨 SZYBKA REAKCJA:\n1. **Zabezpiecz teren:** Usuń z zasięgu twarde przedmioty, by nikomu nie stała się krzywda.\n2. **Zredukuj bodźce:** Nie mów za dużo. Użyj tylko jednego krótkiego hasła: \"Klocki stop. Idziemy.\"\n3. **Przekierowanie uwagi:** Pokaż piktogram 'Obiad' lub daj do ręki ulubiony rekwizyt przejścia (np. maskotkę, którą dziecko może zabrać do jadalni).\n\n🛠️ DZIAŁANIE DŁUGOTERMINOWE:\nWprowadź tablicę wizualną \"Najpierw-Potem\" i uprzedzaj o końcu zabawy (np. pokazując minutnik typu Time Timer na 5 minut przed końcem)."
                            : "💡 PERSPEKTYWA RODZICA:\nAgresywna postawa matki to najczęściej maska bezradności i potężnego lęku o przyszłość dziecka. Wypieranie diagnozy to naturalny pierwszy etap żałoby po tzw. \"idealnym dziecku\". Rodzic atakuje Ciebie, bo tak jest łatwiej, niż zmierzyć się z zaburzeniem dziecka.\n\n🗣️ GOTOWE ZDANIA:\n1. *\"Widzę, jak bardzo zależy Pani na dobru Krzysia. Chcę, żeby wiedziała Pani, że gramy w jednej drużynie – obojgu nam zależy na jego spokoju.\"* \n2. *\"Zauważyłam, że Krzyś ma świetne momenty, gdy... ale widzę, że trudność sprawia mu... Jak to wygląda w domu?\"*\n3. *\"Nie oceniam Pani ani Krzysia. Szukam tylko narzędzi, które pomogą mu czuć się u nas bezpiecznie. Czy możemy spróbować przez tydzień metody X i zobaczyć efekty?\"*\n\n🚧 STRATEGIA ROZMOWY:\nZawsze stosuj \"metodę kanapki\": zacznij od szczerej pochwały dziecka, przejdź do suchego opisu faktu (bez oceniania!) i zakończ zaproszeniem do partnerstwa.";
                        
                        setGeneratedText(demoText);
                        setSources([
                            { title: "Terapia SI - Jak radzić sobie z trudnymi zachowaniami?", uri: "https://www.google.com/search?q=trudne+zachowania+przedszkolakow+autyzm" },
                            { title: "Praca z roszczeniowym rodzicem - metody NVC", uri: "https://www.google.com/search?q=komunikacja+NVC+z+rodzicami+w+przedszkolu" }
                        ]);
                        setIsGenerating(false);
                    }, 1500);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen relative flex flex-col">
                    <div className="aura-blob aura-1"></div>
                    <div className="aura-blob aura-2"></div>
                    <div className="aura-blob aura-3"></div>

                    {/* NAWIGACJA */}
                    <nav className="fixed top-0 w-full z-50 glass-nav">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-pink-500 to-violet-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(236,72,153,0.5)]">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                                </div>
                                <span className="text-xl font-extrabold tracking-tight text-white hidden sm:block">Przedszkolne<span className="text-pink-400">SOS</span></span>
                            </div>
                            
                            <div className="flex items-center gap-2 sm:gap-4">
                                <a href="index.html" className="flex items-center gap-2 text-xs sm:text-sm font-bold text-slate-400 hover:text-white transition-colors bg-slate-800/50 hover:bg-slate-700 px-3 sm:px-4 py-2 rounded-xl border border-slate-700">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                                    <span className="hidden sm:inline">Wróć</span>
                                </a>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-32 pb-20 px-4 sm:px-6">
                        <div className="max-w-4xl mx-auto">
                            
                            {/* Nagłówek dedykowany */}
                            <div className="text-center mb-10 fade-in">
                                <div className="inline-flex items-center gap-2 bg-pink-900/30 border border-pink-500/30 px-4 py-1.5 rounded-full text-[10px] font-black text-pink-400 uppercase tracking-widest mb-4 backdrop-blur-sm">
                                    Wsparcie dla Nauczycieli SPE
                                </div>
                                <h1 className="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">
                                    Zawsze wiesz, <span className="text-gradient">co zrobić.</span>
                                </h1>
                                <p className="text-slate-300 text-lg max-w-2xl mx-auto font-medium">
                                    Trudne zachowanie dziecka? Roszczeniowy rodzic? Opisz sytuację, a sztuczna inteligencja podpowie metody i wyszuka dla Ciebie darmowe rozwiązania w sieci!
                                </p>
                            </div>

                            {/* Tryby Pracy (Taby) */}
                            <div className="grid grid-cols-2 gap-3 sm:gap-4 mb-8 fade-in" style={{animationDelay: '0.1s'}}>
                                <button 
                                    onClick={() => setActiveMode('zachowanie')}
                                    className={`p-4 sm:p-6 rounded-3xl border-2 transition-all duration-300 text-left flex flex-col gap-3 ${activeMode === 'zachowanie' ? 'bg-fuchsia-900/30 border-fuchsia-500 shadow-[0_0_30px_rgba(217,70,239,0.2)]' : 'glass-panel border-slate-700/50 hover:border-slate-500 opacity-80 hover:opacity-100'}`}
                                >
                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${activeMode === 'zachowanie' ? 'bg-fuchsia-500 text-white shadow-lg shadow-fuchsia-500/30' : 'bg-slate-800 text-slate-400'}`}>
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                    </div>
                                    <div>
                                        <h3 className={`font-bold text-lg ${activeMode === 'zachowanie' ? 'text-white' : 'text-slate-300'}`}>Trudne Zachowanie Dziecka</h3>
                                        <p className="text-xs text-slate-400 mt-1">Przyczyny (SI / ABA) i szybkie strategie wyciszania.</p>
                                    </div>
                                </button>

                                <button 
                                    onClick={() => setActiveMode('rodzic')}
                                    className={`p-4 sm:p-6 rounded-3xl border-2 transition-all duration-300 text-left flex flex-col gap-3 ${activeMode === 'rodzic' ? 'bg-blue-900/30 border-blue-500 shadow-[0_0_30px_rgba(59,130,246,0.2)]' : 'glass-panel border-slate-700/50 hover:border-slate-500 opacity-80 hover:opacity-100'}`}
                                >
                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${activeMode === 'rodzic' ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/30' : 'bg-slate-800 text-slate-400'}`}>
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                                    </div>
                                    <div>
                                        <h3 className={`font-bold text-lg ${activeMode === 'rodzic' ? 'text-white' : 'text-slate-300'}`}>Trudna Rozmowa z Rodzicem</h3>
                                        <p className="text-xs text-slate-400 mt-1">Zrozumienie, granice i gotowe zdania NVC.</p>
                                    </div>
                                </button>
                            </div>

                            {/* Pole Textarea */}
                            <div className="glass-panel p-6 sm:p-8 rounded-[2rem] fade-in border border-slate-700/50" style={{animationDelay: '0.2s'}}>
                                <label className="block text-white font-bold mb-4 flex items-center gap-2">
                                    {activeMode === 'zachowanie' ? 'Opisz dokładnie zachowanie dziecka:' : 'Opisz postawę i zarzuty rodzica:'}
                                </label>
                                
                                <textarea 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder={
                                        activeMode === 'zachowanie' 
                                        ? "Np. Krzyś (5 lat z autyzmem) zaczął rzucać klockami i krzyczeć, gdy usłyszał 'koniec zabawy, idziemy na obiad'. Zatyka uszy." 
                                        : "Np. Mama Oli przyszła rano z pretensjami, że nikt się nią nie zajmuje. Neguje, że Ola bije inne dzieci i twierdzi, że to inni ją prowokują."
                                    }
                                    className="w-full h-32 bg-slate-900/60 border border-slate-600 text-white rounded-2xl p-5 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 custom-scrollbar resize-y text-sm sm:text-base mb-6"
                                ></textarea>

                                {/* WŁĄCZNIK WYSZUKIWANIA W SIECI */}
                                <div className="flex items-center gap-3 bg-slate-900/40 p-4 rounded-xl border border-slate-700 mb-6">
                                    <div className="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                        <input type="checkbox" name="toggle" id="toggle" checked={useWebSearch} onChange={(e) => setUseWebSearch(e.target.checked)} className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-slate-700 appearance-none cursor-pointer transition-transform duration-300 ease-in-out" style={{ transform: useWebSearch ? 'translateX(100%)' : 'translateX(0)', borderColor: useWebSearch ? '#ec4899' : '#334155' }}/>
                                        <label htmlFor="toggle" className={`toggle-label block overflow-hidden h-6 rounded-full cursor-pointer transition-colors duration-300 ease-in-out ${useWebSearch ? 'bg-pink-500' : 'bg-slate-700'}`}></label>
                                    </div>
                                    <div>
                                        <label htmlFor="toggle" className="text-sm font-bold text-white cursor-pointer block">Przeszukaj też darmowy Internet 🌍</label>
                                        <span className="text-[10px] text-slate-400">Obejście paywalla. AI znajdzie i poda darmowe artykuły rozwiązujące ten problem.</span>
                                    </div>
                                </div>

                                {error && (
                                    <div className="mb-6 p-4 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm font-medium text-center">{error}</div>
                                )}

                                <div className="flex justify-end">
                                    <button 
                                        onClick={generateAdvice}
                                        disabled={isGenerating || !inputText.trim()}
                                        className={`w-full sm:w-auto px-8 py-4 rounded-xl font-black text-white transition-all flex items-center justify-center gap-2 shadow-lg btn-bounce
                                            ${isGenerating ? 'bg-slate-700 cursor-not-allowed' : 'bg-gradient-to-r from-pink-500 to-violet-600 hover:scale-105 shadow-[0_10px_20px_rgba(236,72,153,0.3)]'}`}
                                    >
                                        {isGenerating ? (
                                            <><svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Wyszukiwanie rozwiązań...</>
                                        ) : `Ratuj Sytuację`}
                                    </button>
                                </div>
                            </div>

                            {/* Wynik */}
                            {generatedText && (
                                <div ref={resultRef} className="mt-8 fade-in">
                                    
                                    {/* Główna Porada AI */}
                                    <div className="glass-panel p-6 sm:p-10 rounded-3xl border border-pink-500/30 shadow-[0_0_40px_rgba(236,72,153,0.15)] relative overflow-hidden bg-slate-900/90 mb-6">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-500 to-violet-600"></div>
                                        <h3 className="text-2xl font-black text-white mb-6 uppercase tracking-wider flex items-center gap-2">
                                            <svg className="w-6 h-6 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                            Kroki Działania
                                        </h3>
                                        <div className="text-slate-200 whitespace-pre-wrap text-base sm:text-lg leading-relaxed font-medium">
                                            {generatedText}
                                        </div>
                                    </div>
                                    
                                    {/* Sekcja Darmowych Linków (Grounding) */}
                                    {useWebSearch && sources.length > 0 && (
                                        <div className="glass-panel p-6 rounded-2xl border border-blue-500/30 bg-blue-900/20 shadow-[0_0_20px_rgba(59,130,246,0.1)]">
                                            <h4 className="text-lg font-bold text-blue-400 flex items-center gap-2 mb-4">
