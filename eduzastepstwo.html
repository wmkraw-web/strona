<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>EduZastępstwo 999 - Ratunkowy Generator Lekcji</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        .glass-panel { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .glass-nav { 
            background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .text-gradient { 
            background: linear-gradient(135deg, #f43f5e 0%, #f97316 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .hero-glow {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 800px;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.15) 0%, rgba(2, 6, 23, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-bounce:active { transform: scale(0.95); }
        
        /* Pulsujący przycisk ratunkowy */
        .btn-emergency {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const BUY_COFFEE_LINK = "https://buycoffee.to/magiccolor";

        const SYSTEM_PROMPT = `Jesteś ekspertem edukacyjnym ratującym nauczycieli przed "okienkami" i nagłymi zastępstwami.
Zadanie: Wygeneruj 45-minutowy scenariusz lekcji typu "Zero-Prep" (nie wymaga kserówek, nożyczek, internetu, ani żadnych rekwizytów poza tablicą i kredą/mazakiem).

STRUKTURA LEKCJI (Zachowaj emotikony):
1. 🎯 Temat ratunkowy: (Ciekawy, chwytliwy tytuł, np. "Kryminalne zagadki logiki").
2. ⏱️ Rozgrzewka (5 min): Szybka akcja na skupienie uwagi (np. zabawa w skojarzenia).
3. 🧠 Główne zadanie (30 min): Szczegółowo rozpisana gra, debata, historia z morałem lub zagadka logiczna. MUSISZ PODAĆ GOTOWĄ TREŚĆ (jeśli to zagadki, podaj treść zagadek i odpowiedzi, żeby nauczyciel miał to na tacy).
4. 🏁 Podsumowanie (10 min): Spokojne zakończenie lekcji i wyciszenie klasy.

STYL:
Pisz bezpośrednio do nauczyciela. Zadbaj, żeby treści były w 100% dostosowane do wybranej grupy wiekowej. Pamiętaj: nauczyciel czyta to idąc korytarzem do klasy. Ma być zwięźle, konkretnie i gotowe do użycia natychmiast!`;

        function App() {
            const [ageGroup, setAgeGroup] = useState('klasy 4-6');
            const [activityType, setActivityType] = useState('zagadki');
            const [generatedText, setGeneratedText] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [error, setError] = useState('');

            const resultRef = useRef(null);

            const generateLesson = async () => {
                setIsGenerating(true);
                setError('');
                setGeneratedText('');

                try {
                    const apiKey = ""; // Twój klucz będzie wstrzyknięty w runtime
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const finalPrompt = `Wygeneruj lekcję na zastępstwo.\nGrupa wiekowa: ${ageGroup}\nTyp aktywności: ${activityType}`;

                    const payload = {
                        contents: [{ parts: [{ text: finalPrompt }] }],
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        generationConfig: { temperature: 0.7 } // Nieco wyższa temperatura dla kreatywności
                    };

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`Błąd API: ${response.status}`);
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        setGeneratedText(text);
                        setTimeout(() => resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                    } else {
                        throw new Error("Pusta odpowiedź z API.");
                    }

                } catch (err) {
                    console.error("Błąd generowania:", err);
                    setError('Brak połączenia z chmurą AI. Wczytuję scenariusz awaryjny.');
                    
                    // Fallback dla pokazu
                    setTimeout(() => {
                        const demoText = `🎯 Temat ratunkowy: Detektywi Logiki - Rozwiąż Sprawę!\n\n⏱️ Rozgrzewka (5 min):\n"Czółko bez kartek". Prosisz jednego ucznia, aby stanął tyłem do tablicy. Zapisujesz na tablicy jedno hasło (np. "Harry Potter", "Kalkulator", "Pizza"). Reszta klasy musi naprowadzić ucznia na to hasło, ale nie mogą używać słów pokrewnych. Maksymalnie 3 hasła na rozgrzewkę.\n\n🧠 Główne zadanie (30 min): Czarne Historie Szkolne\nZabawa w detektywów. Opowiadasz klasie dziwną, krótką historię, a oni zadają Ci pytania, na które możesz odpowiadać tylko "TAK", "NIE" lub "NIE MA ZNACZENIA". \n\nZAGADKA 1:\nMężczyzna wszedł do restauracji, zamówił zupę z mewy. Zjadł jedną łyżkę, wyszedł, poszedł na klif i skoczył. Dlaczego?\nROZWIĄZANIE DLA CIEBIE (nie czytaj na głos): Kiedyś statek mężczyzny rozbił się na bezludnej wyspie. Jego przyjaciel przynosił mu mięso, mówiąc, że to mewy (tak naprawdę był to inny rozbitek). Kiedy mężczyzna zjadł prawdziwą mewę w restauracji, poznał inny smak i uświadomił sobie straszną prawdę.\n\nZAGADKA 2:\nJanek leży martwy w kałuży wody. Dookoła leży szkło. Co się stało?\nROZWIĄZANIE: Janek to złota rybka. Przeciąg stłukł akwarium.\n\n🏁 Podsumowanie (10 min):\n"Mafia w pigułce" lub runda refleksji. Uczniowie zamykają oczy na 2 minuty. Kto z nich idealnie oszacuje, kiedy minęło równe 120 sekund, podnosi rękę. Zwycięzca (osoba najbliżej celu) dostaje pochwałę. Idealne wyciszenie przed dzwonkiem!`;
                        setGeneratedText(demoText);
                        setIsGenerating(false);
                    }, 1500);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen relative flex flex-col">
                    <div className="hero-glow"></div>

                    {/* NAWIGACJA Z PRZYCISKIEM KAWY */}
                    <nav className="fixed top-0 w-full z-50 glass-nav">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-rose-500 to-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-rose-500/20">
                                    <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                </div>
                                <span className="text-lg sm:text-xl font-extrabold tracking-tight text-white hidden sm:block">EduZastępstwo<span className="text-rose-500">999</span></span>
                            </div>
                            
                            <div className="flex items-center gap-2 sm:gap-4">
                                {/* GŁÓWNY PRZYCISK MONETYZACJI W APCE */}
                                <a href={BUY_COFFEE_LINK} target="_blank" className="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded-xl text-xs sm:text-sm font-bold shadow-[0_0_15px_rgba(217,119,6,0.4)] transition-all btn-bounce flex items-center gap-2 uppercase tracking-wide">
                                    <span>☕</span> <span className="hidden sm:inline">Postaw Kawę</span>
                                </a>

                                <a href="index.html" className="flex items-center gap-2 text-xs sm:text-sm font-bold text-slate-400 hover:text-white transition-colors bg-slate-800/50 hover:bg-slate-700 px-3 sm:px-4 py-2 rounded-xl border border-slate-700">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                                    <span className="hidden sm:inline">Wróć</span>
                                </a>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow pt-32 pb-20 px-4 sm:px-6">
                        <div className="max-w-3xl mx-auto">
                            
                            <div className="text-center mb-10 fade-in">
                                <div className="inline-flex items-center gap-2 bg-rose-900/30 border border-rose-500/30 px-4 py-1.5 rounded-full text-[10px] font-black text-rose-400 uppercase tracking-widest mb-4">
                                    🚨 Narzędzie Szybkiego Reagowania
                                </div>
                                <h1 className="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">
                                    Zastępstwo? <span className="text-gradient">Brak paniki.</span>
                                </h1>
                                <p className="text-slate-400 text-lg">
                                    Wybierz klasę, wybierz motyw i wygeneruj gotową lekcję w 5 sekund. Zero kserówek, zero przygotowań. Czysta edukacja ratunkowa.
                                </p>
                            </div>

                            <div className="glass-panel p-6 sm:p-8 rounded-[2rem] fade-in border border-slate-700/50" style={{animationDelay: '0.1s'}}>
                                
                                <div className="space-y-6">
                                    {/* Wybór klasy */}
                                    <div>
                                        <label className="block text-white font-bold mb-3 text-sm uppercase tracking-wider">Grupa wiekowa:</label>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                            {['Klasy 1-3', 'Klasy 4-6', 'Klasy 7-8', 'Szkoła Średnia'].map(age => (
                                                <button 
                                                    key={age}
                                                    onClick={() => setAgeGroup(age)}
                                                    className={`py-3 px-2 rounded-xl text-sm font-bold border-2 transition-all ${ageGroup === age ? 'bg-rose-600/20 border-rose-500 text-rose-400' : 'bg-slate-800/50 border-slate-700 text-slate-400 hover:border-slate-500'}`}
                                                >
                                                    {age}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Wybór motywu */}
                                    <div>
                                        <label className="block text-white font-bold mb-3 text-sm uppercase tracking-wider">Rodzaj aktywności "Zero-Prep":</label>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {[
                                                { id: 'zagadki logiczne i czarne historie', name: '🕵️ Zagadki logiczne / Detektyw' },
                                                { id: 'ciekawostki ze świata i teleturniej', name: '🌍 Ciekawostki / Mini-Turniej' },
                                                { id: 'gorąca debata na trudne tematy', name: '🗣️ Gorąca Debata Klasowa' },
                                                { id: 'zabawy integracyjne i relaksacja', name: '🧘 Integracja i Wyciszenie' }
                                            ].map(type => (
                                                <button 
                                                    key={type.id}
                                                    onClick={() => setActivityType(type.id)}
                                                    className={`py-4 px-4 rounded-xl text-sm font-bold border-2 transition-all flex items-center gap-2 ${activityType === type.id ? 'bg-orange-600/20 border-orange-500 text-orange-400' : 'bg-slate-800/50 border-slate-700 text-slate-400 hover:border-slate-500'}`}
                                                >
                                                    {type.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {error && <div className="mt-6 p-4 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm font-medium text-center">{error}</div>}

                                <div className="mt-10 flex justify-center">
                                    <button 
                                        onClick={generateLesson}
                                        disabled={isGenerating}
                                        className={`w-full sm:w-auto px-12 py-5 rounded-2xl font-black text-white text-lg transition-all flex items-center justify-center gap-3 ${isGenerating ? 'bg-slate-700 cursor-not-allowed' : 'bg-gradient-to-r from-rose-600 to-red-600 hover:from-rose-500 hover:to-red-500 btn-emergency btn-bounce shadow-xl'}`}
                                    >
                                        {isGenerating ? 'Trwa łączenie z centralą AI...' : '🚨 RATUJ MOJĄ LEKCJĘ!'}
                                    </button>
                                </div>
                            </div>

                            {/* Wynik */}
                            {generatedText && (
                                <div ref={resultRef} className="mt-12 fade-in">
                                    <div className="glass-panel p-6 sm:p-10 rounded-[2.5rem] border border-rose-500/30 shadow-[0_0_40px_rgba(244,63,94,0.15)] relative overflow-hidden bg-slate-900/90">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-rose-500 to-orange-500"></div>
                                        
                                        <h3 className="text-2xl font-black text-white mb-6 uppercase tracking-wider flex items-center gap-2">
                                            <svg className="w-6 h-6 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                            Twój Scenariusz
                                        </h3>
                                        
                                        <div className="prose prose-invert prose-rose max-w-none">
                                            <p className="text-slate-200 whitespace-pre-wrap text-base sm:text-lg leading-relaxed font-medium">
                                                {generatedText}
                                            </p>
                                        </div>
                                    </div>
                                    
                                    {/* MIEJSCE NA DODATKOWE PODZIĘKOWANIE / KAWĘ PO UZYSKANIU WYNIKU */}
                                    <div className="mt-6 text-center bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                                        <p className="text-slate-400 mb-3 font-medium">Udało się uratować lekcję bez stresu?</p>
                                        <a href={BUY_COFFEE_LINK} target="_blank" className="inline-flex items-center gap-2 text-amber-500 hover:text-amber-400 font-bold hover:underline">
                                            Postaw twórcy wirtualną kawę ☕ w ramach podziękowania!
                                        </a>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    <footer className="py-6 border-t border-slate-800 text-center text-sm font-bold text-slate-600 uppercase tracking-widest mt-auto">
                        Część systemu EduBox AI
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
