        const { useState, useEffect, useRef } = React;

        const Reveal = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef();
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setIsVisible(true); }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return <div ref={ref} className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`} style={{ transitionDelay: `${delay}ms` }}>{children}</div>;
        };

        const Counter = ({ target, duration = 2000 }) => {
            const [count, setCount] = useState(0);
            const ref = useRef();
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setIsVisible(true); }, { threshold: 0.5 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            useEffect(() => {
                if (!isVisible) return;
                let start = 0;
                const increment = target / (duration / 16);
                const timer = setInterval(() => {
                    start += increment;
                    if (start >= target) { setCount(target); clearInterval(timer); } else setCount(Math.ceil(start));
                }, 16);
                return () => clearInterval(timer);
            }, [isVisible, target, duration]);
            return <span ref={ref}>{count.toLocaleString('pl-PL')}</span>;
        };

        const VideoGreeting = () => {
            const [isMuted, setIsMuted] = useState(true);
            const [isClosed, setIsClosed] = useState(false);
            const videoRef = useRef(null);

            if (isClosed) return null;

            const handleToggleMute = () => {
                if (videoRef.current) {
                    videoRef.current.muted = !isMuted;
                    setIsMuted(!isMuted);
                    if (isMuted) {
                        videoRef.current.currentTime = 0; 
                        videoRef.current.play();
                    }
                }
            };

            return (
                <div className="fixed bottom-6 left-6 z-[100] flex flex-col items-start group">
                    {!isMuted && (
                        <div className="bg-white text-indigo-900 border border-indigo-100 text-xs font-bold py-3 px-4 rounded-2xl rounded-bl-sm shadow-xl mb-3 max-w-[220px] leading-relaxed animate-[reveal_0.3s_ease-out]">
                            "Witamy na EduBox AI! Skorzystaj z naszego chatbota po prawej stronie, odpowie od razu. Jeśli czegoś brakuje, napisz do nas!"
                        </div>
                    )}
                    {isMuted && (
                        <div className="absolute left-[85px] top-2 bg-pink-500 text-white text-[10px] font-bold py-1.5 px-3 rounded-2xl rounded-tl-sm shadow-lg whitespace-nowrap animate-bounce pointer-events-none">
                            Kliknij i posłuchaj! 🔊
                        </div>
                    )}
                    <div className="relative">
                        <button onClick={() => setIsClosed(true)} className="absolute -top-2 -right-2 bg-white text-slate-400 hover:text-slate-700 w-6 h-6 rounded-full shadow-md flex items-center justify-center z-10 text-xs font-bold transition-colors">✕</button>
                        <div onClick={handleToggleMute} className={`relative overflow-hidden shadow-2xl cursor-pointer transition-all duration-500 ease-in-out ${isMuted ? 'w-20 h-20 rounded-full border-4 border-white hover:scale-105' : 'w-36 h-48 rounded-2xl border-4 border-indigo-500'}`}>
                            <video 
                                ref={videoRef}
                                src="powitanie.mp4" 
                                autoPlay 
                                loop={isMuted} 
                                muted={isMuted} 
                                playsInline
                                onEnded={() => {
                                    setIsMuted(true);
                                    if (videoRef.current) { videoRef.current.muted = true; videoRef.current.play(); }
                                }}
                                className="w-full h-full object-cover"
                                poster="https://images.unsplash.com/photo-1573164713988-8665fc963095?q=80&w=200&auto=format&fit=crop"
                            />
                            {isMuted && (
                                <div className="absolute inset-0 bg-black/20 flex items-center justify-center transition-opacity hover:bg-black/40">
                                    <svg className="w-8 h-8 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><line x1="3" y1="3" x2="21" y2="21" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const BotAvatar = ({ className = "w-10 h-10" }) => (
            <svg viewBox="0 0 100 100" className={`${className} bot-float`} xmlns="http://www.w3.org/2000/svg">
                <path d="M50 30 V15" stroke="#94a3b8" strokeWidth="4" strokeLinecap="round"/>
                <circle cx="50" cy="12" r="6" fill="#fbbf24"/>
                <rect x="20" y="30" width="60" height="45" rx="15" fill="#4f46e5"/>
                <rect x="28" y="40" width="44" height="25" rx="8" fill="#ffffff"/>
                <circle cx="38" cy="52" r="4" fill="#4f46e5"/>
                <circle cx="62" cy="52" r="4" fill="#4f46e5"/>
                <path d="M 45 60 Q 50 64 55 60" stroke="#4f46e5" strokeWidth="3" fill="none" strokeLinecap="round"/>
                <path d="M20 45 h-4 a4 4 0 0 0 -4 4 v4 a4 4 0 0 0 4 4 h4" fill="#818cf8"/>
                <path d="M80 45 h4 a4 4 0 0 1 4 4 v4 a4 4 0 0 1 -4 4 h-4" fill="#818cf8"/>
            </svg>
        );

        const EduBotChat = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ sender: 'ai', text: 'Cześć! Jestem EduBot 🤖 Twój osobisty asystent. Szukasz pomocy przy dyplomach, kartach pracy, czy IPETach?' }]);
            const [inputText, setInputText] = useState('');
            const messagesEndRef = useRef(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isOpen]);

            const handleSend = () => {
                if (!inputText.trim()) return;
                const userMsg = inputText.trim();
                setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                setInputText('');

                setTimeout(() => {
                    let response = "Zawsze chętnie pomogę! Spróbuj zapytać mnie o 'IPET', 'dyplomy', 'karty pracy' lub 'kod premium'.";
                    const lower = userMsg.toLowerCase();
                    if (lower.includes('ipet') || lower.includes('wopfu') || lower.includes('opini')) response = "Użyj naszego 'Asystenta Pedagoga'. Pomoże Ci napisać dokumenty zachowując urzędowy język.";
                    else if (lower.includes('dyplom') || lower.includes('girland')) response = "Do tworzenia dyplomów użyj 'EduGeneratora'. To nasz absolutny hit!";
                    else if (lower.includes('kart') || lower.includes('matematyk')) response = "'EduKarty AI' pozwalają złożyć kartę pracy jak z klocków LEGO.";
                    else if (lower.includes('kawa') || lower.includes('kod') || lower.includes('premium')) response = "Kod Premium otrzymasz stawiając mi wirtualną kawę przez link na górze strony! ☕ (Obecne hasło to KAWA2024)";
                    else if (lower.includes('scenariusz') || lower.includes('lekcj')) response = "Polecam nasz Kombajn Metodyczny: 'Scenariusz AI PRO'. Wygeneruje dla Ciebie pełny konspekt zajęć.";
                    else if (lower.includes('prompt') || lower.includes('polecen')) response = "Sprawdź 'PromptMaster AI' - uczy, jak pisać perfekcyjne zadania dla modeli AI.";
                    setMessages(prev => [...prev, { sender: 'ai', text: response }]);
                }, 800);
            };

            return (
                <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
                    {isOpen && (
                        <div className="bg-white w-[calc(100vw-48px)] sm:w-[350px] h-[450px] rounded-3xl shadow-2xl border border-slate-200 mb-4 flex flex-col overflow-hidden">
                            <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 flex items-center justify-between text-white shadow-md z-10">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/20 p-1.5 rounded-full"><BotAvatar className="w-8 h-8"/></div>
                                    <div>
                                        <h3 className="font-bold leading-tight">EduBot Concierge</h3>
                                        <p className="text-[10px] text-blue-100 uppercase tracking-widest font-black">Online</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-white/80 hover:text-white p-2 text-xl font-bold">✕</button>
                            </div>
                            <div className="flex-1 bg-slate-50 p-4 overflow-y-auto custom-scrollbar flex flex-col gap-4">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`max-w-[85%] p-3 rounded-2xl text-sm shadow-sm ${msg.sender === 'ai' ? 'bg-white border border-slate-200 text-slate-700 self-start rounded-tl-sm' : 'bg-blue-600 text-white self-end rounded-tr-sm'}`}>{msg.text}</div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>
                            <div className="p-3 bg-white border-t border-slate-100 flex gap-2">
                                <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="Napisz tu..." className="flex-1 bg-slate-100 border-none rounded-xl px-4 py-2 outline-none text-sm" />
                                <button onClick={handleSend} className="bg-blue-600 hover:bg-blue-700 text-white w-10 h-10 rounded-xl flex items-center justify-center"><svg className="w-4 h-4 translate-x-[-1px] translate-y-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
                            </div>
                        </div>
                    )}
                    
                    <button onClick={() => setIsOpen(!isOpen)} className="bg-white border-2 border-blue-100 w-16 h-16 rounded-full flex items-center justify-center shadow-xl hover:shadow-2xl hover:scale-105 transition-all relative group z-50">
                        {!isOpen && (
                            <div className="absolute right-20 top-2 bg-blue-600 text-white text-xs font-bold py-2 px-4 rounded-2xl rounded-tr-sm shadow-lg whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                                W czym pomóc? 👋
                            </div>
                        )}
                        <BotAvatar />
                        <div className="absolute bottom-1 right-1 w-4 h-4 bg-emerald-400 border-2 border-white rounded-full"></div>
                    </button>
                </div>
            );
        };

        function App() {
            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="fixed top-0 left-0 right-0 z-50 glass-nav py-4 px-6">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-2 font-black text-xl tracking-tight cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-200"><svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
                                <span>EduBox<span className="text-blue-600">AI</span></span>
                            </div>
                            <div className="hidden md:flex space-x-8 text-sm font-bold text-slate-500">
                                <a href="#aplikacje" className="hover:text-blue-600 transition-colors">Aplikacje</a>
                                <a href="#wideo" className="hover:text-blue-600 transition-colors">Wideo</a>
                                <a href="#opinie" className="hover:text-blue-600 transition-colors">Opinie</a>
                            </div>
                            <a href="https://buycoffee.to/magiccolor" target="_blank" className="bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-500 text-amber-950 px-5 py-2.5 rounded-xl font-bold shadow-sm transition-transform active:scale-95 text-sm flex items-center gap-2">
                                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/></svg><span>Postaw Kawę</span>
                            </a>
                        </div>
                    </nav>

                    <HeroSection />
                    <FeaturesSection />

                    <section id="wideo" className="bg-slate-900 py-24 relative overflow-hidden">
                        <div className="max-w-6xl mx-auto px-6 relative z-10">
                            <Reveal>
                                <div className="text-center mb-16">
                                    <h2 className="text-3xl md:text-5xl font-extrabold text-white mb-4 tracking-tight">Zobacz magię w akcji! 🎬</h2>
                                    <p className="text-slate-400 max-w-2xl mx-auto text-lg">Przekonaj się, jak w zaledwie kilkanaście sekund powstają gotowe materiały na Twoje zajęcia.</p>
                                </div>
                            </Reveal>

                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                                <Reveal delay={100}><div className="bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-700 aspect-[9/16]"><video src="wideo1.mp4" poster="https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?q=80&w=400&auto=format&fit=crop" preload="none" controls playsInline className="w-full h-full object-cover"></video></div></Reveal>
                                <Reveal delay={200}><div className="bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-700 aspect-[9/16]"><video src="wideo2.mp4" poster="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=400&auto=format&fit=crop" preload="none" controls playsInline className="w-full h-full object-cover"></video></div></Reveal>
                                <Reveal delay={300}><div className="hidden lg:block bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-700 aspect-[9/16]"><video src="wideo3.mp4" poster="https://images.unsplash.com/photo-1497633762265-9d179a990aa6?q=80&w=400&auto=format&fit=crop" preload="none" controls playsInline className="w-full h-full object-cover"></video></div></Reveal>
                                <Reveal delay={400}><div className="hidden lg:block bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-700 aspect-[9/16]"><video src="wideo4.mp4" poster="https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=400&auto=format&fit=crop" preload="none" controls playsInline className="w-full h-full object-cover"></video></div></Reveal>
                            </div>

                            <Reveal delay={200}>
                                <div className="mt-20 pt-16 border-t border-slate-800 grid grid-cols-1 md:grid-cols-3 gap-10 text-center">
                                    <div>
                                        <div className="text-5xl font-black text-blue-400 mb-2"><Counter target={2450} />+</div>
                                        <div className="text-slate-400 font-bold uppercase tracking-widest text-xs">Zaoszczędzonych Godzin</div>
                                    </div>
                                    <div>
                                        <div className="text-5xl font-black text-pink-400 mb-2"><Counter target={15200} />+</div>
                                        <div className="text-slate-400 font-bold uppercase tracking-widest text-xs">Wygenerowanych Materiałów</div>
                                    </div>
                                    <div>
                                        <div className="text-5xl font-black text-emerald-400 mb-2"><Counter target={100} />%</div>
                                        <div className="text-slate-400 font-bold uppercase tracking-widest text-xs">Polska Podstawa Programowa</div>
                                    </div>
                                </div>
                            </Reveal>
                        </div>
                    </section>

                    <main id="aplikacje" className="max-w-6xl mx-auto px-6 py-24 flex-grow w-full">
                        <Reveal><h2 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-16 text-center tracking-tight">Wybierz narzędzie dla siebie</h2></Reveal>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {APPS.map((app, i) => (
                                <Reveal key={i} delay={i * 100}>
                                    <a href={app.url} target="_blank" className={`app-card ${app.cardBg} border ${app.borderColor} rounded-3xl p-8 flex flex-col h-full relative group transition-colors`}>
                                        {app.badge && <div className={`absolute top-0 right-0 text-white text-[10px] font-black px-3 py-1.5 rounded-bl-xl uppercase tracking-widest ${app.badge.includes('PRO') || app.badge.includes('NOWOŚĆ') || app.badge.includes('INKLUZJA') ? app.color.split(' ')[1].replace('text-', 'bg-') : 'bg-slate-800'}`}>{app.badge}</div>}
                                        <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-6 shadow-sm group-hover:scale-110 transition-transform ${app.color}`}>
                                            <div dangerouslySetInnerHTML={{__html: app.icon}} />
                                        </div>
                                        <h3 className="text-2xl font-bold mb-3 text-slate-800 tracking-tight">{app.title}</h3>
                                        <p className="text-slate-600 font-medium mb-8 flex-grow text-sm leading-relaxed">{app.desc}</p>
                                        <div className={`font-black text-xs uppercase tracking-widest pt-5 border-t border-slate-200/50 flex items-center group-hover:translate-x-2 transition-transform ${app.color.split(' ')[1]}`}>Uruchom Narzędzie →</div>
                                    </a>
                                </Reveal>
                            ))}
                        </div>
                    </main>

                    <section className="bg-indigo-50 py-24 border-t border-indigo-100">
                        <div className="max-w-6xl mx-auto px-6">
                            <Reveal>
                                <div className="text-center mb-16">
                                    <h2 className="text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">Polecane narzędzia zewnętrzne 🌐</h2>
                                    <p className="text-slate-500">Sztuczna Inteligencja, z której korzystamy na co dzień i którą szczerze polecamy.</p>
                                </div>
                            </Reveal>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[
                                    {name: 'Chmurka.ai', icon: '☁️', desc: 'Polski, przyjazny asystent AI. Idealny do szybkich pomysłów.', url: 'https://chmurka.ai/'},
                                    {name: 'ChatGPT', icon: '🤖', desc: 'Najpopularniejszy model językowy. Niezastąpiony mózg.', url: 'https://chat.openai.com/'},
                                    {name: 'Suno AI', icon: '🎵', desc: 'Wygeneruj piosenkę edukacyjną na każdy temat w 5 sekund!', url: 'https://suno.com/'}
                                ].map((item, i) => (
                                    <Reveal key={i} delay={i * 150}>
                                        <a href={item.url} target="_blank" className="bg-white p-8 rounded-3xl flex items-start gap-5 hover:-translate-y-2 hover:shadow-xl transition-all border border-indigo-50">
                                            <div className="text-4xl">{item.icon}</div>
                                            <div>
                                                <h4 className="font-bold text-lg text-slate-900 mb-1">{item.name}</h4>
                                                <p className="text-sm text-slate-500 leading-relaxed">{item.desc}</p>
                                            </div>
                                        </a>
                                    </Reveal>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section id="opinie" className="bg-white py-24">
                        <div className="max-w-6xl mx-auto px-6">
                            <Reveal><h2 className="text-3xl md:text-4xl font-extrabold text-center text-slate-900 mb-16 tracking-tight">Co mówią nauczyciele? 💬</h2></Reveal>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[
                                    {text: "EduGenerator to złoto! Zrobiłam dyplomy dla całej grupy 25 dzieci w 10 minut. Wcześniej zajmowało mi to całe popołudnie.", author: "Anna M.", role: "Nauczycielka Przedszkola"},
                                    {text: "Scenariusz AI PRO to absolutny przełom. Cele i metody są dobrane idealnie pod polską podstawę. Polecam każdemu!", author: "Krzysztof P.", role: "Pedagog Specjalny"},
                                    {text: "EduKarty AI z kolorowankami bez tła to jedyne takie narzędzie. Dzieci uwielbiają zadania z obrazkami, które same wymyślamy.", author: "Joanna S.", role: "Wychowawczyni Klas 1-3"}
                                ].map((rev, i) => (
                                    <Reveal key={i} delay={i * 200}>
                                        <div className="bg-slate-50 p-8 rounded-3xl border border-slate-100 h-full flex flex-col">
                                            <div className="text-amber-400 mb-4 text-xl">★★★★★</div>
                                            <p className="text-slate-600 mb-6 italic leading-relaxed flex-grow">"{rev.text}"</p>
                                            <div>
                                                <div className="font-bold text-slate-900">{rev.author}</div>
                                                <div className="text-xs text-slate-500 uppercase tracking-widest mt-1">{rev.role}</div>
                                            </div>
                                        </div>
                                    </Reveal>
                                ))}
                            </div>
                        </div>
                    </section>

                    <TrustSection />
                    
                    <footer className="bg-white pt-20 pb-10 border-t border-slate-200">
                        <div className="max-w-6xl mx-auto px-6">
                            <div className="flex flex-col md:flex-row items-center justify-between gap-10 mb-16">
                                <div className="text-center md:text-left">
                                    <div className="text-2xl font-black tracking-tight mb-2 text-slate-900">EduBox<span className="text-blue-600">AI</span></div>
                                    <p className="text-slate-500 text-sm max-w-sm leading-relaxed">Zbudowane z pasją do edukacji. Chcę dać każdemu nauczycielowi narzędzia, które odciążą go w codziennych obowiązkach.</p>
                                    <a href="mailto:edubox.ai@gmail.com" className="inline-block mt-4 text-blue-600 font-bold hover:underline">Masz pomysł? Napisz do mnie!</a>
                                </div>
                                <div className="bg-amber-50 p-6 rounded-3xl border border-amber-100 flex flex-col items-center text-center max-w-sm">
                                    <p className="text-sm text-amber-900 mb-4 font-bold">Utrzymaj projekt przy życiu i odblokuj funkcje PRO we wszystkich aplikacjach!</p>
                                    <a href="https://buycoffee.to/magiccolor" target="_blank" className="w-full bg-gradient-to-r from-amber-400 to-amber-500 text-amber-950 px-6 py-4 rounded-2xl font-black transition-transform active:scale-95 shadow-sm">
                                        Wspieram projekt (Kawa) ☕
                                    </a>
                                </div>
                            </div>
                            <div className="text-center pt-8 border-t border-slate-100">
                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">© 2026 EduBox AI. Wspieramy polską edukację przyszłości.</p>
                            </div>
                        </div>
                    </footer>

                    <VideoGreeting />
                    <EduBotChat />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
