<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduBox AI - Twój Cyfrowy Niezbędnik Nauczyciela</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; /* Głęboki granat/czerń */
            color: #f8fafc; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        /* Szklane panele Premium */
        .glass-panel { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .glass-nav { 
            background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        /* Animacje i efekty */
        .app-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .app-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.2); 
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(30, 41, 59, 0.7);
        }
        
        .text-gradient { 
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .btn-bounce:active { transform: scale(0.95); }
        video { border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Efekt pojawiania się */
        .reveal { opacity: 0; transform: translateY(30px); animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes reveal { to { opacity: 1; transform: translateY(0); } }
        
        /* Lewitujący bot */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .bot-float { animation: float 4s ease-in-out infinite; }
        
        /* Wielka poświata w tle (Hero Glow) */
        .hero-glow {
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(2, 6, 23, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Reveal = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef();
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setIsVisible(true); }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return <div ref={ref} className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`} style={{ transitionDelay: `${delay}ms` }}>{children}</div>;
        };

        const Counter = ({ target, duration = 2000 }) => {
            const [count, setCount] = useState(0);
            const ref = useRef();
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) setIsVisible(true); }, { threshold: 0.5 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            useEffect(() => {
                if (!isVisible) return;
                let start = 0;
                const increment = target / (duration / 16);
                const timer = setInterval(() => {
                    start += increment;
                    if (start >= target) { setCount(target); clearInterval(timer); } else setCount(Math.ceil(start));
                }, 16);
                return () => clearInterval(timer);
            }, [isVisible, target, duration]);
            return <span ref={ref}>{count.toLocaleString('pl-PL')}</span>;
        };

        const BUY_COFFEE_LINK = "https://buycoffee.to/magiccolor";

        // ==========================================
        // DANE APLIKACJI
        // ==========================================

                url: 'https://generator-scenariuszy.vercel.app/',

                color: 'text-emerald-400'
            },
            {
                title: 'EduKarty AI',
                desc: 'Buduj karty pracy jak z klocków LEGO. Matematyka obrazkowa, szlaczki i kolorowanki AI bez tła. Idealne dla klas 1-3.',
                url: 'https://edukarty-ai.vercel.app/',
                badge: 'PRO',
                badgeColor: 'bg-orange-600',
                icon: <path d="M4 5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5zM4 13a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-6zM16 13a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-6z"/>,
                color: 'text-orange-400'
            },
            {
                title: 'EduGenerator',
                desc: 'Dyplomy i girlandy gotowe do druku w 60 sekund. Wybieraj piękne motywy lub poproś AI o unikalną grafikę.',
                url: 'https://edugenerator-dyplomy.vercel.app/',
                icon: <path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/>,

            },

                url: 'https://promptmaster-tau.vercel.app/', 
                color: 'text-violet-400',
                icon: <><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></> 
            },
            {
                title: 'EduPrompter AI',
                desc: 'Kreator profesjonalnych poleceń (promptów) dla ChatGPT i muzyki w Suno AI. Wbudowany tłumacz tagów na angielski.',
                url: 'https://eduprompter.vercel.app/',
                icon: <><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></>,
                color: 'text-cyan-400'
            },
            {
                title: 'Magic Color AI',
                desc: 'Inteligentny generator kolorowanek. Wpisz dowolny pomysł, a AI narysuje unikalną kolorowankę w kilka sekund.',
                url: 'https://magic-color-ai-dla-dzieci.streamlit.app/',
                badge: 'PRO',
                badgeColor: 'bg-pink-600',
                icon: <><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.92 0 1.68-.75 1.68-1.68 0-.44-.18-.84-.44-1.12-.29-.3-.44-.65-.44-1.12 0-.93.75-1.68 1.68-1.68h2.08c3.1 0 5.68-2.52 5.68-5.68C22 6.48 17.52 2 12 2z"/><circle cx="7.5" cy="10.5" r=".5"/><circle cx="10.5" cy="7.5" r=".5"/><circle cx="13.5" cy="7.5" r=".5"/><circle cx="16.5" cy="10.5" r=".5"/></>,
                color: 'text-pink-400'
            },
            {
                title: 'Kreator Ikon PRO',
                desc: 'Twórz własne ikony folderów (.ICO) dla Windows. AI narysuje przedmiot i automatycznie usunie z niego tło.',
                url: 'https://kreator-ikon.vercel.app/',
                icon: <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>,
                color: 'text-slate-300'
            },
            { 
                title: 'EduBoxPro Studio', 
                desc: 'Zaawansowany kombajn narzędzi AI. Profesjonalny generator promptów Wideo i Grafiki oraz interaktywne gry.', 
                url: 'studio.html', 
                badge: 'NOWOŚĆ',
                badgeColor: 'bg-fuchsia-600',
                color: 'text-fuchsia-400',
                icon: <><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></> 
            }
        ];

        const RECOMMENDATIONS = [
            { name: 'Chmurka AI', url: 'https://chmurka.ai/', icon: '☁️', desc: 'Przyjazny polski asystent AI do tekstów.' },
            { name: 'ChatGPT', url: 'https://chat.openai.com/', icon: '🤖', desc: 'Najpotężniejszy model językowy.' },
            { name: 'Suno AI', url: 'https://suno.com/', icon: '🎵', desc: 'Twórz piosenki na zajęcia z AI.' }
        ];

        // ==========================================
        // KOMPONENT POWITANIA WIDEO
        // ==========================================
        const VideoGreeting = () => {
            const [isMuted, setIsMuted] = useState(true);
            const [isClosed, setIsClosed] = useState(false);
            const videoRef = useRef(null);

            if (isClosed) return null;

            const handleToggleMute = () => {
                if (videoRef.current) {
                    videoRef.current.muted = !isMuted;
                    setIsMuted(!isMuted);
                    if (isMuted) {
                        videoRef.current.currentTime = 0; 
                        videoRef.current.play();
                    }
                }
            };

            return (
                <div className="fixed bottom-6 left-6 z-[100] flex flex-col items-start group">
                    {!isMuted && (
                        <div className="glass-panel text-white text-xs font-medium py-3 px-4 rounded-2xl rounded-bl-sm shadow-[0_0_20px_rgba(59,130,246,0.3)] mb-3 max-w-[220px] leading-relaxed animate-[reveal_0.3s_ease-out] border border-blue-500/30">
                            "Cześć! Tu asystentka EduBox. Po prawej stronie czeka na Ciebie nasz chatbot. Jeśli masz pomysły lub potrzebujesz kontaktu, napisz na nasz email!"
                        </div>
                    )}
                    {isMuted && (
                        <div className="absolute left-[85px] top-2 bg-blue-600 text-white text-[10px] font-bold py-1.5 px-3 rounded-2xl rounded-tl-sm shadow-lg whitespace-nowrap animate-bounce pointer-events-none">
                            Kliknij i posłuchaj! 🔊
                        </div>
                    )}
                    <div className="relative">
                        <button onClick={() => setIsClosed(true)} className="absolute -top-2 -right-2 bg-slate-800 text-slate-400 hover:text-white w-6 h-6 rounded-full shadow-md flex items-center justify-center z-10 text-xs font-bold transition-colors border border-slate-600">✕</button>
                        <div onClick={handleToggleMute} className={`relative overflow-hidden shadow-2xl cursor-pointer transition-all duration-500 ease-in-out ${isMuted ? 'w-20 h-20 rounded-full border-4 border-slate-700 hover:scale-105 hover:border-blue-500' : 'w-36 h-48 rounded-2xl border-4 border-blue-500'}`}>
                            <video 
                                ref={videoRef}
                                src="powitanie.mp4" 
                                autoPlay 
                                loop={isMuted} 
                                muted={isMuted} 
                                playsInline
                                onEnded={() => {
                                    setIsMuted(true);
                                    if (videoRef.current) { videoRef.current.muted = true; videoRef.current.play(); }
                                }}
                                className="w-full h-full object-cover"
                                poster="https://images.unsplash.com/photo-1573164713988-8665fc963095?q=80&w=200&auto=format&fit=crop"
                            />
                            {isMuted && (
                                <div className="absolute inset-0 bg-black/40 flex items-center justify-center transition-opacity hover:bg-black/60">
                                    <svg className="w-8 h-8 text-white drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /><line x1="3" y1="3" x2="21" y2="21" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // ASYSTENT EDU-BOT (DARK MODE)
        // ==========================================
        const BotAvatar = ({ className = "w-10 h-10" }) => (
            <svg viewBox="0 0 100 100" className={`${className} bot-float drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]`} xmlns="http://www.w3.org/2000/svg">
                <path d="M50 30 V15" stroke="#475569" strokeWidth="4" strokeLinecap="round"/>
                <circle cx="50" cy="12" r="6" fill="#60a5fa"/>
                <rect x="20" y="30" width="60" height="45" rx="15" fill="#1e3a8a"/>
                <rect x="28" y="40" width="44" height="25" rx="8" fill="#0f172a"/>
                <circle cx="38" cy="52" r="4" fill="#60a5fa"/>
                <circle cx="62" cy="52" r="4" fill="#60a5fa"/>
                <path d="M 45 60 Q 50 64 55 60" stroke="#60a5fa" strokeWidth="3" fill="none" strokeLinecap="round"/>
                <path d="M20 45 h-4 a4 4 0 0 0 -4 4 v4 a4 4 0 0 0 4 4 h4" fill="#3b82f6"/>
                <path d="M80 45 h4 a4 4 0 0 1 4 4 v4 a4 4 0 0 1 -4 4 h-4" fill="#3b82f6"/>
            </svg>
        );

        const EduBotChat = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ sender: 'ai', text: 'Cześć! Jestem EduBot 🤖 Twój osobisty asystent. W czym mogę pomóc? (np. dyplomy, awans, karty pracy)' }]);
            const [inputText, setInputText] = useState('');
            const messagesEndRef = useRef(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isOpen]);

            const handleSend = () => {
                if (!inputText.trim()) return;
                const userMsg = inputText.trim();
                setMessages(prev => [...prev, { sender: 'user', text: userMsg }]);
                setInputText('');

                setTimeout(() => {
                    let response = "Zawsze chętnie pomogę! Spróbuj zapytać mnie o 'awans', 'dyplomy', 'karty pracy' lub 'kod premium'.";
                    const lower = userMsg.toLowerCase();
                    if (lower.includes('ipet') || lower.includes('wopfu') || lower.includes('opini') || lower.includes('awans')) response = "Zdecydowanie polecam 'Kreator Awansu AI' lub 'Asystenta Pedagoga'. Napiszą dla Ciebie perfekcyjne dokumenty urzędowe!";
                    else if (lower.includes('dyplom') || lower.includes('girland')) response = "Do tworzenia pięknych dyplomów użyj 'EduGeneratora'. To nasz klasyk!";
                    else if (lower.includes('kart') || lower.includes('matematyk')) response = "'EduKarty AI' pozwalają złożyć kartę pracy jak z klocków LEGO.";
                    else if (lower.includes('kawa') || lower.includes('kod') || lower.includes('premium')) response = "Kod Premium otrzymasz stawiając wirtualną kawę twórcy! ☕ (Obecne hasło to KAWA2024)";
                    else if (lower.includes('scenariusz') || lower.includes('lekcj')) response = "Polecam nasz Kombajn: 'Scenariusz AI PRO'. Wygeneruje dla Ciebie pełny konspekt zajęć z exportem do Worda.";
                    setMessages(prev => [...prev, { sender: 'ai', text: response }]);
                }, 800);
            };

            return (
                <div className="fixed bottom-6 right-6 z-[100] flex flex-col items-end">
                    {isOpen && (
                        <div className="glass-panel w-[calc(100vw-48px)] sm:w-[350px] h-[450px] rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-slate-700 mb-4 flex flex-col overflow-hidden">
                            <div className="bg-slate-900/80 border-b border-slate-700 p-4 flex items-center justify-between text-white z-10">
                                <div className="flex items-center gap-3">
                                    <div className="bg-slate-800 p-1.5 rounded-full"><BotAvatar className="w-8 h-8"/></div>
                                    <div>
                                        <h3 className="font-bold leading-tight">EduBot Concierge</h3>
                                        <p className="text-[10px] text-blue-400 uppercase tracking-widest font-black">Online</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white p-2 text-xl font-bold transition-colors">✕</button>
                            </div>
                            <div className="flex-1 bg-slate-900/50 p-4 overflow-y-auto custom-scrollbar flex flex-col gap-4">
                                {messages.map((msg, i) => (
                                    <div key={i} className={`max-w-[85%] p-3 rounded-2xl text-sm shadow-sm ${msg.sender === 'ai' ? 'bg-slate-800 border border-slate-700 text-slate-200 self-start rounded-tl-sm' : 'bg-blue-600 text-white self-end rounded-tr-sm'}`}>{msg.text}</div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>
                            <div className="p-3 bg-slate-900 border-t border-slate-700 flex gap-2">
                                <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} placeholder="Napisz tu..." className="flex-1 bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-2 outline-none text-sm focus:border-blue-500 placeholder-slate-500 transition-colors" />
                                <button onClick={handleSend} className="bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-colors"><svg className="w-4 h-4 translate-x-[-1px] translate-y-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
                            </div>
                        </div>
                    )}
                    
                    <button onClick={() => setIsOpen(!isOpen)} className="bg-slate-900 border-2 border-blue-500/50 w-16 h-16 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:scale-105 transition-all relative group z-50">
                        {!isOpen && (

                                <span className="text-[10px] font-black text-blue-400 uppercase tracking-[3px]">Wsparcie projektu</span>
                                <p className="text-slate-300 text-sm mb-2">Aby zapewnić Wam najwyższą jakość dokumentów, obrazów i rymów, "pod maską" korzystamy z profesjonalnych, płatnych platform sztucznej inteligencji. Dlatego każda postawiona nam wirtualna kawa to cegiełka, która opłaca te serwery i pozwala utrzymać projekt darmowym dla wszystkich!</p>

                                    Postaw Kawę ☕
                                </a>
                            </div>
                        </div>
                        <div className="mt-20 pt-10 border-t border-slate-800 text-center text-[10px] font-bold text-slate-600 uppercase tracking-[10px]">
                            &copy; 2026 EduBox AI. All rights reserved.
                        </div>
                    </footer>

                    <VideoGreeting />
                    <EduBotChat />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
