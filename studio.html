<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBoxPro Studio - AI & Edukacja</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Klasyczne biblioteki React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;

        // --- NIEZAWODNE, WBUDOWANE KOMPONENTY IKON (Zastępują zewnętrzną bibliotekę) ---
        const SvgIcon = ({ children, className }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );

        const Sparkles = ({className}) => <SvgIcon className={className}><path d="m4 14 1.5 1.5M10 14l1.5-1.5M4 10l1.5-1.5M10 10l1.5 1.5M10.5 21l3-10.5L21 7.5l-7.5 3-3 10.5Z"/></SvgIcon>;
        const Video = ({className}) => <SvgIcon className={className}><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></SvgIcon>;
        const Copy = ({className}) => <SvgIcon className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></SvgIcon>;
        const Wand2 = ({className}) => <SvgIcon className={className}><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></SvgIcon>;
        const LayoutTemplate = ({className}) => <SvgIcon className={className}><rect width="18" height="7" x="3" y="3" rx="1"/><rect width="9" height="7" x="3" y="14" rx="1"/><rect width="5" height="7" x="16" y="14" rx="1"/></SvgIcon>;
        const Settings = ({className}) => <SvgIcon className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></SvgIcon>;
        const Camera = ({className}) => <SvgIcon className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></SvgIcon>;
        const Lightbulb = ({className}) => <SvgIcon className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></SvgIcon>;
        const PlaySquare = ({className}) => <SvgIcon className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="m9 8 6 4-6 4Z"/></SvgIcon>;
        const Check = ({className}) => <SvgIcon className={className}><path d="M20 6 9 17l-5-5"/></SvgIcon>;
        const Gamepad2 = ({className}) => <SvgIcon className={className}><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></SvgIcon>;
        const Trophy = ({className}) => <SvgIcon className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></SvgIcon>;
        const PartyPopper = ({className}) => <SvgIcon className={className}><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12v0c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-.82-.33c-.86-.34-1.82.2-1.98 1.11v0c-.11.7-.72 1.22-1.43 1.22H17"/><path d="m11 2 .33.82c.34.86-.2 1.82-1.11 1.98v0C9.52 4.9 9 5.52 9 6.23V7"/><path d="M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2Z"/></SvgIcon>;
        const ImageIcon = ({className}) => <SvgIcon className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></SvgIcon>;
        const Aperture = ({className}) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><path d="m14.31 8 5.74 9.94"/><path d="M9.69 8h11.48"/><path d="m7.38 12 5.74-9.94"/><path d="M9.69 16 3.95 6.06"/><path d="M14.31 16H2.83"/><path d="m16.62 12-5.74 9.94"/></SvgIcon>;
        const PenTool = ({className}) => <SvgIcon className={className}><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></SvgIcon>;
        const Layers = ({className}) => <SvgIcon className={className}><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></SvgIcon>;
        const MousePointerClick = ({className}) => <SvgIcon className={className}><path d="M14 4.1 12 6"/><path d="m5.1 8-2.9-.8"/><path d="m6 12-1.9 2"/><path d="M7.2 2.2 8 5.1"/><path d="M9.037 9.69a.498.498 0 0 1 .653-.653l11 4.5a.5.5 0 0 1-.074.949l-4.349 1.041a1 1 0 0 0-.74.739l-1.04 4.35a.5.5 0 0 1-.95.074z"/></SvgIcon>;
        const Film = ({className}) => <SvgIcon className={className}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/></SvgIcon>;
        const Globe = ({className}) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></SvgIcon>;
        const Ban = ({className}) => <SvgIcon className={className}><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></SvgIcon>;
        const Languages = ({className}) => <SvgIcon className={className}><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></SvgIcon>;
        const Coffee = ({className}) => <SvgIcon className={className}><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></SvgIcon>;

        // KOMPONENT POMOCNICZY: Przyciski wyboru języka
        const LanguageToggle = ({ lang, setLang }) => (
          <div className="flex bg-slate-800/50 p-1 rounded-xl border border-slate-600 shadow-inner w-fit">
            <button 
              onClick={() => setLang('pl')}
              className={`px-3 py-1 text-xs font-bold rounded-lg transition-all flex items-center gap-1.5 ${lang === 'pl' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-300 hover:text-white'}`}
            >
              🇵🇱 Polski
            </button>
            <button 
              onClick={() => setLang('en')}
              className={`px-3 py-1 text-xs font-bold rounded-lg transition-all flex items-center gap-1.5 ${lang === 'en' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-300 hover:text-white'}`}
            >
              🇬🇧 English
            </button>
          </div>
        );

        // --- KOMPONENT 1: GENERATOR PROMPTÓW GRAFICZNYCH ---
        const GraphicPromptGenerator = () => {
          const [copied, setCopied] = useState(false);
          const [lang, setLang] = useState('pl'); // 'pl' lub 'en'

          // Stan zoptymalizowany dla dwóch języków
          const [data, setData] = useState({
            subject: { 
              pl: "urocza przedszkolanka czytająca magiczną, świecącą książkę szczęśliwym dzieciom", 
              en: "cute preschool teacher reading a magical glowing book to happy children" 
            },
            ethnicity: { 
              pl: "typowy Europejczyk z Europy środkowej, słowiańska uroda, jasna karnacja", 
              en: "typical Central European appearance, Slavic features, Caucasian, fair skin" 
            },
            medium: { 
              pl: "ilustracja 3D w stylu Disney Pixar", 
              en: "3D Disney Pixar style illustration" 
            },
            environment: { 
              pl: "przytulna biblioteka z unoszącymi się kolorowymi literami", 
              en: "cozy library with floating colorful letters" 
            },
            lighting: { 
              pl: "miękkie, ciepłe światło słoneczne wpadające przez okno", 
              en: "soft warm sunlight coming through the window, cinematic lighting" 
            },
            quality: { 
              pl: "rozdzielczość 8k, wysoka szczegółowość, arcydzieło", 
              en: "8k resolution, highly detailed, masterpiece, trending on artstation" 
            },
            negative: { 
              pl: "napisy, tekst, litery, tablice z tekstem, logo, znaki wodne, zniekształcone twarze", 
              en: "text, letters, fonts, signboards, watermarks, logo, signatures, deformed faces, extra fingers" 
            }
          });

          // Aktualizacja z ręcznego wpisywania
          const handleManualInput = (field, value) => {
            setData(prev => ({ ...prev, [field]: { pl: value, en: value } }));
          };

          // Aktualizacja po kliknięciu w chmurkę
          const handleChipClick = (field, opt) => {
            setData(prev => ({ ...prev, [field]: { pl: opt.pl, en: opt.en } }));
          };

          const generatePrompt = () => {
            if (lang === 'pl') {
              let p = `${data.medium.pl}, obiekt: ${data.subject.pl} (pochodzenie/wygląd: ${data.ethnicity.pl}), sceneria: ${data.environment.pl}, oświetlenie: ${data.lighting.pl}, jakość: ${data.quality.pl}.`;
              if (data.negative.pl) p += `\n\n(BARDZO WAŻNE - CZEGO UNIKAĆ I NIE RYSOWAĆ: ${data.negative.pl})`;
              return p;
            } else {
              let p = `${data.medium.en}, ${data.subject.en} (${data.ethnicity.en}), set in ${data.environment.en}, ${data.lighting.en}, ${data.quality.en}.`;
              if (data.negative.en) p += `\n\nNEGATIVE PROMPT: ${data.negative.en}`;
              return p;
            }
          };

          const handleCopy = () => {
            navigator.clipboard.writeText(generatePrompt());
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          const SuggestionChips = ({ field, options }) => (
            <div className="flex flex-wrap gap-1.5 mt-2">
              {options.map((opt, i) => (
                <button
                  key={i}
                  onClick={() => handleChipClick(field, opt)}
                  className="px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider bg-fuchsia-50 text-fuchsia-600 border border-fuchsia-100 rounded-full hover:bg-fuchsia-500 hover:text-white transition-all duration-200"
                >
                  {opt.pl}
                </button>
              ))}
            </div>
          );

          return (
            <div className="w-full h-full flex flex-col md:flex-row gap-6 overflow-hidden">
              {/* LEWY PANEL (ZAWSZE PO POLSKU) */}
              <div className="w-full md:w-1/2 bg-white rounded-2xl p-6 shadow-xl border border-gray-100 flex flex-col gap-5 overflow-y-auto custom-scrollbar">
                
                <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 mb-2 border-b border-gray-100 pb-4">
                  <h2 className="text-xl font-black text-slate-800 flex items-center gap-2">
                    <ImageIcon className="w-6 h-6 text-fuchsia-500" /> Kreator Grafiki AI
                  </h2>
                </div>

                {/* BOHATER */}
                <div>
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1"><PenTool className="w-3 h-3"/> Co widzimy na obrazku?</label>
                  <input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-fuchsia-500 outline-none transition-all" value={data.subject.pl} onChange={(e) => handleManualInput('subject', e.target.value)} />
                  <SuggestionChips field="subject" options={[
                    { pl: "urocze dziecko przedszkolne", en: "cute preschool child" },
                    { pl: "uśmiechnięta nauczycielka", en: "smiling female teacher" },
                    { pl: "grupa dzieci bawiąca się klockami", en: "group of children playing with blocks" },
                    { pl: "przyjazny pluszowy miś", en: "friendly teddy bear" }
                  ]} />
                </div>

                {/* POCHODZENIE / ETNICZNOŚĆ */}
                <div>
                  <label className="text-xs font-bold text-emerald-600 uppercase tracking-wider mb-1.5 flex items-center gap-1"><Globe className="w-3 h-3"/> Pochodzenie / Uroda (Zapobiega losowości AI)</label>
                  <input type="text" className="w-full p-3 bg-emerald-50 border border-emerald-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-emerald-900" value={data.ethnicity.pl} onChange={(e) => handleManualInput('ethnicity', e.target.value)} />
                  <SuggestionChips field="ethnicity" options={[
                    { pl: "typowy Europejczyk z Europy środkowej", en: "typical Central European appearance" },
                    { pl: "słowiańska uroda, jasna karnacja", en: "Slavic features, fair skin, Caucasian" },
                    { pl: "uniwersalna europejska uroda", en: "standard European look" },
                    { pl: "różnorodne pochodzenie (wielokulturowe)", en: "diverse multicultural background" }
                  ]} />
                </div>

                {/* STYL / MEDIUM */}
                <div>
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1"><Layers className="w-3 h-3"/> Styl i Technika</label>
                  <input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-fuchsia-500 outline-none transition-all" value={data.medium.pl} onChange={(e) => handleManualInput('medium', e.target.value)} />
                  <SuggestionChips field="medium" options={[
                    { pl: "ilustracja 3D w stylu Disney Pixar", en: "3D Disney Pixar style illustration" },
                    { pl: "styl anime Studio Ghibli", en: "Studio Ghibli anime style" },
                    { pl: "akwarela z książki dla dzieci", en: "watercolor children's book illustration" },
                    { pl: "fotorealistyczne zdjęcie", en: "photorealistic cinematic photography" }
                  ]} />
                </div>

                {/* OTOCZENIE */}
                <div>
                  <label className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1"><LayoutTemplate className="w-3 h-3"/> Tło i Otoczenie</label>
                  <input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-fuchsia-500 outline-none transition-all" value={data.environment.pl} onChange={(e) => handleManualInput('environment', e.target.value)} />
                  <SuggestionChips field="environment" options={[
                    { pl: "kolorowa sala przedszkolna", en: "colorful preschool classroom" },
                    { pl: "magiczny, zaczarowany las", en: "magical enchanted forest" },
                    { pl: "słoneczny park z placem zabaw", en: "sunny park with a playground" },
                    { pl: "czyste, pastelowe tło", en: "clean pastel background" }
                  ]} />
                </div>

                {/* PARAMETRY NEGATYWNE */}
                <div>
                  <label className="text-xs font-bold text-red-500 uppercase tracking-wider mb-1.5 flex items-center gap-1"><Ban className="w-3 h-3"/> Czego unikać? (Negative Prompt)</label>
                  <input type="text" className="w-full p-3 bg-red-50 border border-red-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all text-red-900" value={data.negative.pl} onChange={(e) => handleManualInput('negative', e.target.value)} />
                  <SuggestionChips field="negative" options={[
                    { pl: "napisy, tekst, litery, tablice z tekstem, logo, znaki wodne", en: "text, letters, fonts, signboards, watermarks, logo, signatures" },
                    { pl: "zniekształcone twarze, zła anatomia, potwory", en: "deformed faces, bad anatomy, ugly, scary" },
                    { pl: "dorośli, mrok, przemoc", en: "adults, darkness, violence, sad" }
                  ]} />
                </div>
              </div>

              {/* PRAWY PANEL WYNIKOWY */}
              <div className="w-full md:w-1/2 flex flex-col gap-4">
                <div className="bg-gradient-to-br from-fuchsia-900 to-slate-900 rounded-2xl p-6 shadow-xl text-white flex-1 flex flex-col relative overflow-hidden">
                  <ImageIcon className="absolute -right-10 -bottom-10 w-48 h-48 text-fuchsia-500 opacity-10" />
                  
                  <div className="flex justify-between items-start mb-4 relative z-10">
                    <h2 className="text-lg font-black text-fuchsia-300 flex items-center gap-2">
                      <Wand2 className="w-5 h-5" /> Twój Gotowy Prompt:
                    </h2>
                    <LanguageToggle lang={lang} setLang={setLang} />
                  </div>
                  
                  <div className="bg-slate-900/60 p-5 rounded-xl border border-fuchsia-500/30 flex-1 font-mono text-base leading-relaxed text-fuchsia-50 mb-6 overflow-y-auto whitespace-pre-wrap relative z-10">
                    {generatePrompt()}
                  </div>
                  
                  <button onClick={handleCopy} className={`w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all duration-300 relative z-10 ${copied ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/30' : 'bg-fuchsia-500 hover:bg-fuchsia-400 text-white shadow-lg shadow-fuchsia-500/30'}`}>
                    {copied ? <Check className="w-5 h-5" /> : <Copy className="w-5 h-5" />} {copied ? "Skopiowano do schowka!" : `Kopiuj Prompt (${lang.toUpperCase()})`}
                  </button>
                </div>
                
                <div className="bg-fuchsia-50 border border-fuchsia-100 p-4 rounded-2xl text-sm text-fuchsia-800 flex items-start gap-3 shadow-sm">
                  <Lightbulb className="w-5 h-5 shrink-0 mt-0.5 text-fuchsia-600" />
                  <p><b>Porada:</b> DALL-E (ChatGPT) oraz Bing świetnie radzą sobie z językiem Polskim. Jeśli używasz <b>Midjourney, Leonardo AI</b> lub <b>Adobe Firefly</b>, kliknij <b>English</b> nad oknem promptu!</p>
                </div>
              </div>
            </div>
          );
        };


        // --- KOMPONENT 2: GENERATOR PROMPTÓW WIDEO AI ---
        const VideoPromptGenerator = () => {
          const [copied, setCopied] = useState(false);
          const [lang, setLang] = useState('pl');

          const [data, setData] = useState({
            subject: { 
              pl: "urocze dziecko przedszkolne odkrywające świat", 
              en: "cute preschool child exploring the world" 
            },
            ethnicity: { 
              pl: "europejski wygląd, słowiańska uroda, środkowa Europa", 
              en: "European appearance, Slavic features, Central Europe, Caucasian" 
            },
            motion: { 
              pl: "dziecko powoli idzie, rozgląda się z zachwytem i uśmiecha", 
              en: "child walks slowly, looks around with wonder and smiles" 
            },
            setting: { 
              pl: "magiczny, zaczarowany las ze świecącymi grzybami",

        // --- KOMPONENT 4: INTERAKTYWNA ANIMACJA CANVAS ---
        const ParticleAnimation = () => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let particlesArray = [];
            let animationFrameId;

            const resizeCanvas = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; init(); };
            let mouse = { x: null, y: null, radius: 150 };

            const handleMouseMove = (e) => { const rect = canvas.getBoundingClientRect(); mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top; };
            const handleMouseOut = () => { mouse.x = undefined; mouse.y = undefined; };

            window.addEventListener('resize', resizeCanvas);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseout', handleMouseOut);

            class Particle {
              constructor(x, y, dx, dy, size, color) { this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.size = size; this.color = color; }
              draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill(); }
              update() {
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                let dx = mouse.x - this.x; let dy = mouse.y - this.y; let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius + this.size) {
                  if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 3;
                  if (mouse.x > this.x && this.x > this.size * 10) this.x -= 3;
                  if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 3;
                  if (mouse.y > this.y && this.y > this.size * 10) this.y -= 3;
                }
                this.x += this.dx; this.y += this.dy; this.draw();
              }
            }

            const init = () => {
              particlesArray = [];
              let numberOfParticles = (canvas.width * canvas.height) / 9000;
              for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                particlesArray.push(new Particle(x, y, (Math.random() * 2) - 1, (Math.random() * 2) - 1, size, '#6366f1'));
              }
            };

            const connect = () => {
              for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                  let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                  if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                    ctx.strokeStyle = `rgba(99, 102, 241, ${1 - (distance / 20000)})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y); ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                  }
                }
              }
            };

            const animate = () => { animationFrameId = requestAnimationFrame(animate); ctx.clearRect(0, 0, canvas.width, canvas.height); for (let i = 0; i < particlesArray.length; i++) particlesArray[i].update(); connect(); };
            resizeCanvas(); animate();

            return () => { window.removeEventListener('resize', resizeCanvas); canvas.removeEventListener('mousemove', handleMouseMove); canvas.removeEventListener('mouseout', handleMouseOut); cancelAnimationFrame(animationFrameId); };
          }, []);

          return (
            <div className="w-full h-full relative bg-slate-900 rounded-2xl overflow-hidden shadow-2xl border border-slate-800">
              <canvas ref={canvasRef} className="w-full h-full absolute inset-0 z-0" />

                  <p className="text-xs text-slate-400">Przejedź myszką po płótnie, aby wprawić je w ruch.</p>

              </div>

        };
