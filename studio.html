<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBoxPro Studio - Piosenki, Escape Roomy i TikToki na Lekcje</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @media print {
            body { background: white; }
            .print-hidden { display: none !important; }
            #print-container { border: none !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .page-break { page-break-before: always; }
        }
        
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Music: <><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></>,
                Map: <><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></>,
                Video: <><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 8 6 4-6 4Z"/></>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                Play: <path d="m5 3 14 9-14 9V3z"/>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [copied, setCopied] = useState(false);
            
            const [mode, setMode] = useState('song');
            
            const [params, setParams] = useState({
                topic: '',
                age: 'Klasy 1-3',
                style: 'Wesoły Pop',
                location: 'Sala Lekcyjna',
                characters: '2 osoby'
            });

            const [generatedData, setGeneratedData] = useState(null);

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { setIsPremium(true); setAccessCode(''); } 
                else alert('Błędny kod!');
            };

            const THEMES = {
                song: { color: 'fuchsia', gradient: 'from-fuchsia-500 to-pink-500', bg: 'bg-fuchsia-50', border: 'border-fuchsia-200', text: 'text-fuchsia-700', shadow: 'shadow-fuchsia-500/30' },
                escape: { color: 'amber', gradient: 'from-amber-400 to-orange-500', bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', shadow: 'shadow-amber-500/30' },
                tiktok: { color: 'cyan', gradient: 'from-cyan-400 to-blue-500', bg: 'bg-cyan-50', border: 'border-cyan-200', text: 'text-cyan-700', shadow: 'shadow-cyan-500/30' }
            };

            const generateContent = async () => {
                if (!params.topic.trim()) return alert('Wpisz temat lub zagadnienie!');
                setIsGenerating(true);
                setGeneratedData(null);
                setCopied(false);
                
                let systemPrompt = "";
                let userPrompt = "";

                if (mode === 'song') {
                    systemPrompt = `Jesteś ekspertem od pisania piosenek edukacyjnych. Odpowiadaj WYŁĄCZNIE w formacie JSON.
CRITICAL RULE: You MUST use exactly these English keys in your JSON object: "title", "suno_prompt", "lyrics". DO NOT translate these keys.
{
  "title": "Chwytliwy tytuł piosenki",
  "suno_prompt": "Styl muzyczny po angielsku (np. Upbeat pop, happy, kids music, acoustic guitar)",
  "lyrics": "[Verse 1]\\nTekst...\\n\\n[Chorus]\\nTekst...\\n\\n[Verse 2]\\nTekst...\\n\\n[Outro]\\nTekst..."
}`;
                    userPrompt = `Temat piosenki: ${params.topic}. Dla kogo: ${params.age}. Gatunek muzyczny: ${params.style}. Napisz bardzo rytmiczny tekst, który łatwo się śpiewa. Zadbaj o doskonałe rymy na końcu wersów. W tekście zawrzyj wartość edukacyjną.`;
                } 
                else if (mode === 'escape') {
                    systemPrompt = `Jesteś kreatywnym nauczycielem tworzącym angażujące gry terenowe (Escape Roomy) w klasie. Odpowiadaj WYŁĄCZNIE w formacie JSON.
CRITICAL RULE: You MUST use exactly these English keys: "title", "intro", "riddles", "final_code". Inside riddles array use: "number", "task", "answer", "hiding_spot". DO NOT translate these keys.
{
  "title": "Nazwa misji/scenariusza",
  "intro": "Krótki, fabularny wstęp (list) do odczytania dzieciom na start",
  "riddles": [
    { "number": 1, "task": "Opis zagadki/łamigłówki do rozwiązania przez dzieci", "answer": "Prawidłowa odpowiedź (np. cyfra do kłódki lub hasło)", "hiding_spot": "Gdzie w sali schować tę zagadkę" }
  ],
  "final_code": "Ostateczny kod/hasło składające się z wcześniejszych odpowiedzi"
}`;
                    userPrompt = `Temat edukacyjny: ${params.topic}. Wiek uczestników: ${params.age}. Miejsce ukrywania wskazówek: ${params.location}. Ułóż 4 zagadki tematyczne, które dzieci muszą rozwiązać współpracując. Podaj sprytne, ale bezpieczne kryjówki.`;
                }
                else if (mode === 'tiktok') {
                    systemPrompt = `Jesteś reżyserem krótkich form wideo (TikTok, Reels, Shorts) tworzącym nowoczesne, śmieszne scenariusze edukacyjne dla uczniów. Odpowiadaj WYŁĄCZNIE w formacie JSON.
CRITICAL RULE: You MUST use exactly these English keys: "title", "characters", "hook", "script", "camera_tips". Inside script use: "actor", "action", "dialogue". DO NOT translate these keys.
{
  "title": "Chwytliwy tytuł (Trend)",
  "characters": ["Postać 1", "Postać 2"],
  "hook": "Haczyk (Pierwsze 3 sekundy)",
  "script": [
    { "actor": "Kto mówi", "action": "Wskazówka reżyserska", "dialogue": "Dokładny tekst" }
  ],
  "camera_tips": "Krótka porada jak nagrać to w klasie telefonem"
}`;
                    userPrompt = `Temat do wyjaśnienia w wideo: ${params.topic}. Grupa docelowa: ${params.age}. Liczba aktorów: ${params.characters}. Stwórz krótki (ok. 30-40 sekund), dynamiczny i humorystyczny scenariusz scenki.`;
                }

                try {
                    const res = await fetch('https://text.pollinations.ai/', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            messages: [
                                { role: "system", content: systemPrompt },
                                { role: "user", content: userPrompt }
                            ],
                            model: "openai",
                            temperature: 0.3,
                            response_format: { type: "json_object" },
                            jsonMode: true,
                            seed: Math.floor(Math.random() * 10000)
                        })
                    });
                    
                    if (!res.ok) throw new Error("Błąd serwera AI");
                    
                    let text = await res.text();
                    
                    // Bezpieczne parsowanie JSON
                    let jsonStr = text;
                    const start = text.indexOf('{');
                    const end = text.lastIndexOf('}');
                    if(start !== -1 && end !== -1) {
                        jsonStr = text.substring(start, end + 1);
                    }
                    
                    const parsedData = JSON.parse(jsonStr);
                    setGeneratedData(parsedData);
                    
                } catch (error) {
                    console.error("Błąd AI:", error); 
                    alert("Wystąpił błąd podczas generowania. Upewnij się, że nie używasz adblocka blokującego połączenia z AI lub spróbuj ponownie za chwilę.");
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const copyToClipboard = (text) => {
                if(!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const currentTheme = THEMES[mode];

            return (
                <div className="min-h-screen flex flex-col relative bg-slate-50">
                    {/* EKRAN ŁADOWANIA */}
                    {isGenerating && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[100] flex flex-col items-center justify-center text-white">
                            <div className="bg-white p-8 rounded-3xl flex flex-col items-center space-y-5 max-w-sm text-slate-800 shadow-2xl">
                                <div className={`w-16 h-16 border-8 border-t-transparent rounded-full animate-spin`} style={{ borderTopColor: mode === 'song' ? '#d946ef' : mode === 'escape' ? '#f59e0b' : '#06b6d4', borderRightColor: '#f1f5f9', borderBottomColor: '#f1f5f9', borderLeftColor: '#f1f5f9'}}></div>
                                <div className="text-center">
                                    <h3 className="text-xl font-black mb-1">Przygotowuję scenariusz...</h3>
                                    <p className="text-xs text-slate-500 font-medium">Magia AI działa w tle (ok. 15 sekund).</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAWIGACJA */}
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-xl tracking-tight text-slate-800">
                            <div className="bg-gradient-to-br from-indigo-600 to-purple-700 p-2.5 rounded-xl text-white shadow-lg">
                                <Icon name="Play" size={24}/>
                            </div>
                            <span className="hidden sm:inline">EduBoxPro <span className="text-indigo-600">Studio</span></span>
                        </div>
                        <div className="flex items-center space-x-3">
                            {!isPremium && (
                                <div className="hidden md:flex items-center space-x-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium"/>
                                    <button onClick={handleVerifyCode} className="p-2 text-white rounded-lg bg-indigo-600 hover:bg-indigo-700 transition-colors"><Icon name="Lock" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('https://buycoffee.to/magiccolor')} className="flex items-center space-x-2 bg-gradient-to-r from-amber-400 to-amber-500 text-amber-950 px-4 py-2.5 rounded-xl font-bold shadow-sm transition-transform active:scale-95 text-sm">
                                <Icon name="Coffee" size={18} /><span>Postaw Kawę</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0">
                        
                        {/* PANEL LEWY - KONFIGURACJA */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            
                            <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex gap-2">
                                <button onClick={() => {setMode('song'); setGeneratedData(null);}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all ${mode === 'song' ? 'bg-gradient-to-br from-fuchsia-500 to-pink-500 text-white shadow-lg shadow-fuchsia-500/30' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="Music" size={24} className="mb-2" /> Piosenki
                                </button>
                                <button onClick={() => {setMode('escape'); setGeneratedData(null);}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all ${mode === 'escape' ? 'bg-gradient-to-br from-amber-400 to-orange-500 text-white shadow-lg shadow-amber-500/30' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="Map" size={24} className="mb-2" /> Escape Room
                                </button>
                                <button onClick={() => {setMode('tiktok'); setGeneratedData(null);}} className={`flex-1 py-4 px-2 rounded-xl flex flex-col items-center justify-center font-bold text-[10px] uppercase tracking-widest transition-all ${mode === 'tiktok' ? 'bg-gradient-to-br from-cyan-400 to-blue-500 text-white shadow-lg shadow-cyan-500/30' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <Icon name="Video" size={24} className="mb-2" /> Teatrzyk
                                </button>
                            </div>

                            <div className={`bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-5 transition-all`}>
                                <h2 className={`font-bold text-sm uppercase tracking-widest border-b pb-3 ${currentTheme.text}`}>
                                    Krok 1: Szczegóły Scenariusza
                                </h2>
                                
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 block">
                                        {mode === 'song' ? 'O czym ma być piosenka?' : mode === 'escape' ? 'Temat Zagadek i Misji' : 'Temat lub Postać Historyczna'}
                                    </label>
                                    <textarea 
                                        value={params.topic} 
                                        onChange={e => setParams({...params, topic: e.target.value})} 
                                        placeholder={mode === 'song' ? "np. Jak działa wulkan, Ułamki, Planety..." : mode === 'escape' ? "np. Starożytny Rzym, Tabliczka mnożenia, Ekologia..." : "np. Wywiad z Bolesławem Chrobrym..."} 
                                        className={`w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none font-semibold text-sm resize-none focus:ring-2 focus:ring-${currentTheme.color}-100 focus:border-${currentTheme.color}-500`}
                                        rows="3"
                                    />
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Wiek / Klasa</label>
                                        <select value={params.age} onChange={e => setParams({...params, age: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium">
                                            <option>Przedszkole</option>
                                            <option>Klasy 1-3</option>
                                            <option>Klasy 4-6</option>
                                            <option>Klasy 7-8</option>
                                        </select>
                                    </div>

                                    {mode === 'song' && (
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Gatunek Muzyczny</label>
                                            <select value={params.style} onChange={e => setParams({...params, style: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium">
                                                <option>Wesoły Pop / Radiowy</option>
                                                <option>Kołysanka / Lullaby</option>
                                                <option>Energetyczny Rap</option>
                                                <option>Rock / Gitarowy</option>
                                            </select>
                                        </div>
                                    )}
                                    {mode === 'escape' && (
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Gdzie chowamy?</label>
                                            <select value={params.location} onChange={e => setParams({...params, location: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium">
                                                <option>Sala Lekcyjna</option>
                                                <option>Sala Gimnastyczna</option>
                                                <option>Boisko / Podwórko</option>
                                            </select>
                                        </div>
                                    )}
                                    {mode === 'tiktok' && (
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Obsada</label>
                                            <select value={params.characters} onChange={e => setParams({...params, characters: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm font-medium">
                                                <option>Tylko Nauczyciel (Solo)</option>
                                                <option>2 osoby (Wywiad)</option>
                                                <option>Cała Klasa (Chór)</option>
                                            </select>
                                        </div>
                                    )}
                                </div>

                                {!isPremium ? (
                                    <div className={`p-4 rounded-xl border border-dashed flex flex-col items-center justify-center text-center gap-2 ${currentTheme.bg} ${currentTheme.border}`}>
                                        <Icon name="Lock" size={24} className={currentTheme.text}/>
                                        <span className={`text-xs font-bold ${currentTheme.text}`}>Odblokuj kodem Premium</span>
                                    </div>
                                ) : (
                                    <button onClick={generateContent} className={`w-full text-white py-4 rounded-2xl font-black text-sm tracking-widest shadow-lg flex justify-center items-center gap-2 transition-transform active:scale-95 bg-gradient-to-r ${currentTheme.gradient} ${currentTheme.shadow}`}>
                                        <Icon name="Sparkles" size={20}/> GENERUJ Z AI
                                    </button>
                                )}
                            </div>

                            {mode === 'song' && (
                                <div className="bg-slate-800 text-white p-5 rounded-3xl shadow-sm border border-slate-700 flex items-center gap-4">
                                    <div className="bg-slate-700 p-3 rounded-2xl"><Icon name="Music" size={24} className="text-fuchsia-400"/></div>
                                    <div>
                                        <p className="text-sm font-bold leading-tight">Gdzie stworzyć muzykę?</p>
                                        <p className="text-[10px] text-slate-400 mt-1">Skopiuj wygenerowany tekst i wklej go do darmowego generatora muzyki <strong>Suno.com</strong> w trybie "Custom Mode".</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* PANEL PRAWY - WYNIK */}
                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10">
                            <div className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-2xl p-8 md:p-12 relative print:shadow-none print:w-full print:p-0" id="print-container">
                                
                                {!generatedData ? (
                                    <div className="h-full flex flex-col items-center justify-center opacity-30 text-center space-y-6 pt-32 print-hidden">
                                        <Icon name={mode === 'song' ? 'Music' : mode === 'escape' ? 'Map' : 'Video'} size={80} className={currentTheme.text} />
                                        <div>
                                            <h2 className="text-2xl font-bold mb-2">Twoje Multimediowe Studio</h2>
                                            <p className="max-w-md mx-auto font-medium">Użyj AI, by zamienić nudny temat w piosenkę, grę terenową z zagadkami lub śmieszny scenariusz do odegrania w klasie.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="animate-[reveal_0.5s_ease-out]">
                                        
                                        <div className="flex justify-end gap-3 mb-8 pb-4 border-b border-slate-100 print-hidden">
                                            {mode === 'song' ? (
                                                <button onClick={() => copyToClipboard(generatedData.lyrics)} className="bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 transition-colors text-sm">
                                                    <Icon name={copied ? "Sparkles" : "Copy"} size={16}/> {copied ? "SKOPIOWANO!" : "KOPIUJ TEKST DLA SUNO.COM"}
                                                </button>
                                            ) : (
                                                <button onClick={() => window.print()} className="bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2 transition-colors text-sm">
                                                    <Icon name="Printer" size={16}/> DRUKUJ SCENARIUSZ
                                                </button>
                                            )}
                                        </div>

                                        {/* WIDOK: PIOSENKA */}
                                        {mode === 'song' && (
                                            <div className="space-y-8">
                                                <div className="text-center">
                                                    <div className="inline-flex items-center gap-2 bg-fuchsia-50 text-fuchsia-700 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-4">
                                                        <Icon name="Music" size={14}/> Edu-Piosenka
                                                    </div>
                                                    <h1 className="text-3xl md:text-5xl font-black text-slate-800 tracking-tight leading-tight">{generatedData.title || "Twoja Piosenka"}</h1>
                                                </div>

                                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Prompt Muzyczny (Wklej w pole "Style of Music" na Suno.com):</p>
                                                    <p className="font-mono text-sm text-fuchsia-700 font-bold">{generatedData.suno_prompt || "Upbeat pop, happy, acoustic"}</p>
                                                </div>

                                                <div className="bg-white border-2 border-slate-100 p-8 rounded-3xl">
                                                    <pre className="font-sans text-slate-700 text-lg md:text-xl whitespace-pre-wrap leading-relaxed font-medium">{generatedData.lyrics || "Błąd wczytywania tekstu. Spróbuj wygenerować ponownie!"}</pre>
                                                </div>
                                            </div>
                                        )}

                                        {/* WIDOK: ESCAPE ROOM */}
                                        {mode === 'escape' && (
                                            <div className="space-y-8">
                                                <div className="text-center border-b-4 border-amber-400 pb-8">
                                                    <div className="inline-flex items-center gap-2 bg-amber-50 text-amber-700 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-4">
                                                        <Icon name="Map" size={14}/> Klasowy Escape Room
                                                    </div>
                                                    <h1 className="text-3xl md:text-5xl font-black text-slate-800 tracking-tight leading-tight uppercase">{generatedData.title}</h1>
                                                </div>

                                                <div className="bg-amber-50/50 p-6 rounded-2xl border border-amber-200">
                                                    <h2 className="text-sm font-black text-amber-800 uppercase tracking-widest mb-3">✉️ Wstęp Fabularny (Do odczytania uczniom):</h2>
                                                    <p className="text-amber-900 italic leading-relaxed text-lg">"{generatedData.intro}"</p>
                                                </div>

                                                <div className="space-y-6">
                                                    <h2 className="text-xl font-black text-slate-800 uppercase border-b-2 border-slate-100 pb-2">Karty z Zagadkami</h2>
                                                    {generatedData.riddles && generatedData.riddles.map((r, i) => (
                                                        <div key={i} className="flex gap-4 p-5 rounded-2xl border border-slate-200 bg-white shadow-sm page-break-inside-avoid">
                                                            <div className="w-12 h-12 bg-amber-500 text-white rounded-full flex items-center justify-center font-black text-xl flex-shrink-0 shadow-md">{r.number || i+1}</div>
                                                            <div className="flex-1">
                                                                <h3 className="font-bold text-slate-800 text-lg mb-2">{r.task}</h3>
                                                                <div className="grid grid-cols-2 gap-4 mt-4 bg-slate-50 p-3 rounded-xl text-sm border border-slate-100">
                                                                    <div><span className="block text-[10px] uppercase font-black text-slate-400">Odpowiedź:</span> <span className="font-bold text-emerald-600">{r.answer}</span></div>
                                                                    <div><span className="block text-[10px] uppercase font-black text-slate-400">Gdzie schować kartkę?</span> <span className="font-bold text-slate-700">{r.hiding_spot}</span></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>

                                                <div className="bg-slate-800 text-white p-8 rounded-3xl text-center page-break-inside-avoid shadow-2xl">
                                                    <h2 className="text-sm font-black text-slate-400 uppercase tracking-widest mb-2">Hasło Finałowe (Do kłódki lub sejfu):</h2>
                                                    <div className="text-5xl font-black tracking-[0.5em] text-amber-400">{generatedData.final_code}</div>
                                                </div>
                                            </div>
                                        )}

                                        {/* WIDOK: TIKTOK/ROLEPLAY */}
                                        {mode === 'tiktok' && (
                                            <div className="space-y-8">
                                                <div className="text-center">
                                                    <div className="inline-flex items-center gap-2 bg-cyan-50 text-cyan-700 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-4">
                                                        <Icon name="Video" size={14}/> Scenariusz Wideo / Scenka
                                                    </div>
                                                    <h1 className="text-3xl md:text-5xl font-black text-slate-800 tracking-tight leading-tight">{generatedData.title}</h1>
                                                </div>

                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">👥 Obsada:</h2>
                                                        <p className="font-bold text-slate-700">{generatedData.characters && generatedData.characters.join(' oraz ')}</p>
                                                    </div>
                                                    <div className="bg-cyan-50 p-5 rounded-2xl border border-cyan-200">
                                                        <h2 className="text-[10px] font-black text-cyan-600 uppercase tracking-widest mb-2">🎣 Hook (Początek - Przyciągnij uwagę):</h2>
                                                        <p className="font-bold text-cyan-900">"{generatedData.hook}"</p>
                                                    </div>
                                                </div>

                                                <div className="bg-white border-2 border-slate-100 rounded-3xl overflow-hidden">
                                                    <div className="bg-slate-800 text-white py-3 px-6 text-sm font-black uppercase tracking-widest">Skrypt Scenki</div>
                                                    <div className="p-6 md:p-8 space-y-6">
                                                        {generatedData.script && generatedData.script.map((line, i) => (
                                                            <div key={i} className="flex flex-col sm:flex-row gap-2 sm:gap-4 page-break-inside-avoid">
                                                                <div className="sm:w-1/4 font-black text-cyan-600 text-right uppercase text-sm pt-1">{line.actor}:</div>
                                                                <div className="sm:w-3/4">
                                                                    <div className="text-xs font-bold text-slate-400 italic mb-1">[{line.action}]</div>
                                                                    <div className="text-lg text-slate-800 font-medium leading-relaxed">"{line.dialogue}"</div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 border-l-4 border-cyan-500 p-5 rounded-r-2xl page-break-inside-avoid">
                                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">🎥 Wskazówka Reżyserska (Nagrywanie):</h2>
                                                    <p className="font-medium text-slate-700">{generatedData.camera_tips}</p>
                                                </div>
                                            </div>
                                        )}
                                        
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
